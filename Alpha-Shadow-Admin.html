<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | الظل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --gold: #c8a27c; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        #lock-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        .section { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h3 { color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 13px; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-save { background: var(--green); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { opacity: 0.8; }
        .btn-gold { background: var(--gold); }
        .item-row { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h3>🔒 الظل | لوحة التحكم</h3>
    <input type="password" id="passInput" placeholder="كلمة السر" style="width: 200px; text-align: center; margin-bottom: 10px;">
    <button class="btn-save" onclick="checkPass()" style="width: 100px;">دخول</button>
</div>

<div class="container" id="adminContent">
    <h2 style="text-align: center; color: var(--primary);">⚙️ نظام إدارة الكافيه (White Label)</h2>

    <div class="section">
        <h3>🎨 براند الكافيه والمظهر</h3>
        <label>اسم الكافيه</label>
        <input type="text" id="cafeName" placeholder="مثلاً: قهوة الظل">
        <label>رابط اللوجو</label>
        <input type="text" id="logoUrl">
        <label>رابط صورة الخلفية (الصفحة الزرقاء)</label>
        <input type="text" id="bgUrl">
        <button class="btn-save btn-gold" onclick="saveSettings('branding')">تحديث البراند 💾</button>
    </div>

    <div class="section">
        <h3>🖼️ إدارة العروض (Slider Images)</h3>
        <label>رابط صورة العرض</label>
        <input type="text" id="offerImgUrl" placeholder="ضع رابط الصورة هنا">
        <button class="btn-save" onclick="addOffer()">إضافة عرض جديد 🖼️</button>
        <div id="offersList"></div>
    </div>

    <div class="section">
        <h3>🎟️ إدارة أكواد الخصم</h3>
        <label>كود الخصم (مثلاً: OFF10)</label>
        <input type="text" id="couponCode" placeholder="رمز الكوبون">
        <label>نسبة الخصم (%)</label>
        <input type="number" id="couponPct" placeholder="10">
        <button class="btn-save btn-gold" onclick="addCoupon()">إضافة كوبون ✅</button>
        <div id="couponsList"></div>
    </div>

    <div class="section">
        <h3>🎙️ الإعدادات الصوتية (English)</h3>
        <label>رسالة الترحيب عند الدخول</label>
        <input type="text" id="welcomeVoice" placeholder="Welcome to [Name] Coffee">
        <label>رسالة عند إرسال الطلب</label>
        <input type="text" id="readyVoice" placeholder="Your order is ready, Enjoy!">
        <button class="btn-save btn-gold" onclick="saveSettings('audio')">حفظ الأصوات 🎧</button>
    </div>

    <div class="section">
        <h3>➕ إدارة الإضافات (Dropdown Options)</h3>
        <label>اسم الإضافة (عربي)</label>
        <input type="text" id="extAr" placeholder="مثلاً: حليب لوز">
        <label>اسم الإضافة (EN للنطق)</label>
        <input type="text" id="extEn" placeholder="e.g. Almond Milk">
        <label>السعر الإضافي (0 لو مجاني)</label>
        <input type="number" id="extPrice" value="0">
        <button class="btn-save" onclick="addExtra()">إضافة للـ Dropdown ✅</button>
        <div id="extrasList"></div>
    </div>

    <div class="section">
        <h3>☕ قائمة المشروبات</h3>
        <label>الاسم (عربي)</label><input type="text" id="itemAr">
        <label>الاسم (EN للنطق)</label><input type="text" id="itemEn">
        <label>السعر الأساسي</label><input type="number" id="itemPrice">
        <label>رابط الصورة</label><input type="text" id="itemImg">
        <button class="btn-save" onclick="addItem()">إضافة مشروب جديد ☕</button>
        <div id="itemsList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function checkPass() {
        if(document.getElementById('passInput').value === 'Lovely333') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadData();
        } else { alert("كلمة السر خطأ يا فنان!"); }
    }

    function saveSettings(type) {
        if(type === 'branding') {
            database.ref('settings/branding').set({
                name: document.getElementById('cafeName').value,
                logo: document.getElementById('logoUrl').value,
                bg: document.getElementById('bgUrl').value
            });
        } else {
            database.ref('settings/audio').set({
                welcome: document.getElementById('welcomeVoice').value,
                ready: document.getElementById('readyVoice').value
            });
        }
        alert("تم الحفظ!");
    }

    function addOffer() {
        const url = document.getElementById('offerImgUrl').value;
        if(url) {
            database.ref('offers').push({ img: url });
            document.getElementById('offerImgUrl').value = '';
        }
    }

    function addCoupon() {
        const code = document.getElementById('couponCode').value.toUpperCase();
        const pct = document.getElementById('couponPct').value;
        if(code && pct) {
            database.ref('coupons/' + code).set({ pct: parseInt(pct) });
            document.getElementById('couponCode').value = '';
            document.getElementById('couponPct').value = '';
        }
    }

    function addExtra() {
        const ar = document.getElementById('extAr').value;
        const en = document.getElementById('extEn').value;
        const price = document.getElementById('extPrice').value;
        if(ar && en) {
            database.ref('extras_options').push({ ar, en, price: parseFloat(price) });
            document.getElementById('extAr').value = '';
            document.getElementById('extEn').value = '';
        }
    }

    function addItem() {
        const ar = document.getElementById('itemAr').value;
        const en = document.getElementById('itemEn').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;
        if(ar && price) {
            database.ref('menu_items').push({ ar, en, price: parseFloat(price), img });
            alert("تمت الإضافة!");
        }
    }

    function loadData() {
        database.ref('settings').on('value', snap => {
            const s = snap.val();
            if(s && s.branding) {
                document.getElementById('cafeName').value = s.branding.name || "";
                document.getElementById('logoUrl').value = s.branding.logo || "";
                document.getElementById('bgUrl').value = s.branding.bg || "";
            }
            if(s && s.audio) {
                document.getElementById('welcomeVoice').value = s.audio.welcome || "";
                document.getElementById('readyVoice').value = s.audio.ready || "";
            }
        });

        database.ref('offers').on('value', snap => {
            let h = "<strong>صور العروض:</strong>";
            snap.forEach(c => h += `<div class="item-row">عرض صورة <button class="btn-del" onclick="database.ref('offers/${c.key}').remove()">حذف</button></div>`);
            document.getElementById('offersList').innerHTML = h;
        });

        database.ref('coupons').on('value', snap => {
            let h = "<strong>الكوبونات الحالية:</strong>";
            snap.forEach(c => h += `<div class="item-row">${c.key} (${c.val().pct}%) <button class="btn-del" onclick="database.ref('coupons/${c.key}').remove()">حذف</button></div>`);
            document.getElementById('couponsList').innerHTML = h;
        });

        database.ref('extras_options').on('value', snap => {
            let h = "<strong>الإضافات:</strong>";
            snap.forEach(c => h += `<div class="item-row">${c.val().ar} <button class="btn-del" onclick="database.ref('extras_options/${c.key}').remove()">حذف</button></div>`);
            document.getElementById('extrasList').innerHTML = h;
        });

        database.ref('menu_items').on('value', snap => {
            let h = "<strong>المشروبات:</strong>";
            snap.forEach(c => h += `<div class="item-row">${c.val().ar} <button class="btn-del" onclick="database.ref('menu_items/${c.key}').remove()">حذف</button></div>`);
            document.getElementById('itemsList').innerHTML = h;
        });
    }
</script>
</body>
</html>
