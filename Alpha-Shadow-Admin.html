<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Shadow | Master Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --gold: #c8a27c; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        #lock-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .container { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        .section { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .btn-save { background: var(--green); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-gold { background: var(--gold); }
    </style>
</head>
<body>

<div id="lock-screen">
    <h3>🔒 لوحة التحكم محمية</h3>
    <input type="password" id="passInput" placeholder="أدخل كلمة السر" style="width: 200px; text-align: center;">
    <button class="btn-save" onclick="checkPass()" style="width: 100px;">دخول</button>
</div>

<div class="container" id="adminContent">
    <h2 style="text-align: center;">⚙️ إعدادات White Label</h2>

    <div class="section">
        <h3>🎨 الهوية والمظهر</h3>
        <label>اسم الكافيه (بدل Alpha-Shadow)</label>
        <input type="text" id="cafeName" placeholder="مثلاً: قهوة المختص">
        <label>رابط اللوجو (الذي يظهر في البداية)</label>
        <input type="text" id="logoUrl">
        <label>رابط صورة الخلفية الرئيسية</label>
        <input type="text" id="bgUrl">
        <button class="btn-save btn-gold" onclick="saveSettings('branding')">حفظ تغييرات المظهر ✨</button>
    </div>

    <div class="section">
        <h3>🎙️ الرسائل الصوتية (English)</h3>
        <label>رسالة الترحيب (مثلاً: Welcome to [X] Coffee)</label>
        <input type="text" id="welcomeVoice" placeholder="e.g. Welcome to The Barn Code">
        <label>رسالة استلام الطلب (مثلاً: Your order from [X] is ready)</label>
        <input type="text" id="readyVoice" placeholder="e.g. Your order is ready, Enjoy!">
        <button class="btn-save btn-gold" onclick="saveSettings('audio')">حفظ الرسائل الصوتية 🎧</button>
    </div>

    <div class="section">
        <h3>☕ إضافة مشروب</h3>
        <label>الاسم (عربي)</label><input type="text" id="itemAr">
        <label>الاسم (EN)</label><input type="text" id="itemEn">
        <label>السعر</label><input type="number" id="itemPrice">
        <label>رابط الصورة</label><input type="text" id="itemImg">
        <button class="btn-save" onclick="addItem()">إضافة المشروب ✅</button>
    </div>

    <div id="fullList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function checkPass() {
        if(document.getElementById('passInput').value === 'Lovely333') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        } else { alert("خطأ!"); }
    }

    function saveSettings(type) {
        if(type === 'branding') {
            database.ref('settings/branding').set({
                name: document.getElementById('cafeName').value,
                logo: document.getElementById('logoUrl').value,
                bg: document.getElementById('bgUrl').value
            });
        } else {
            database.ref('settings/audio').set({
                welcome: document.getElementById('welcomeVoice').value,
                ready: document.getElementById('readyVoice').value
            });
        }
        alert("تم الحفظ بنجاح!");
    }

    function addItem() {
        const ar = document.getElementById('itemAr').value;
        const en = document.getElementById('itemEn').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;
        if(ar && price) {
            database.ref('menu_items').push({ ar, en, price: parseInt(price), img });
            alert("تمت الإضافة!");
        }
    }
</script>
</body>
</html>
