<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Shadow | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --gold: #c8a27c; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        #lock-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        h2, h3 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .section { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; outline: none; }
        .btn-save { background: var(--green); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .item-card { background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h3>🔒 أدخل كلمة السر للدخول</h3>
    <input type="password" id="passInput" style="width: 200px; text-align: center;">
    <button class="btn-save" onclick="checkPass()" style="width: 100px; margin-top: 10px;">دخول</button>
</div>

<div class="container" id="adminContent">
    <h2>⚙️ لوحة تحكم Alpha-Shadow</h2>

    <div class="section">
        <h3>☕ إضافة مشروب</h3>
        <div class="input-group"><label>الاسم (عربي)</label><input type="text" id="nameAr"></div>
        <div class="input-group"><label>الاسم (EN)</label><input type="text" id="nameEn"></div>
        <div class="input-group"><label>السعر</label><input type="number" id="price"></div>
        <div class="input-group"><label>رابط الصورة</label><input type="text" id="imgUrl"></div>
        <button class="btn-save" onclick="addItem('menu_items', 'nameAr', 'nameEn', 'price', 'imgUrl')">حفظ المشروب</button>
    </div>

    <div class="section">
        <h3>🖼️ إضافة عرض (Banner)</h3>
        <div class="input-group"><label>رابط صورة العرض</label><input type="text" id="offerImg"></div>
        <button class="btn-save" onclick="addOffer()">إضافة العرض</button>
    </div>

    <div class="section">
        <h3>🎟️ إضافة كوبون خصم</h3>
        <div class="input-group"><label>كود الكوبون (مثلاً: ALPHA)</label><input type="text" id="couponCode"></div>
        <div class="input-group"><label>نسبة الخصم %</label><input type="number" id="discountPct"></div>
        <button class="btn-save" onclick="addCoupon()">تفعيل الكوبون</button>
    </div>

    <div class="menu-list" id="fullList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function checkPass() {
        if(document.getElementById('passInput').value === 'Lovely333') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
        } else { alert("كلمة السر خطأ!"); }
    }

    function addItem(path, arId, enId, priceId, imgId) {
        const ar = document.getElementById(arId).value;
        const en = document.getElementById(enId).value;
        const price = document.getElementById(priceId).value;
        const img = document.getElementById(imgId).value;
        if(ar && price) {
            database.ref(path).push({ ar, en, price: parseInt(price), img });
            alert("تم الحفظ!");
            document.querySelectorAll('input:not(#passInput)').forEach(i => i.value = "");
        }
    }

    function addOffer() {
        const img = document.getElementById('offerImg').value;
        if(img) { database.ref('offers').push({ img }); alert("تمت إضافة العرض!"); document.getElementById('offerImg').value = ""; }
    }

    function addCoupon() {
        const code = document.getElementById('couponCode').value.toUpperCase();
        const pct = document.getElementById('discountPct').value;
        if(code && pct) { database.ref('coupons').child(code).set({ pct: parseInt(pct) }); alert("تم تفعيل الكوبون!"); }
    }

    // عرض القائمة للحذف
    database.ref().on('value', snap => {
        const data = snap.val();
        let html = "<h3>إدارة الأصناف:</h3>";
        for(let id in data.menu_items) {
            html += `<div class="item-card"><span>${data.menu_items[id].ar}</span><button class="btn-delete" onclick="deleteData('menu_items/${id}')">حذف</button></div>`;
        }
        html += "<h3>إدارة العروض:</h3>";
        for(let id in data.offers) {
            html += `<div class="item-card"><span>عرض ${id}</span><button class="btn-delete" onclick="deleteData('offers/${id}')">حذف</button></div>`;
        }
        document.getElementById('fullList').innerHTML = html;
    });

    function deleteData(path) { if(confirm("حذف؟")) database.ref(path).remove(); }
</script>
</body>
</html>
