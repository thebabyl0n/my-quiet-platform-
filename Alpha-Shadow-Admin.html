<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | الظل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --gold: #c8a27c; --green: #22c55e; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        #lock-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        .section { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h3 { color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 5px; margin-top: 0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 13px; color: #475569; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-save { background: var(--green); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { opacity: 0.8; }
        .btn-gold { background: var(--gold); }
        .btn-red { background: var(--red); }
        .item-row { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h3>🔒 الظل | لوحة التحكم</h3>
    <input type="password" id="passInput" placeholder="كلمة السر" style="width: 200px; text-align: center; margin-bottom: 10px;">
    <button class="btn-save" onclick="checkPass()" style="width: 100px;">دخول</button>
</div>

<div class="container" id="adminContent">
    <h2 style="text-align: center; color: var(--primary);">⚙️ نظام إدارة الكافيه (Alpha Shadow)</h2>

    <div class="section" style="border: 2px solid var(--gold);">
        <h3>🔊 التنبيهات والتحكم الصوتي</h3>
        <label>رسالة الترحيب الصوتية (تنطق عند دخول الزبون)</label>
        <input type="text" id="welcomeMsgInput" placeholder="مثلاً: Welcome to our cafe">
        
        <label>رسالة جاهزية الطلب (تنطق للزبون عند التجهيز)</label>
        <input type="text" id="readyMsgInput" placeholder="مثلاً: Your order is ready">
        
        <label>نص التنبيه المكتوب (الذي يظهر في الـ Toast)</label>
        <input type="text" id="toastMsgInput" placeholder="مثلاً: طلبك جاهز يا برنس، تفضل للاستلام">
        
        <button class="btn-save btn-gold" onclick="saveAudioSettings()">تحديث الأصوات والرسائل ⚡</button>
    </div>

    <div class="section">
        <h3>🎨 براند الكافيه والمظهر</h3>
        <label>اسم الكافيه</label><input type="text" id="cafeName">
        <label>رابط اللوجو (الدائرة)</label><input type="text" id="logoUrl">
        <label>رابط الخلفية الجدارية (Wallpaper)</label>
        <input type="text" id="bgUrl" placeholder="حط رابط الصورة هنا">
        <button class="btn-save btn-gold" onclick="saveSettings('branding')">تحديث البراند 💾</button>
    </div>

    <div class="section">
        <h3>🖼️ إدارة عروض الصور</h3>
        <label>رابط صورة العرض</label>
        <input type="text" id="offerImg" placeholder="رابط الصورة">
        <button class="btn-save" onclick="addOffer()">إضافة عرض جديد 📸</button>
        <div id="offersList"></div>
    </div>

    <div class="section">
        <h3>🎟️ كوبونات الخصم المتكاملة</h3>
        <label>كود الخصم (مثلاً: Shadow10)</label>
        <input type="text" id="couponCode" placeholder="اكتب الكود هنا">
        <label>نوع الخصم</label>
        <select id="discountType">
            <option value="fixed">خصم مبلغ ثابت (ريال)</option>
            <option value="percent">خصم نسبة مئوية (%)</option>
        </select>
        <label>القيمة (رقم فقط)</label>
        <input type="number" id="couponValue" placeholder="مثلاً: 10">
        <button class="btn-save btn-gold" onclick="addCoupon()">تفعيل الكوبون ✅</button>
        <div id="couponsList"></div>
    </div>

    <div class="section">
        <h3>☕ إضافة صنف جديد</h3>
        <label>الاسم (عربي)</label><input type="text" id="itemAr">
        <label>الاسم (EN)</label><input type="text" id="itemEn">
        <label>السعر</label><input type="number" id="itemPrice">
        <label>رابط الصورة</label><input type="text" id="itemImg">
        <label>توجيه الطلب</label>
        <select id="itemDept">
            <option value="barista">☕ شاشة الباريستا</option>
            <option value="kitchen">🍔 شاشة المطبخ</option>
            <option value="dessert">🍰 شاشة الحلا</option>
        </select>
        <button class="btn-save" onclick="addItem()">إضافة للمنيو ✅</button>
    </div>

    <div class="section">
        <h3>📋 المنيو الحالي</h3>
        <div id="itemsList"></div>
    </div>

    <div class="section">
        <h3>➕ الإضافات</h3>
        <label>اسم الإضافة</label><input type="text" id="extAr">
        <label>السعر</label><input type="number" id="extPrice" value="0">
        <button class="btn-save" onclick="addExtra()">إضافة خيار ✅</button>
        <div id="extrasList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function checkPass() {
        if(document.getElementById('passInput').value === 'Lovely333') {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadData();
        } else { alert("كلمة السر خطأ!"); }
    }

    // دالة حفظ الأصوات الجديدة
    function saveAudioSettings() {
        const audioData = {
            welcome: document.getElementById('welcomeMsgInput').value,
            ready: document.getElementById('readyMsgInput').value,
            msgText: document.getElementById('toastMsgInput').value
        };
        database.ref('settings/audio').set(audioData).then(() => {
            alert("تم تحديث التنبيهات الصوتية بنجاح! 😎");
        });
    }

    function addOffer() {
        const img = document.getElementById('offerImg').value;
        if(img) { database.ref('offers').push({ img }); document.getElementById('offerImg').value = ''; }
    }

    function addCoupon() {
        const code = document.getElementById('couponCode').value.trim();
        const type = document.getElementById('discountType').value;
        const val = document.getElementById('couponValue').value;
        if(code && val) {
            database.ref('coupons').child(code).set({ type: type, discount: parseFloat(val) });
            alert("تم التفعيل بنجاح!");
            document.getElementById('couponCode').value = ''; document.getElementById('couponValue').value = '';
        }
    }

    function addItem() {
        const ar = document.getElementById('itemAr').value;
        const en = document.getElementById('itemEn').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;
        const dept = document.getElementById('itemDept').value;
        if(ar && price) { database.ref('menu_items').push({ ar, en, price: parseFloat(price), img, dept }); alert("تمت الإضافة!"); }
    }

    function addExtra() {
        const ar = document.getElementById('extAr').value;
        const price = document.getElementById('extPrice').value;
        if(ar) { database.ref('extras_options').push({ ar, price: parseFloat(price) }); }
    }

    function saveSettings(type) {
        if(type === 'branding') {
            database.ref('settings/branding').update({
                name: document.getElementById('cafeName').value,
                logo: document.getElementById('logoUrl').value,
                bg: document.getElementById('bgUrl').value
            }).then(() => {
                alert("تم تحديث الخلفية والبراند بنجاح! 🚀");
            });
        }
    }

    function loadData() {
        // تحميل إعدادات الصوت والرسائل
        database.ref('settings/audio').once('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('welcomeMsgInput').value = d.welcome || "";
                document.getElementById('readyMsgInput').value = d.ready || "";
                document.getElementById('toastMsgInput').value = d.msgText || "";
            }
        });

        database.ref('offers').on('value', snap => {
            let h = "";
            snap.forEach(child => { h += `<div class="item-row"><img src="${child.val().img}" width="50"> <button class="btn-del" onclick="database.ref('offers/${child.key}').remove()">حذف</button></div>`; });
            document.getElementById('offersList').innerHTML = h;
        });

        database.ref('coupons').on('value', snap => {
            let h = "";
            snap.forEach(child => {
                const data = child.val();
                const sign = data.type === 'percent' ? '%' : 'ريال';
                h += `<div class="item-row"><span><b>${child.key}</b> (خصم ${data.discount} ${sign})</span> <button class="btn-del" onclick="database.ref('coupons/${child.key}').remove()">حذف</button></div>`;
            });
            document.getElementById('couponsList').innerHTML = h;
        });

        database.ref('menu_items').on('value', snap => {
            let h = "";
            snap.forEach(child => { h += `<div class="item-row"><span>${child.val().ar}</span><button class="btn-del" onclick="database.ref('menu_items/${child.key}').remove()">حذف</button></div>`; });
            document.getElementById('itemsList').innerHTML = h;
        });

        database.ref('extras_options').on('value', snap => {
            let h = "";
            snap.forEach(child => { h += `<div class="item-row">${child.val().ar} <button class="btn-del" onclick="database.ref('extras_options/${child.key}').remove()">حذف</button></div>`; });
            document.getElementById('extrasList').innerHTML = h;
        });

    database.ref('settings/branding').once('value', snap => {
        const s = snap.val();
        if(s) { 
            document.getElementById('cafeName').value = s.name || ""; 
            document.getElementById('logoUrl').value = s.logo || ""; 
            document.getElementById('bgUrl').value = s.bg || ""; 
        }
    });
  }
</script>
</body>
</html>
