<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Shadow | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --gold: #c8a27c; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 16px; }
        input:focus { border-color: var(--gold); }
        .btn-save { background: var(--green); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-save:active { transform: scale(0.98); }
        .menu-list { margin-top: 30px; }
        .item-card { background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚙️ إدارة منيو Alpha-Shadow</h2>
    
    <div class="input-group">
        <label>اسم المشروب (عربي)</label>
        <input type="text" id="nameAr" placeholder="مثلاً: سبانش لاتيه بارد">
    </div>
    
    <div class="input-group">
        <label>اسم المشروب (English)</label>
        <input type="text" id="nameEn" placeholder="e.g. Iced Spanish Latte">
    </div>
    
    <div class="input-group">
        <label>السعر (SAR)</label>
        <input type="number" id="price" placeholder="18">
    </div>
    
    <div class="input-group">
        <label>رابط الصورة (URL)</label>
        <input type="text" id="imgUrl" placeholder="ضع رابط الصورة هنا">
    </div>

    <button class="btn-save" onclick="addToMenu()">إضافة المشروب للمنيو ✨</button>

    <div class="menu-list" id="menuList">
        </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function addToMenu() {
        const ar = document.getElementById('nameAr').value;
        const en = document.getElementById('nameEn').value;
        const price = document.getElementById('price').value;
        const img = document.getElementById('imgUrl').value;

        if(ar && en && price) {
            database.ref('menu_items').push({
                ar: ar,
                en: en,
                price: parseInt(price),
                img: img || "https://via.placeholder.com/150"
            });
            alert("تمت الإضافة بنجاح يا قائد!");
            document.querySelectorAll('input').forEach(i => i.value = "");
        } else {
            alert("املأ الخانات الأساسية أولاً");
        }
    }

    // عرض المنيو الحالي للحذف أو المتابعة
    database.ref('menu_items').on('value', snap => {
        const list = document.getElementById('menuList');
        list.innerHTML = "<h4>الأصناف الحالية:</h4>";
        const data = snap.val();
        for(let id in data) {
            list.innerHTML += `
                <div class="item-card">
                    <div>
                        <b>${data[id].ar}</b><br>
                        <small>${data[id].price} SAR</small>
                    </div>
                    <button class="btn-delete" onclick="deleteItem('${id}')">حذف</button>
                </div>
            `;
        }
    });

    function deleteItem(id) {
        if(confirm("هل تريد حذف هذا الصنف؟")) {
            database.ref('menu_items').child(id).remove();
        }
    }
</script>

</body>
</html>
