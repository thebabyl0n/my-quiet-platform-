<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم 👑</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body {font-family: Cairo; background:#090c12; color:white; padding:20px;}
.card {background:#1a1f2b; padding:20px; border-radius:15px; margin-bottom:15px;}
button {padding:10px; border:none; border-radius:10px; cursor:pointer;}
input, select {width:100%; padding:10px; margin:5px 0; border-radius:10px; background:#111; color:white;}
</style>
</head>

<body>

<h2>👑 لوحة التحكم</h2>

<!-- إضافة قسم فرعي -->
<div class="card">
<h3>📂 إضافة قسم فرعي</h3>

<select id="mainDeptSelect">
<option value="barista">باريستا</option>
<option value="kitchen">مطبخ</option>
<option value="sweets">حلا</option>
</select>

<input id="newSubName" placeholder="اسم القسم">
<input id="subImg" placeholder="رابط الصورة">

<button onclick="addNewSubCategory()">إضافة قسم +</button>
</div>

<!-- إضافة صنف -->
<div class="card">
<h3>☕ إضافة صنف</h3>

<select id="selectSub"></select>

<input id="newItemAr" placeholder="الاسم عربي">
<input id="newItemEn" placeholder="الاسم إنجليزي">
<input id="newItemPrice" placeholder="السعر">
<input id="newItemImg" placeholder="الصورة">

<button onclick="addNewItem()">إضافة صنف 🚀</button>
</div>

<!-- عرض الأقسام -->
<div class="card">
<h3>🗑️ حذف الأقسام</h3>
<div id="deleteSubList"></div>
</div>

<!-- عرض الأصناف -->
<div class="card">
<h3>🗑️ حذف الأصناف</h3>
<div id="deleteItemList"></div>
</div>

<script>
const firebaseConfig = {
apiKey: "YOUR_KEY",
databaseURL: "YOUR_DB"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

//////////////////////////
// ✅ تحميل الأقسام حسب القسم الرئيسي
//////////////////////////
function loadCategories() {
const main = document.getElementById("mainDeptSelect").value;

db.ref("sub_categories").on("value", snap => {
let html = '<option value="">اختر قسم</option>';

snap.forEach(child => {
let data = child.val();

if (data.mainDept === main) {
html += `<option value="${child.key}">${data.name}</option>`;
}
});

document.getElementById("selectSub").innerHTML = html;
});
}

document.getElementById("mainDeptSelect").addEventListener("change", loadCategories);

//////////////////////////
// ✅ إضافة قسم فرعي
//////////////////////////
function addNewSubCategory() {
const name = document.getElementById("newSubName").value;
const main = document.getElementById("mainDeptSelect").value;
const img = document.getElementById("subImg").value;

if (!name) return alert("اكتب اسم القسم");

const key = db.ref("sub_categories").push().key;

db.ref("sub_categories/" + key).set({
name,
mainDept: main,
img: img || ""
});

alert("تم الإضافة ✅");
document.getElementById("newSubName").value="";
}

//////////////////////////
// ✅ إضافة صنف (تم إصلاحها)
//////////////////////////
function addNewItem() {
const subId = document.getElementById('selectSub').value;
const ar = document.getElementById('newItemAr').value;
const en = document.getElementById('newItemEn').value;
const price = document.getElementById('newItemPrice').value;
const img = document.getElementById('newItemImg').value;

if (!subId || !ar || !price) {
alert("فيه بيانات ناقصة");
return;
}

const key = db.ref('menu_items').push().key;

db.ref('menu_items/' + key).set({
subCategoryId: subId,
ar,
en,
price: parseFloat(price),
img: img || "",
status: "available"
});

alert("تم إضافة الصنف 🔥");

document.getElementById('newItemAr').value="";
document.getElementById('newItemEn').value="";
document.getElementById('newItemPrice').value="";
document.getElementById('newItemImg').value="";
}

//////////////////////////
// ✅ عرض الأقسام + حذف
//////////////////////////
db.ref("sub_categories").on("value", snap => {
let html="";

snap.forEach(child=>{
html += `
<div>
${child.val().name}
<button onclick="deleteSub('${child.key}')">❌</button>
</div>`;
});

document.getElementById("deleteSubList").innerHTML = html;
});

function deleteSub(id){
if(confirm("حذف القسم؟")){
db.ref("sub_categories/"+id).remove();
}
}

//////////////////////////
// ✅ عرض الأصناف + حذف
//////////////////////////
db.ref("menu_items").on("value", snap => {
let html="";

snap.forEach(child=>{
html += `
<div>
${child.val().ar}
<button onclick="deleteItem('${child.key}')">❌</button>
</div>`;
});

document.getElementById("deleteItemList").innerHTML = html;
});

function deleteItem(id){
if(confirm("حذف الصنف؟")){
db.ref("menu_items/"+id).remove();
}
}

//////////////////////////
// تشغيل أول مرة
//////////////////////////
loadCategories();

</script>

</body>
</html>
