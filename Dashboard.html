<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الرقابة والتحكم 👑</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #c8a27c; --dark: #0f141e; --card-bg: rgba(255, 255, 255, 0.05); --green: #22c55e; --blue: #3b82f6; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; text-align: center; }
        .card h3 { color: var(--gold); margin: 0; font-size: 14px; }
        .card span { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }
        .section-title { color: var(--gold); border-right: 4px solid var(--gold); padding-right: 15px; margin: 30px 0 15px; }
        .table-container { overflow-x: auto; background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(200,162,124,0.2); margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: var(--gold); color: black; font-size: 14px; }
        .timer-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .timer-running { background: var(--green); color: white; }
        .timer-late { background: #dc3545; color: white; animation: pulse 1s infinite; }
        .timer-fixed { background: #6c757d; color: white; }
        .btn { border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 2px; font-size: 12px; }
        .btn-pay { background: var(--gold); color: black; }
        .btn-archive { background: #6366f1; color: white; }
        .btn-clear { background: var(--red); color: white; margin-top: 10px; width: 100%; border-radius: 8px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:var(--gold);">👑 لوحة تحكم الإمبراطورية | الرقابة الإدارية</h1>
    
    <div class="grid">
        <div class="card">
            <h3>💰 مبيعات اليوم</h3>
            <span id="dailySales">0.00</span>
            <button class="btn btn-clear" onclick="clearArchive()">🗑️ تصفير وإغلاق الوردية</button>
        </div>
        <div class="card"><h3>⏳ طلبات نشطة</h3><span id="activeCount">0</span></div>
        <div class="card"><h3>📦 طلبات مؤرشفة</h3><span id="doneCount">0</span></div>
    </div>

    <h3 class="section-title">🟢 شاشة المتابعة (الطلبات النشطة)</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>التاريخ | الوقت</th>
                    <th>المكان</th>
                    <th>الأصناف</th>
                    <th>المجموع</th>
                    <th>الانتظار</th>
                    <th>حالة الطلب</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody id="liveTable"></tbody>
        </table>
    </div>

    <h3 class="section-title">🔵 الأرشيف النهائي (المُرحّل فقط)</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>التاريخ | الوقت</th>
                    <th>المكان</th>
                    <th>الأصناف</th>
                    <th>المجموع</th>
                    <th>مدة الخدمة</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function getWaitTime(o) {
        if (o.finalWait !== undefined && o.finalWait !== null) return o.finalWait;
        if (!o.time) return 0;
        const start = new Date(o.time);
        const now = new Date();
        const diff = Math.floor((now - start) / 60000);
        return diff > 0 ? diff : 0;
    }

    database.ref('live_orders').on('value', snapshot => {
        let liveRows = "";
        let historyRows = "";
        let activeCount = 0;
        let doneCount = 0;
        let totalSales = 0;

        snapshot.forEach((child) => {
            const o = child.val();
            const id = child.key;
            const waitTime = getWaitTime(o);
            const price = parseFloat(o.totalPrice) || 0;
            
            // تنسيق التاريخ لعرض الشهر واليوم فقط (مثال: 04-14)
            const dateStr = o.date ? o.date.slice(5) : '---';

            if (o.status !== "تم الترحيل للأرشيف 📦") {
                activeCount++;
                const isPaid = (o.status === "تمت المحاسبة ✅");
                const isReady = (o.finalWait !== undefined);
                const timerClass = isReady ? 'timer-fixed' : (waitTime > 10 ? 'timer-late' : 'timer-running');
                const statusColor = isPaid ? 'var(--green)' : (isReady ? 'var(--blue)' : 'white');

                liveRows = `<tr>
                    <td>${dateStr} | ${o.displayTime || '---'}</td>
                    <td>${o.type}</td>
                    <td>${o.items ? o.items.map(i => i.ar).join(' + ') : '---'}</td>
                    <td style="color:var(--gold); font-weight:bold;">${price.toFixed(2)}</td>
                    <td><span class="timer-badge ${timerClass}">${waitTime} دقيقة</span></td>
                    <td style="color:${statusColor}; font-weight:bold;">${o.status || "قيد التحضير ⏳"}</td>
                    <td>
                        <button class="btn btn-archive" onclick="archiveOrder('${id}')">مراجعة وترحيل 📦</button>
                    </td>
                </tr>` + liveRows;
            } else {
                doneCount++;
                totalSales += price;
                historyRows = `<tr>
                    <td>${dateStr} | ${o.displayTime || '---'}</td>
                    <td>${o.type}</td>
                    <td>${o.items ? o.items.map(i => i.ar).join(' + ') : '---'}</td>
                    <td>${price.toFixed(2)}</td>
                    <td><span class="timer-badge timer-fixed">${waitTime} دقيقة</span></td>
                    <td>مؤرشف ✅</td>
                </tr>` + historyRows;
            }
        });

        document.getElementById('liveTable').innerHTML = liveRows || '<tr><td colspan="7">لا يوجد طلبات</td></tr>';
        document.getElementById('historyTable').innerHTML = historyRows || '<tr><td colspan="6">الأرشيف فارغ</td></tr>';
        document.getElementById('activeCount').innerText = activeCount;
        document.getElementById('doneCount').innerText = doneCount;
        document.getElementById('dailySales').innerText = totalSales.toFixed(2);
    });

    function archiveOrder(id) {
        if(!confirm("ترحيل الطلب للأرشيف النهائي؟")) return;
        database.ref('live_orders/' + id).update({ status: "تم الترحيل للأرشيف 📦" });
    }

    function clearArchive() {
        if(!confirm("⚠️ تصفير الوردية سيمسح كل الأرشيف والبيانات القديمة، هل أنت متأكد؟")) return;
        database.ref('live_orders').once('value', (snapshot) => {
            snapshot.forEach((child) => {
                if (child.val().status === "تم الترحيل للأرشيف 📦") {
                    child.ref.remove();
                }
            });
            alert("✅ تم تصفير الوردية بنجاح.");
        });
    }
</script>
</body>
</html>
