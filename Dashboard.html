<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات الإمبراطورية | Alpha Shadow</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #c8a27c; --dark: #0f141e; --card-bg: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid var(--gold); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--gold); padding: 25px; border-radius: 20px; text-align: center; }
        .card h3 { color: var(--gold); margin: 0; font-size: 18px; }
        .card span { font-size: 32px; font-weight: bold; display: block; margin-top: 10px; }
        .table-container { margin-top: 40px; overflow-x: auto; background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(200,162,124,0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📊 لوحة التقارير الإدارية</h1>
        <p>مراقبة حية للأداء الفعلي</p>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>💰 إجمالي الدخل اليومي</h3>
            <span id="dailySales">0.00</span> <small>ريال</small>
        </div>
        <div class="card">
            <h3>📊 عدد طلبات اليوم</h3>
            <span id="ordersCount">0</span> <small>طلب</small>
        </div>
        <div class="card">
            <h3>🏆 الصنف الأكثر طلباً</h3>
            <span id="topItem">-</span>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الوقت</th>
                    <th>نوع الطلب</th>
                    <th>الأصناف المطلوبة</th>
                    <th>المجموع</th>
                    <th>الكوبون</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // استماع حي - مفيش بيانات وهمية
    database.ref('live_orders').on('value', snap => {
        let totalRev = 0; let oCount = 0; let itemsMap = {}; let rows = "";

        if (snap.exists()) {
            snap.forEach(child => {
                const o = child.val();
                // التأكد إن الأوردر سليم وفيه سعر (عشان نتجنب الـ undefined)
                if (o.totalPrice && o.totalPrice !== "undefined") {
                    totalRev += parseFloat(o.totalPrice);
                    oCount++;
                    
                    if (o.items) {
                        o.items.forEach(i => { itemsMap[i.ar] = (itemsMap[i.ar] || 0) + (i.qty || 1); });
                    }

                    let list = o.items ? o.items.map(i => i.ar).join(' + ') : "---";
                    rows = `<tr>
                        <td>${o.time || '--:--'}</td>
                        <td>${o.type || 'سفري'}</td>
                        <td>${list}</td>
                        <td style="color:var(--gold); font-weight:bold;">${o.totalPrice} ريال</td>
                        <td>${o.promoUsed || '-'}</td>
                    </tr>` + rows;
                }
            });
        }

        document.getElementById('dailySales').innerText = totalRev.toFixed(2);
        document.getElementById('ordersCount').innerText = oCount;
        document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="5">بانتظار أول أوردر ملكي... ⏳</td></tr>';
        
        let top = Object.keys(itemsMap).sort((a, b) => itemsMap[b] - itemsMap[a])[0];
        document.getElementById('topItem').innerText = top || "-";
    });
</script>
</body>
</html>
