<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات الإمبراطورية | Alpha Shadow</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #c8a27c; --dark: #0f141e; --card-bg: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; text-align: center; }
        .card h3 { color: var(--gold); margin: 0; font-size: 16px; }
        .card span { font-size: 28px; font-weight: bold; display: block; margin-top: 5px; }
        .table-container { margin-top: 30px; overflow-x: auto; background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(200,162,124,0.2); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: var(--gold); color: black; }
        .timer-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .timer-new { background: #28a745; color: white; }
        .timer-late { background: #dc3545; color: white; animation: pulse 1s infinite; }
        .done-btn { background: #c8a27c; color: #000; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .done-btn:hover { background: #fff; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1 style="text-align:center; color:var(--gold);">📊 لوحة الرقابة والتحليل (الإمبراطورية)</h1>
    
    <div class="grid">
        <div class="card">
            <h3>💰 صافي دخل اليوم (المحاسب عليه)</h3>
            <span id="dailySales">0.00</span> <small>ريال</small>
        </div>
        <div class="card">
            <h3>📊 طلبات جارية (قيد التحضير)</h3>
            <span id="ordersCount">0</span>
        </div>
        <div class="card">
            <h3>🏆 الصنف الأكثر مبيعاً</h3>
            <span id="topItem">-</span>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>وقت الطلب</th>
                    <th>النوع</th>
                    <th>الأصناف</th>
                    <th>المجموع</th>
                    <th>الانتظار</th>
                    <th>الإجراء</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // دالة حساب الوقت الحقيقي بناءً على التنسيق العالمي ISO
    function getWaitTime(isoTime) {
        if(!isoTime) return 0;
        const start = new Date(isoTime);
        const now = new Date();
        const diff = Math.floor((now - start) / 60000);
        return diff > 0 ? diff : 0;
    }

    // 1. حساب المبيعات من "التاريخ" (الأوردرات اللي خلصت فعلاً)
    database.ref('history_orders').on('value', snap => {
        let historyTotal = 0;
        snap.forEach(child => {
            const o = child.val();
            let p = parseFloat(o.totalPrice) || 0;
            historyTotal += p;
        });
        document.getElementById('dailySales').innerText = historyTotal.toFixed(2);
    });

    // 2. مراقبة الطلبات الحية
    database.ref('live_orders').on('value', snap => {
        let oCount = 0; let itemsMap = {}; let rows = "";

        snap.forEach(child => {
            const o = child.val();
            const orderId = child.key;
            let price = parseFloat(o.totalPrice) || 0;
            oCount++;
            
            if (o.items) {
                o.items.forEach(i => { itemsMap[i.ar] = (itemsMap[i.ar] || 0) + (i.qty || 1); });
            }

            // استخدام الحساب الدقيق للوقت
            const waitTime = getWaitTime(o.time);
            const timerClass = waitTime > 10 ? 'timer-late' : 'timer-new';

            rows = `<tr>
                <td>${o.displayTime || '--:--'}</td>
                <td>${o.type || 'سفري'} ${o.table !== 'سفري' ? '['+o.table+']' : ''}</td>
                <td>${o.items ? o.items.map(i => i.ar).join(' + ') : '---'}</td>
                <td style="color:var(--gold); font-weight:bold;">${price.toFixed(2)} ريال</td>
                <td><span class="timer-badge ${timerClass}">${waitTime} دقيقة</span></td>
                <td><button class="done-btn" onclick='completeOrder("${orderId}", ${JSON.stringify(o)})'>تم المحاسبة</button></td>
            </tr>` + rows;
        });

        document.getElementById('ordersCount').innerText = oCount;
        document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="6">لا يوجد طلبات جارية حالياً...</td></tr>';
        
        let top = Object.keys(itemsMap).sort((a, b) => itemsMap[b] - itemsMap[a])[0];
        document.getElementById('topItem').innerText = top || "-";
    });

    // 3. وظيفة إنهاء الطلب ونقله للتاريخ
    function completeOrder(id, data) {
        const historyRef = database.ref('history_orders').push();
        const historyData = {
            ...data,
            finishTime: new Date().toISOString(),
            status: "تم التسليم ✅"
        };

        historyRef.set(historyData).then(() => {
            database.ref('live_orders/' + id).remove();
        }).catch(err => alert("حدث خطأ في النقل: " + err));
    }

    // تحديث الشاشة كل دقيقة لتحديث عداد الوقت تلقائياً
    setInterval(() => { location.reload(); }, 60000);
</script>
</body>
</html>
