<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>POS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<!-- 👇 حطي Chart هنا -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    display: grid;
    grid-template-columns: 60% 40%;
    height: 100vh;
}


.left, .right {
    background: #1e293b;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}


.header {
    background: #1e293b;
    padding: 15px;
    border-radius: 16px;
    margin-bottom: 15px;
    font-size: 20px;
    text-align: center;
}



.cart-item {
    background: #020617;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
}


.item {
    background: #020617;
    border-radius: 14px;
    padding: 14px;
    border: 1px solid #334155;
    transition: 0.2s;
}

.item:hover {
    transform: translateY(-3px);
    background: #334155;
}


#cart {
    margin-top: 10px;
}

#total {
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
    color: #22c55e;
}

.left > div {
    margin-bottom: 10px;
}


button {
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
    background: #334155;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

button:hover {
    transform: scale(1.05);
    opacity: 0.95;
}

button:active {
    transform: scale(0.95);
}


/* الأقسام (الفولدرات) */
.cat-container { 
    display: flex; 
    gap: 8px; 
    margin: 10px 0; 
    overflow-x: auto; 
    padding: 5px; 
}
.cat-btn { 
    background: #3b82f6; 
    border: none; 
    color: white; 
    padding: 8px 15px; 
    border-radius: 15px; 
    cursor: pointer; 
    white-space: nowrap; 
}
.cat-btn.active { background: #22c55e; }

.btn-green { background: #22c55e; }
.btn-red { background: #ef4444; }
.btn-yellow { background: #f59e0b; }
.btn-blue { background: #3b82f6; }
.btn-full { width: 100%; font-size: 18px; padding: 15px; }

/* تعديل شبكة الأصناف */
#items { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
    gap: 10px; 
}
.item {
    background: #020617;
    border-radius: 14px;
    padding: 14px;
    border: 1px solid #334155;
    transition: 0.2s;
}

.item:hover {
    transform: translateY(-3px);
    background: #334155;
}

.item:hover {
    transform: scale(1.05);
    background: #334155;
}
.item-p { color: #22c55e; display: block; font-size: 13px; margin-top: 5px; }

.item-p { color: #22c55e; display: block; font-size: 13px; }

/* 👇 ضيفي هنا */
#orderTabs button{
    font-weight:bold;
    border-radius:10px;
    padding:8px 12px;
    transition:0.3s;
}
#orderTabs button:hover{
    transform:scale(1.05);
}


.table {
    padding:15px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
}

.free { background:#22c55e; }   /* أخضر */
.busy { background:#ef4444; }   /* أحمر */
.open { background:#f59e0b; }   /* أصفر */

</style>
</head>

<body>

<div id="salesBox" style="
display:none;
margin:20px;
background:#1e293b;
padding:15px;
border-radius:12px;
">

<h3>📊 مبيعات الأيام</h3>

<h3>🔥 الأكثر مبيعًا</h3>
<canvas id="topChart"></canvas>

<!-- فلترة -->
<select onchange="changeView(this.value)" style="
margin-bottom:10px;
padding:5px;
border-radius:6px;
">
<option value="day">يومي</option>
<option value="month">شهري</option>
</select>

<canvas id="salesChart"></canvas>

</div>

<div id="loginBox" style="
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
">

<h2>🔐 تسجيل الدخول</h2>

<input id="user" placeholder="اسم المستخدم" style="margin:5px;padding:10px;">
<input id="pass" placeholder="كلمة السر" type="password" style="margin:5px;padding:10px;">

<button onclick="login()" style="padding:10px 20px;background:#22c55e;color:white;border:none;border-radius:8px;">
دخول
</button>

</div>
<div class="header">
    ☕ POS System
</div>

<div id="statsBox" style="
display:flex;
gap:10px;
margin-bottom:10px;
">
    <div style="flex:1;background:#020617;padding:10px;border-radius:10px;">
        💰 <span id="todayTotal">0</span> ريال
    </div>

    <div style="flex:1;background:#020617;padding:10px;border-radius:10px;">
        🧾 <span id="orderCount">0</span> طلب
    </div>
</div>

<div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
    <input id="search" placeholder="🔍 بحث" 
    oninput="searchItems(this.value)" 
    style="flex:1; padding:8px; border-radius:8px; border:none;">

    <!-- 👇 اسم الكاشير -->
    <span id="cashierName" style="font-weight:bold;"></span>

    <!-- 👇 زرار الخروج -->
<button onclick="logout()" class="btn-red" style="
    border-radius:50%;
    width:40px;
    height:40px;
    font-size:18px;
">
🚪
</button>

<button onclick="toggleSales()" style="
background:#22c55e;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:10px;
">
عرض المبيعات 📊
</button>

</div>
<div id="mainCategories" class="main-depts"></div>
<div id="categories" class="cat-container"></div>
<div id="items"></div>
</div>
<div style="
position: fixed;
bottom: 10px;
left: 10px;
right: 10px;
z-index: 999;
">
<button onclick="newOrder()" class="btn-green btn-full">
🆕 فاتورة جديدة
</button>

</div>
<div class="right">

<div id="orderTabs"></div> <!-- 👈 هنا بالظبط -->

<h3>🧾 الفاتورة</h3>

<select id="orderType">
<option value="محلي">محلي</option>
<option value="سفري">سفري</option>
</select>

<div id="tables" style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:10px 0;
"></div>

<div id="cart"></div>
<div id="total">0 ريال</div>
<textarea id="note" placeholder="📝 ملاحظات (مثال: بدون سكر - زيادة صوص)" 
style="width:100%; margin-top:10px; padding:8px; border-radius:8px;"></textarea>

<div id="statusBox" style="margin-top:10px; font-size:14px;"></div>

<button onclick="sendOrder()" class="btn-green">➕ إضافة</button>
<button onclick="completeOrder()" class="btn-yellow">💰 تحصيل</button>
<button onclick="printBill()" class="btn-blue">🧾 طباعة</button>
<button onclick="closeShift()" class="btn-blue">📊 تقفيل وردية</button>
<button onclick="restoreOrders()" class="btn-yellow">
🔄 استرجاع الطلبات
</button>

<script>
const firebaseConfig = {
 apiKey: "AIzaSy...",
 databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let orders = [];
let currentOrderIndex = 0;
let allItems = {};
let selectedTable = null;

let mainCategories = {};

db.ref('main_categories').on('value', snap => {
    mainCategories = snap.val() || {};
    renderMainCategories();
});

// 2. دالة الفلترة عشان الأزرار تشتغل
let currentCategory = 'all';
let allSubCats = {}; 

// 1. سحب كل الأقسام الفرعية وتخزينها
db.ref('sub_categories').on('value', snap => {
    allSubCats = snap.val() || {};
    loadSubDepts('barista'); // يفتح أوتوماتيك على الباريستا
});

// 2. وظيفة عرض الأقسام الفرعية بناءً على القسم الرئيسي
function loadSubDepts(mainName) {
    // 1. تلوين الزرار الكبير اللي ضغطت عليه (باريستا/حلا/مطبخ)
    // ملاحظة: لو مدي للزراير id أو class تقدر تميزهم بيه
    
   let html = `<button class="cat-btn active" onclick="filterCat('all', this)">الكل</button>`;
    
    let foundAny = false;
    Object.keys(allSubCats).forEach(key => {
        let cat = allSubCats[key];
        // بنفلتر الأقسام الفرعية اللي تابعة للقسم الكبير ده
        if (cat.mainDept === mainName || cat.parent === mainName) {
            html += `<button class="cat-btn" onclick="filterCat('${key}', this)">${cat.name}</button>`;
            foundAny = true;
        }
    });

    // 2. تحديث قائمة الأقسام الفرعية
    document.getElementById('categories').innerHTML = html || "<p style='color:#666'>لا توجد أقسام فرعية</p>";

    // 3. التعديل اللي إنت عايزه (إخفاء الأصناف)
    // أول ما تدوس على باريستا، شاشة الأصناف تفضى وتستنى تختار قسم فرعي
    document.getElementById('items').innerHTML = `<p style='text-align:center; width:100%; color:var(--gold);'>اختر قسماً فرعياً (مثل: ${mainName}) لعرض المنتجات</p>`;
}

function filterCat(catId, btn) {
    currentCategory = catId;
    
    // تلوين الزرار النشط
    if(btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    let itemsArray = Object.values(allItems);
    
    // هنا التكة: بنخلي البرنامج يدور في الـ sub_id اللي الداشبورد بيبعتها
    let filtered = catId === 'all' ? itemsArray : itemsArray.filter(i => {
        return i.sub_id === catId || i.categoryId === catId;
    });
    
    renderItems(filtered);
}


// تحميل الأصناف
db.ref('menu_items').on('value', snap=>{
    allItems = snap.val() || {};
    filterCat(currentCategory);
});

// عرض الأصناف
function renderItems(items){
    let html="";
    items.forEach(i=>{
        html += `
        <div class="item" onclick="add('${i.id}')">
            <strong>${i.ar}</strong>
            <span class="item-p">${i.price} ريال</span>
        </div>`;
    });
    document.getElementById('items').innerHTML = html;
}


function renderTables(){

    db.ref('live_orders').once('value', snap => {

        let data = snap.val() || {};
        let html = "";

        for(let i=1; i<=12; i++){
            let status = "free";

            let tableKey = 'T_' + i;

            if(data[tableKey]){
                if(data[tableKey].status === "open"){
                    status = "open"; // أصفر
                }else{
                    status = "busy"; // أحمر (لو اتحاسب)
                }
            }

            html += `
            <div class="table ${status}" onclick="selectTable(${i})">
                T${i}
            </div>`;
        }

        document.getElementById("tables").innerHTML = html;

    });
}

function selectTable(num){

    let tableKey = 'T_' + num;

    db.ref('live_orders/' + tableKey).once('value', snap => {

        if(snap.exists()){
            let data = snap.val();

            // 👇 ندور لو الفاتورة دي مفتوحة قبل كده
            let existingIndex = orders.findIndex(o => o.orderPath === tableKey);

            if(existingIndex !== -1){
                currentOrderIndex = existingIndex;
            }else{
                // 👇 نضيفها كفاتورة جديدة (تاب جديد)
                orders.push({
                    items: data.items.map(i => ({
                        ar: i.ar,
                        qty: i.qty,
                        price: i.p
                    })),
                    orderPath: tableKey
                });

                currentOrderIndex = orders.length - 1;
            }

            selectedTable = num;

            renderCart();
            renderOrderTabs();

            alert("تم فتح الفاتورة 👌");

        }else{
            // 👇 ترابيزة فاضية = فاتورة جديدة
            newOrder();
            selectedTable = num;
        }

    });
}

// إضافة للكارت
function add(name){

if(!orders[currentOrderIndex]){
    orders[currentOrderIndex] = {
        items: [],
        orderPath: null
    };
}

    let item = Object.values(allItems).find(i=>i.id===name);

    let cart = orders[currentOrderIndex].items;

    let found = cart.find(i=>i.ar===name);

    if(found) found.qty++;
    else cart.push({...item, qty:1});

    renderCart();
    
    saveOrdersToFirebase();
}

function restoreOrders(){

    loadLocalOrders();

    renderCart();
    renderOrderTabs();
    renderTables();

    alert("تم استرجاع الطلبات 🔄");
}

// عرض الكارت
function renderCart(){

    let cart = orders[currentOrderIndex]?.items || [];

    let html="", total=0;

    cart.forEach((i,idx)=>{
        total += i.price*i.qty;

        html += `<div class="cart-item" style="flex-direction:column; align-items:flex-start;">
    
    <div style="display:flex; justify-content:space-between; width:100%;">
        <span>${i.ar} x ${i.qty}</span>

        <div>
            <button onclick="change(${idx},1)">+</button>
            <button onclick="change(${idx},-1)">-</button>
        </div>
    </div>

<button onclick="openNotePopup(${idx})" style="
    margin-top:5px;
    background:${i.note ? '#f59e0b' : '#334155'};
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
">
📝 ${i.note ? "✏️ تعديل الملاحظة" : "➕ إضافة ملاحظة"}
</button>

</div>`;


    });

    document.getElementById('cart').innerHTML = html;
    document.getElementById('total').innerText = total + " ريال";

}

async function getTakeaway(){
    let snap = await db.ref('takeaway_counter').once('value');
    let num = snap.val() || 1;

    await db.ref('takeaway_counter').set(num + 1);

    return num;
}

// إرسال الطلب
async function sendOrder(){

renderTables();
    // 👇 حطها هنا بالظبط
    if(orders[currentOrderIndex]?.orderPath){
        return alert("تم إرسال الطلب قبل كده ⚠️");
    }

    let cart = orders[currentOrderIndex]?.items || [];

    if(cart.length === 0) return alert("السلة فاضية!");
    document.getElementById("note").value = "";

    let type = document.getElementById('orderType').value;
    let table = selectedTable;
    if(type === "محلي" && !table){
    return alert("اختار ترابيزة الأول ❗");
}

    let cashier = sessionStorage.getItem("cashier");

let order = {
    items: cart.map(i => ({
        ar: i.ar,
        qty: i.qty,
        p: i.price,
        note: i.note || "",
        dept: i.dept || "kitchen"
    })), // 👈 مهم جدًا

    totalPrice: cart.reduce((t, i) => t + (i.price * i.qty), 0),
    
    status: "open",
    type: type,
    table: table,
    cashier: cashier,
    note: document.getElementById("note").value || "", // 👈 دي المهمة
    time: new Date().toISOString()
};

    let orderPath;

    if(type === "محلي"){
        orderPath = 'T_' + table;
    }else{
        let num = await getTakeaway();
        order.orderNum = num;
        orderPath = 'TA_' + num;
    }

    db.ref('live_orders/' + orderPath).set(order);

// 👇 احفظه جوه الأوردر
   orders[currentOrderIndex].orderPath = orderPath;
   saveOrdersToFirebase();

    let shiftId = localStorage.getItem("shiftId");

    if(!shiftId){
        shiftId = "shift_" + Date.now();
        localStorage.setItem("shiftId", shiftId);
    }

    db.ref('shifts/' + shiftId + '/' + orderPath).set(order);

    watchOrderStatus();

    alert("تم إرسال الطلب ✅");
}

function completeOrder(){

    let id = orders[currentOrderIndex]?.orderPath;

    if(!id){
        return alert("الطلب لسه متبعتش ❌");
    }

    // ❌ بدل update
    // ✅ امسح الأوردر
    db.ref('live_orders/'+id).remove();

    // حذف من الليست عندك
    orders.splice(currentOrderIndex, 1);
    currentOrderIndex = 0;

    saveOrdersToFirebase();

    renderCart();
    renderOrderTabs();
    renderTables(); // 👈 مهم جدا

    alert("تم التحصيل 💰");

    newOrder();
}

function printBill(){

    let cart = orders[currentOrderIndex]?.items || [];
    let total = 0;

    let itemsHTML = "";

    cart.forEach(i=>{
        total += i.price * i.qty;

        itemsHTML += `
        <tr>
            <td>${i.ar}</td>
            <td>${i.qty}</td>
            <td>${i.price}</td>
            <td>${i.price * i.qty}</td>
        </tr>`;
    });

    let cashier = sessionStorage.getItem("cashier") || "";
    let date = new Date().toLocaleString();

    let html = `
    <html dir="rtl">
    <head>
    <title>فاتورة</title>
    <style>
        body { font-family: sans-serif; text-align:center; }
        table { width:100%; border-collapse: collapse; margin-top:10px;}
        td, th { border-bottom:1px dashed #000; padding:5px; }
        h2 { margin-bottom:5px; }
    </style>
    </head>

    <body>

        <h2>☕ POS SYSTEM</h2>
        <p>${date}</p>
        <p>👤 الكاشير: ${cashier}</p>

        <table>
            <tr>
                <th>الصنف</th>
                <th>الكمية</th>
                <th>السعر</th>
                <th>الإجمالي</th>
            </tr>

            ${itemsHTML}
        </table>

        <h3>💰 الإجمالي: ${total} ريال</h3>

        <p>شكراً لزيارتكم ❤️</p>

    </body>
    </html>
    `;

    let w = window.open("");
    w.document.write(html);
    w.print();
    w.close();
}

function newOrder(){

    let orderNumber = Date.now();

    orders.push({
        items: [],
        orderNumber: orderNumber,
        orderPath: null
    });

    selectedTable = null; // 👈 مهم جدًا

    saveOrdersToFirebase();

    currentOrderIndex = orders.length - 1;

    renderCart();
    renderOrderTabs();
    renderTables(); // 👈 عشان يحدث الألوان

        alert("تم فتح فاتورة رقم " + orderNumber);
}

// متابعة حالة الأقسام
function watchOrderStatus(){

    let id = orders[currentOrderIndex]?.orderPath;

    if(!id) return;

    db.ref('live_orders/' + id).on('value', snap => {
        let o = snap.val();
        if(!o) return;

        document.getElementById('statusBox').innerHTML = `
        <span style="color:${o.baristaReady ? '#22c55e' : '#fbbf24'}">☕ باريستا</span> |
        <span style="color:${o.kitchenReady ? '#22c55e' : '#fbbf24'}">🍳 مطبخ</span> |
        <span style="color:${o.dessertReady ? '#22c55e' : '#fbbf24'}">🍰 حلا</span>
        `;
    });
}


let currentNoteIndex = null;

function openNotePopup(index){
    currentNoteIndex = index;

    let item = orders[currentOrderIndex].items[index];

    document.getElementById("popupNote").value = item.note || "";

    document.getElementById("notePopup").style.display = "flex";
}

function closeNotePopup(){
    document.getElementById("notePopup").style.display = "none";
}

function saveNote(){
    let value = document.getElementById("popupNote").value;

    if(currentNoteIndex !== null){
        orders[currentOrderIndex].items[currentNoteIndex].note = value;
    }

    saveOrdersToFirebase();
    renderCart();
    closeNotePopup();
}

function searchItems(text){
    let itemsArray = Object.values(allItems);

    let filtered = itemsArray.filter(i =>
        i.ar.toLowerCase().includes(text.toLowerCase())
    );

    renderItems(filtered);
}

function login(){

    let name = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value.trim();

    console.log("entered:", name, pass); // 👈 هنا

    if(!name || !pass){
        alert("اكتب البيانات");
        return;
    }

    db.ref('users/' + name).once('value', snap => {

        let data = snap.val();

        console.log("firebase:", data); // 👈 وهنا

        if(!data){
            alert("المستخدم غير موجود ❌");
            return;
        }
        
                // 👇 هنا بالظبط
        if(data.role !== "cashier"){
            alert("مش مصرح ❌");
            return;
        }

        if(String(data.pass) !== String(pass)){
            alert("كلمة السر غلط ❌");
            return;
        }

        alert("تمام دخل 👌"); // 👈 اختبار

        sessionStorage.setItem("cashier", name);

        document.getElementById("loginBox").style.display = "none";
    });
}

// تقفيل وردية
function closeShift(){

    let shiftId = localStorage.getItem("shiftId");

    db.ref('shifts/' + shiftId).once('value', snap=>{
        let total=0;

        snap.forEach(o=>{
            total += o.val().totalPrice || 0;
        });

        alert("إجمالي الوردية: " + total + " ريال");

        localStorage.removeItem("shiftId");
    });
}

function logout(){

    sessionStorage.removeItem("cashier"); // ✅ الصح

    document.getElementById("loginBox").style.display = "flex";

    alert("تم تسجيل الخروج 👋");
}

function switchOrder(index){
    currentOrderIndex = index;
    renderCart();
    renderOrderTabs();
}

// 👇 حطي هنا بالظبط
function renderOrderTabs(){
    let html = "";

    orders.forEach((o, index)=>{

        let color = "#334155";

        if(o.orderPath){
            color = "#f59e0b"; // أوردر مفتوح
        }

        if(index === currentOrderIndex){
            color = "#22c55e"; // الحالي
        }

        html += `
        <div style="display:inline-flex; align-items:center; margin:3px;">
            
            <button onclick="switchOrder(${index})" style="
                background:${color};
                color:white;
                border:none;
                padding:6px 10px;
                border-radius:8px 0 0 8px;
            ">
            🧾 ${o.orderPath ? o.orderPath : index + 1}
            </button>

            <button onclick="closeTab(${index})" style="
                background:#ef4444;
                color:white;
                border:none;
                padding:6px 8px;
                border-radius:0 8px 8px 0;
                cursor:pointer;
            ">
            ❌
            </button>

        </div>`;
    });

    document.getElementById("orderTabs").innerHTML = html;
}

function closeTab(index){

    // لو دي الفاتورة الحالية
    if(index === currentOrderIndex){
        orders.splice(index, 1);

        currentOrderIndex = 0;
    }else{
        orders.splice(index, 1);
    }

    // لو مفيش فواتير خالص
    if(orders.length === 0){
        newOrder();
    }

    saveOrdersToFirebase();
    renderOrderTabs();
    renderCart();
}

function getSalesPerMonth(){

    db.ref('shifts').once('value', snap => {

        let data = snap.val() || {};
        let months = {};

        Object.values(data).forEach(shift => {
            Object.values(shift).forEach(order => {

                let d = new Date(order.time);
                let month = d.getFullYear() + "-" + (d.getMonth()+1);

                if(!months[month]) months[month] = 0;

                months[month] += order.totalPrice || 0;
            });
        });

        drawChart(months);
    });
}

let chartInstance;

function drawChart(data){

    let labels = Object.keys(data);
    let values = Object.values(data);

    let ctx = document.getElementById('salesChart').getContext('2d');

    // يمسح القديم
    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'المبيعات',
                data: values,
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34,197,94,0.2)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: { color: 'white' }
                }
            },
            scales: {
                x: {
                    ticks: { color: 'white' }
                },
                y: {
                    ticks: { color: 'white' }
                }
            }
        }
    });
}

function saveLocalOrders(){
    localStorage.setItem("orders_backup", JSON.stringify(orders));
}


function loadLocalOrders(){
    let data = localStorage.getItem("orders_backup");

    if(data){
        orders = JSON.parse(data);
    }
}

function getTopItems(){

    db.ref('shifts').once('value', snap => {

        let data = snap.val() || {};
        let items = {};

        Object.values(data).forEach(shift => {
            Object.values(shift).forEach(order => {

                if(order.items){
                    order.items.forEach(i => {

                       let name = i.ar;

                        if(!items[name]) items[name] = 0;

                        items[name] += i.qty || 1;
                    });
                }

            });
        });

        drawPieChart(items);
    });
}


let pieInstance;

function drawPieChart(data){

    let labels = Object.keys(data);
    let values = Object.values(data);

    let ctx = document.getElementById('topChart').getContext('2d');

    if(pieInstance){
        pieInstance.destroy();
    }

    pieInstance = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: [
                    '#22c55e',
                    '#3b82f6',
                    '#f59e0b',
                    '#ef4444',
                    '#a855f7',
                    '#14b8a6'
                ]
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: { color: 'white' }
                }
            }
        }
    });
}


function getSalesPerDay(){

    db.ref('shifts').once('value', snap => {

        let result = {};

        snap.forEach(shift => {

            shift.forEach(order => {

                let date = new Date(order.val().time).toLocaleDateString();

                result[date] = (result[date] || 0) + order.val().totalPrice;

            });

        });

        console.log(result);

        drawChart(result);

    });
}
