<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>POS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<!-- 👇 حطي Chart هنا -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  
:root {  
    --bg: #0f172a;  
    --card: #1e293b;  
    --soft: #020617;  
    --green: #22c55e;  
    --blue: #3b82f6;  
    --text: #ffffff;  
}  
  
/* 🧱 Layout */  
body {  
    background: var(--bg);  
    color: var(--text);  
    font-family: 'Cairo', sans-serif;  
    display: grid;  
    grid-template-columns: 60% 40%;  
    height: 100vh;  
    margin: 0;  
    gap: 10px;  
    padding: 10px;  
}  
  
/* 🔝 Top Bar */  
.top-bar{  
    display:flex;  
    justify-content:space-between;  
    align-items:center;  
    padding:15px 20px;  
    background:linear-gradient(90deg,#0f172a,#1e293b);  
    border-radius:15px;  
}  
  
.top-actions{  
    display:flex;  
    align-items:center;  
    gap:10px;  
}  
  
.search{  
    padding:8px 12px;  
    border-radius:20px;  
    border:none;  
    background:#020617;  
    color:white;  
}  
  
.user{  
    background:#ef4444;  
    padding:6px 12px;  
    border-radius:20px;  
}  
  
/* 📦 Sections */  
.left, .right {  
    background: var(--card);  
    border-radius: 20px;  
    padding: 12px;  
}  
  
/* 🔘 Buttons */  
button {  
    border-radius: 10px;  
    font-weight: bold;  
    transition: 0.2s;  
}  
  
button:hover {  
    transform: scale(1.05);  
}  
  
/* 🎨 Colors */  
.btn-green { background: var(--green); }  
.btn-blue { background: var(--blue); }  
.btn-red { background: #ef4444; }  
.btn-yellow { background: #f59e0b; }  
  
/* 🛍️ Items Grid */  
#items {  
    display: grid;  
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));  
    gap: 15px;  
}  
  
.item {  
    background: #1e293b;  
    border-radius: 16px;  
    padding: 10px;  
    text-align: center;  
    position: relative;  
    transition: 0.25s;  
}  
  
.item:hover{  
    transform:translateY(-5px);  
    box-shadow:0 8px 20px rgba(0,0,0,0.3);  
}  
  
.item img {  
    width: 100%;  
    height: 100px;  
    object-fit: cover;  
    border-radius: 12px;  
}  
  
.item-p {  
    color: var(--green);  
    font-weight: bold;  
}  
  
/* ➕ زر الإضافة */  
.item button {  
    background: var(--green);  
    border: none;  
    color: white;  
    width: 35px;  
    height: 35px;  
    border-radius: 50%;  
    font-size: 18px;  
    cursor: pointer;  
}  
  
.item button:hover {  
    transform: scale(1.1);  
}  
  
/* ✨ Shine Effect (سيبناه عشان الشكل) */  
.item::after {  
    content: "";  
    position: absolute;  
    top: 0;  
    left: -100%;  
    width: 100%;  
    height: 100%;  
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);  
    transition: 0.5s;  
}  
  
.item:hover::after {  
    left: 100%;  
}  
  
/* 🧾 Cart */  
#cart {  
    background: #020617;  
    border-radius: 16px;  
    padding: 15px;  
    box-shadow: 0 0 15px rgba(34,197,94,0.15);  
    transition: 0.3s;  
}  
  
#cart:hover {  
    box-shadow: 0 0 25px rgba(34,197,94,0.3);  
}  
  
.cart-item {  
    background: #1e293b;  
    border-radius: 12px;  
    padding: 10px;  
    margin-bottom: 8px;  
}  
  
/* 💰 Total */  
#total {  
    font-size: 22px;  
    color: var(--green);  
    text-align: center;  
}  
  
/* 🍽️ Tables */  
.table {  
    padding: 10px;  
    border-radius: 10px;  
    text-align: center;  
    font-weight: bold;  
}  
  
.free { background: #22c55e; }  
.busy { background: #ef4444; }  
.open { background: #f59e0b; }  
  
/* 🧠 Smooth Animation (مهم للسلة الطايرة) */  
.dept-badge, .status-circle, [id*="circle"] {   
    transition: 1.2s cubic-bezier(0.22, 1, 0.36, 1);  
}  
  
  
</style>
</head>

<body>

<!-- 🔝 Top Bar -->
<div class="top-bar">

    <div class="logo">☕ POS System</div>

    <div class="top-actions">

        <!-- 📊 زر المبيعات -->
        <button onclick="toggleSales()" class="btn-green">
            📊
        </button>

        <!-- 👤 المستخدم -->
        <div class="user" id="username">👤</div>
        
            <!-- 👇 ضيفي ده هنا -->
    <div id="cashierName" style="color:white; font-weight:bold;"></div>

        <!-- 🔍 بحث -->
        <input type="text" placeholder="بحث..." class="search"
        oninput="searchItems(this.value)">

        <!-- 🚪 خروج -->
        <button onclick="logout()" class="btn-red">🚪</button>

    </div>
</div>

<!-- 📊 Sales Popup -->
<div id="salesBox" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:600px;
background:#1e293b;
padding:20px;
border-radius:15px;
z-index:999;
">

<h3>📊 المبيعات</h3>

<h4>🔥 الأكثر مبيعًا</h4>
<canvas id="topChart"></canvas>

<h4>🧾 آخر الطلبات</h4>
<table id="lastOrders" style="width:100%;color:white;"></table>

<select onchange="changeView(this.value)">
<option value="day">يومي</option>
<option value="month">شهري</option>
</select>

<canvas id="salesChart"></canvas>

<button onclick="toggleSales()" class="btn-red">❌ إغلاق</button>

</div>

<!-- 🔐 Login -->
<div id="loginBox" style="
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
">

<h2>🔐 تسجيل الدخول</h2>

<input id="user" placeholder="اسم المستخدم">
<input id="pass" type="password" placeholder="كلمة السر">

<button onclick="login()" class="btn-green">دخول</button>

</div>

<!-- 📊 Stats -->
<div id="statsBox" style="display:flex; gap:10px; margin:10px 0;">
    <div style="flex:1;background:#020617;padding:10px;border-radius:10px;">
        💰 <span id="todayTotal">0</span> ريال
    </div>

    <div style="flex:1;background:#020617;padding:10px;border-radius:10px;">
        🧾 <span id="orderCount">0</span> طلب
    </div>
</div>

<!-- 📦 Categories & Items -->
<div id="mainCategories"></div>
<div id="categories"></div>
<div id="items"></div>

<!-- 🆕 New Order -->
<div style="position:fixed; bottom:10px; left:10px; right:10px;">
    <button onclick="newOrder()" class="btn-green" style="width:100%;">
        🆕 فاتورة جديدة
    </button>
</div>

<!-- 💳 Right Side -->
<div class="right">

<div id="orderTabs"></div>

<h3>🧾 الفاتورة</h3>

<select id="orderType">
<option value="محلي">محلي</option>
<option value="سفري">سفري</option>
</select>

<div id="tables" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;"></div>

<div id="cart"></div>
<div id="total">0 ريال</div>

<textarea id="note" placeholder="ملاحظات"></textarea>

<div id="statusBox"></div>

<button onclick="sendOrder()" class="btn-green">➕ إضافة</button>
<button onclick="completeOrder()" class="btn-yellow">💰 تحصيل</button>
<button onclick="printBill()" class="btn-blue">🧾 طباعة</button>
<button onclick="closeShift()" class="btn-blue">📊 تقفيل وردية</button>
<button onclick="restoreOrders()" class="btn-yellow">🔄 استرجاع</button>
</button>

<script>  
const firebaseConfig = {  
 apiKey: "AIzaSy...",  
 databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"  
};  
firebase.initializeApp(firebaseConfig);  
const db = firebase.database();  
  
let orders = [];  
let currentOrderIndex = 0;  
let allItems = {};  
let selectedTable = null;  
  
let cachedHTML = {}; // 👈 هنا بالظبط  
  
let itemsMap = {}; // 👈 لازم دي  
  
let mainCategories = {};  
  
db.ref('main_categories').on('value', snap => {  
    mainCategories = snap.val() || {};  
    renderMainCategories();  
});  
  
// 2. دالة الفلترة عشان الأزرار تشتغل  
let currentCategory = 'all';  
let allSubCats = {};   
  
// 1. سحب كل الأقسام الفرعية وتخزينها  
db.ref('sub_categories').on('value', snap => {  
    allSubCats = snap.val() || {};  
    loadSubDepts('barista'); // يفتح أوتوماتيك على الباريستا  
});  
  
// 2. وظيفة عرض الأقسام الفرعية بناءً على القسم الرئيسي  
function loadSubDepts(mainName) {  
  
    let html = `<button class="cat-btn active" onclick="filterCat('all', this)">الكل</button>`;  
      
    let firstSub = null;  
  
    Object.keys(allSubCats).forEach(key => {  
        let cat = allSubCats[key];  
  
        if (cat.mainDept === mainName || cat.parent === mainName) {  
  
            if(!firstSub) firstSub = key; // 👈 أول قسم  
  
            html += `<button class="cat-btn" onclick="filterCat('${key}', this)">${cat.name}</button>`;  
        }  
    });  
  
    document.getElementById('categories').innerHTML = html;  
  
    // 👇 الجديد: يعرض أول قسم تلقائي  
    if(firstSub){  
        filterCat(firstSub);  
    }  
}  
  
function filterCat(catId, btn) {  
    currentCategory = catId;  
      
    if(btn) {  
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));  
        btn.classList.add('active');  
    }  
  
    let itemsArray = Object.values(allItems);  
      
    let filtered = catId === 'all' ? itemsArray : itemsArray.filter(i => {  
        return i.sub_id === catId || i.categoryId === catId;  
    });  
      
    renderItems(filtered);  
}  
  
  
// تحميل الأصناف  
db.ref('menu_items').on('value', snap=>{  
    allItems = snap.val() || {};  
      
    cachedHTML = {}; // 👈 مهم جدًا  
  
    itemsMap = {}; // تصفير  
  
    Object.keys(allItems).forEach(key=>{  
        let i = allItems[key];  
        i.id = key;        // 👈 أهم سطر  
        itemsMap[key] = i; // 👈 نخزن بالـ key  
    });  
  
    filterCat(currentCategory); // 👈 مهم جدًا  
});  
  
// عرض الأصناف  
function renderItems(items){  
  
    let key = currentCategory || "all";  
  
    if(cachedHTML[key]){  
        document.getElementById('items').innerHTML = cachedHTML[key];  
        return;  
    }  
  
    let html = "";  
  
    items.forEach(i=>{  
        html += `  
<div class="item">  
  
    <img src="${i.img || 'https://via.placeholder.com/150'}"  
         onerror="this.src='https://via.placeholder.com/150'"  
         style="  
            width:100%;  
            height:80px;  
            object-fit:cover;  
            border-radius:10px;  
            margin-bottom:5px;  
         ">  
  
    <strong>${i.ar}</strong>  
    <div class="item-p">${i.price} ريال</div>  
  
    <button onclick="add('${i.id}', this)">+</button>  
  
</div>  
`;  
    });  
  
    cachedHTML[key] = html;  
  
    document.getElementById('items').innerHTML = html;  
}  
  
function add(id, btn){

    // لو مفيش أوردر
    if(!orders[currentOrderIndex]){
        orders[currentOrderIndex] = {
            items: [],
            orderPath: null
        };
    }

    let item = itemsMap[id];

    if(!item){
        console.error("❌ item مش موجود:", id);
        return;
    }

    let cartArr = orders[currentOrderIndex].items;

    let found = cartArr.find(i => i.id === id);

    if(found){
        found.qty++;
    }else{
        cartArr.push({
            ...item,
            id: id,
            qty: 1,
            note: ""
        });
    }

    // تحديث الكارت
    renderCart();

    // حفظ
    saveOrdersToFirebase();
    saveLocalOrders();

    // ✨ الأنيميشن القديم
    if(btn) flyToCart(btn);

    // ✨ لمعة الفاتورة
    let cart = document.getElementById('cart');

    if(cart){
        cart.style.boxShadow = "0 0 40px #22c55e";

        setTimeout(()=>{
            cart.style.boxShadow = "0 0 20px rgba(34,197,94,0.2)";
        }, 400);
    }
}

function renderTables(){

    db.ref('live_orders').once('value', snap => {

        let data = snap.val() || {};
        let html = "";

        for(let i=1; i<=12; i++){
            let status = "free";

            let tableKey = 'T_' + i;

            if(data[tableKey]){
                if(data[tableKey].status === "open"){
                    status = "open"; // أصفر
                }else{
                    status = "busy"; // أحمر (لو اتحاسب)
                }
            }

            html += `
            <div class="table ${status}" onclick="selectTable(${i})">
                T${i}
            </div>`;
        }

        document.getElementById("tables").innerHTML = html;

    });
}
  
function selectTable(num){  
  
    let tableKey = 'T_' + num;  
  
    db.ref('live_orders/' + tableKey).once('value', snap => {  
  
        if(snap.exists()){  
            let data = snap.val();  
  
            // 👇 ندور لو الفاتورة دي مفتوحة قبل كده  
            let existingIndex = orders.findIndex(o => o.orderPath === tableKey);  
  
            if(existingIndex !== -1){  
                currentOrderIndex = existingIndex;  
            }else{  
                // 👇 نضيفها كفاتورة جديدة (تاب جديد)  
                orders.push({  
                    items: data.items.map(i => ({  
                        ar: i.ar,  
                        qty: i.qty,  
                        price: i.p  
                    })),  
                    orderPath: tableKey  
                });  
  
                currentOrderIndex = orders.length - 1;  
                saveOrdersToFirebase(); // 👈 هنا  
            }  
  
            selectedTable = num;  
  
            renderCart();  
            renderOrderTabs();  
              
            saveOrdersToFirebase(); // 👈 هنا برضه  
  
            alert("تم فتح الفاتورة 👌");  
  
        }else{  
            // 👇 ترابيزة فاضية = فاتورة جديدة  
            newOrder();  
            selectedTable = num;  
        }  
  
    });  
}  
  
  
function restoreOrders(){  
  
    loadLocalOrders();  
  
    renderCart();  
    renderOrderTabs();  
    renderTables();  
  
    alert("تم استرجاع الطلبات 🔄");  
      
}  
  
// عرض الكارت  
function renderCart(){  
  
    let cart = orders[currentOrderIndex]?.items || [];  
  
    let html="", total=0;  
  
    cart.forEach((i,idx)=>{  
        total += i.price*i.qty;  
  
        html += `<div class="cart-item" style="flex-direction:column; align-items:flex-start;">  
      
    <div style="display:flex; justify-content:space-between; width:100%;">  
        <span>${i.ar} x ${i.qty}</span>  
  
        <div>  
            <button onclick="change(${idx},1)">+</button>  
            <button onclick="change(${idx},-1)">-</button>  
        </div>  
    </div>  
  
<button onclick="openNotePopup(${idx})" style="  
    margin-top:5px;  
    background:${i.note ? '#f59e0b' : '#334155'};  
    color:white;  
    border:none;  
    padding:5px 10px;  
    border-radius:6px;  
    cursor:pointer;  
">  
📝 ${i.note ? "✏️ تعديل الملاحظة" : "➕ إضافة ملاحظة"}  
</button>  
  
</div>`;  
  
  
    });  
  
    document.getElementById('cart').innerHTML = html;  
    document.getElementById('total').innerText = total + " ريال";  
  
}  
  
function flyToCart(btn){  
  
    let cart = document.getElementById('cart'); // 👈 ده الصح عندك  
  
    let rectBtn = btn.getBoundingClientRect();  
    let rectCart = cart.getBoundingClientRect();  
  
    let circle = document.createElement('div');  
    circle.style.position = 'fixed';  
    circle.style.width = '20px';  
    circle.style.height = '20px';  
    circle.style.borderRadius = '50%';  
    circle.style.background = '#22c55e';  
    circle.style.left = rectBtn.left + 'px';  
    circle.style.top = rectBtn.top + 'px';  
    circle.style.zIndex = 9999;  
    circle.style.transition = '0.5s cubic-bezier(0.22, 1, 0.36, 1)';  
  
    document.body.appendChild(circle);  
  
    setTimeout(()=>{  
        circle.style.left = rectCart.left + 'px';  
        circle.style.top = rectCart.top + 'px';  
        circle.style.opacity = 0;  
    },10);  
  
    setTimeout(()=>{  
        circle.remove();  
    },700);  
}  
  
async function getTakeaway(){  
    let snap = await db.ref('takeaway_counter').once('value');  
    let num = snap.val() || 1;  
  
    await db.ref('takeaway_counter').set(num + 1);  
  
    return num;  
}  
  
// إرسال الطلب  
async function sendOrder(){  
  
renderTables();  
    // 👇 حطها هنا بالظبط  
    if(orders[currentOrderIndex]?.orderPath){  
        return alert("تم إرسال الطلب قبل كده ⚠️");  
    }  
  
    let cart = orders[currentOrderIndex]?.items || [];  
  
    if(cart.length === 0) return alert("السلة فاضية!");  
    document.getElementById("note").value = "";  
  
    let type = document.getElementById('orderType').value;  
    let table = selectedTable;  
    if(type === "محلي" && !table){  
    return alert("اختار ترابيزة الأول ❗");  
}  
  
    let cashier = sessionStorage.getItem("cashier");  
  
let order = {  
    items: cart.map(i => ({  
        ar: i.ar,  
        qty: i.qty,  
        p: i.price,  
        note: i.note || "",  
        dept: i.dept || "kitchen"  
    })), // 👈 مهم جدًا  
  
    totalPrice: cart.reduce((t, i) => t + (i.price * i.qty), 0),  
      
    status: "open",  
    type: type,  
    table: table,  
    cashier: cashier,  
    note: document.getElementById("note").value || "", // 👈 دي المهمة  
    time: new Date().toISOString()  
};  
  
    let orderPath;  
  
    if(type === "محلي"){  
        orderPath = 'T_' + table;  
    }else{  
        let num = await getTakeaway();  
        order.orderNum = num;  
        orderPath = 'TA_' + num;  
    }  
  
    db.ref('live_orders/' + orderPath).set(order);  
  
// 👇 احفظه جوه الأوردر  
   orders[currentOrderIndex].orderPath = orderPath;  
   saveOrdersToFirebase();  
  
    let shiftId = localStorage.getItem("shiftId");  
  
    if(!shiftId){  
        shiftId = "shift_" + Date.now();  
        localStorage.setItem("shiftId", shiftId);  
    }  
  
    db.ref('shifts/' + shiftId + '/' + orderPath).set(order);  
  
    watchOrderStatus();  
  
    alert("تم إرسال الطلب ✅");  
}  
  
function completeOrder(){  
  
    let id = orders[currentOrderIndex]?.orderPath;  
  
    if(!id){  
        return alert("الطلب لسه متبعتش ❌");  
    }  
      
        // 👇 اطبع الأول  
    printBill();  
  
    // ❌ بدل update  
    // ✅ امسح الأوردر  
    db.ref('live_orders/'+id).remove();  
  
    // حذف من الليست عندك  
    orders.splice(currentOrderIndex, 1);  
    currentOrderIndex = 0;  
  
    saveOrdersToFirebase();  
  
    renderCart();  
    renderOrderTabs();  
    renderTables(); // 👈 مهم جدا  
      
  
    alert("تم التحصيل 💰");  
  
    newOrder();  
}  
  
function printBill(){  
  
    let cart = orders[currentOrderIndex]?.items || [];  
    let total = 0;  
  
    let itemsHTML = "";  
  
    cart.forEach(i=>{  
        total += i.price * i.qty;  
  
        itemsHTML += `  
        <tr>  
            <td>${i.ar}</td>  
            <td>${i.qty}</td>  
            <td>${i.price}</td>  
            <td>${i.price * i.qty}</td>  
        </tr>`;  
    });  
  
    let cashier = sessionStorage.getItem("cashier") || "";  
    let date = new Date().toLocaleString();  
  
    let html = `  
    <html dir="rtl">  
    <head>  
    <title>فاتورة</title>  
    <style>  
        body { font-family: sans-serif; text-align:center; }  
        table { width:100%; border-collapse: collapse; margin-top:10px;}  
        td, th { border-bottom:1px dashed #000; padding:5px; }  
        h2 { margin-bottom:5px; }  
    </style>  </head>  

<body>  

    <h2>☕ POS SYSTEM</h2>  
    <p>${date}</p>  
    <p>👤 الكاشير: ${cashier}</p>  

    <table>  
        <tr>  
            <th>الصنف</th>  
            <th>الكمية</th>  
            <th>السعر</th>  
            <th>الإجمالي</th>  
        </tr>  

        ${itemsHTML}  
    </table>  

    <h3>💰 الإجمالي: ${total} ريال</h3>  

    <p>شكراً لزيارتكم ❤️</p>  

</body>  
</html>  
`;  

let w = window.open("", "_blank");

w.document.open();
w.document.write(html);
w.document.close();

setTimeout(() => {

function searchItems(text){

let itemsArray = Object.values(allItems);  

let filtered = itemsArray.filter(i => {  

    let matchText = i.ar.toLowerCase().includes(text.toLowerCase());  

    let matchCat = currentCategory === 'all'   
        || i.sub_id === currentCategory   
        || i.categoryId === currentCategory;  

    return matchText && matchCat;  
});  

renderItems(filtered);

}

function login(){
    let username = document.getElementById("user").value;
    let password = document.getElementById("pass").value;

    db.ref('users').once('value', snap => {
        let users = snap.val();

        if(!users){
            alert("❌ مفيش مستخدمين في السيستم");
            return;
        }

        let found = null;

        Object.keys(users).forEach(key => {
            let u = users[key];

            if(u.username === username && u.password === password){
                found = u;
            }
        });

        if(found){
            sessionStorage.setItem("cashier", found.username);
            sessionStorage.setItem("role", found.role);

            document.getElementById("loginBox").style.display = "none";
            document.getElementById("cashierName").innerText = "👤 " + found.username;

            alert("تم تسجيل الدخول ✅");
            applyPermissions();
        }else{
            alert("بيانات غلط ❌");
        }
    });
}

function addUser(){
let u = document.getElementById("newUser").value;
let p = document.getElementById("newPass").value;
let r = document.getElementById("newRole").value;

if(!u || !p){  
    alert("❌ اكتب البيانات");  
    return;  
}  

let newRef = db.ref("users").push();  

newRef.set({  
    username: u,  
    password: p,  
    role: r  
});  

alert("✅ تم إضافة المستخدم");  

document.getElementById("newUser").value = "";  
document.getElementById("newPass").value = "";

}

function checkRole(){
let role = sessionStorage.getItem("role");

if(role === "admin"){  
    document.getElementById("adminPanel").style.display = "block";  
}else{  
    document.getElementById("adminPanel").style.display = "none";  
}

}

function applyPermissions(){
let role = sessionStorage.getItem("role");

// لو مش أدمن نخفي الحاجات دي  
if(role !== "admin"){  
    document.getElementById("adminPanel").style.display = "none";  
}

}

// تقفيل وردية
function closeShift(){

let shiftId = localStorage.getItem("shiftId");  

db.ref('shifts/' + shiftId).once('value', snap=>{  

    let total = 0;  
    let rows = "";  

    snap.forEach(o=>{  
        let order = o.val();  

        total += order.totalPrice || 0;  

        let itemsText = "";  

        if(order.items){  
            order.items.forEach(i=>{  
                itemsText += `${i.ar} x${i.qty} <br>`;  
            });  
        }  

        rows += `  
        <tr>  
            <td>${order.type}</td>  
            <td>${order.totalPrice}</td>  
            <td>${new Date(order.time).toLocaleTimeString()}</td>  
            <td>${itemsText}</td>  
        </tr>`;  
    });  

    let html = `  
    <html dir="rtl">  
    <head>  
    <style>  
        body{font-family:sans-serif;text-align:center;}  
        table{width:100%;border-collapse:collapse;margin-top:10px;}  
        td,th{border:1px solid #000;padding:5px;}  
        h2{margin-bottom:10px;}  
    </style>  
    </head>  

    <body>  

    <h2>📊 تقرير الوردية</h2>  

    <table>  
        <tr>  
            <th>النوع</th>  
            <th>السعر</th>  
            <th>الوقت</th>  
            <th>التفاصيل</th>  
        </tr>  

        ${rows}  
    </table>  

    <h3>💰 الإجمالي: ${total} ريال</h3>  

    </body>  
    </html>  
    `;  

    let w = window.open("", "_blank");  

    w.document.open();  
    w.document.write(html);  
    w.document.close();  

    // 👇 يطبع لوحده  
    setTimeout(()=>{  
        w.print();  
    },500);  

    localStorage.removeItem("shiftId");  

});

}

function switchOrder(index){

// 👇 حطي هنا بالظبط
function renderOrderTabs(){
let html = "";

orders.forEach((o, index)=>{  

    let color = "#334155";  

    if(o.orderPath){  
        color = "#f59e0b"; // أوردر مفتوح  
    }  

    if(index === currentOrderIndex){  
        color = "#22c55e"; // الحالي  
    }  

    html += `  
    <div style="display:inline-flex; align-items:center; margin:3px;">  
          
        <button onclick="switchOrder(${index})" style="  
            background:${color};  
            color:white;  
            border:none;  
            padding:6px 10px;  
            border-radius:8px 0 0 8px;  
        ">  
        🧾 ${o.orderPath ? o.orderPath : index + 1}  
        </button>  

        <button onclick="closeTab(${index})" style="  
            background:#ef4444;  
            color:white;  
            border:none;  
            padding:6px 8px;  
            border-radius:0 8px 8px 0;  
            cursor:pointer;  
        ">  
        ❌  
        </button>  

    </div>`;  
});  

document.getElementById("orderTabs").innerHTML = html;

}

function closeTab(index){

// لو دي الفاتورة الحالية  
if(index === currentOrderIndex){  
    orders.splice(index, 1);  

    currentOrderIndex = 0;  
}else{  
    orders.splice(index, 1);  
}  

// لو مفيش فواتير خالص  
if(orders.length === 0){  
    newOrder();  
}  

saveOrdersToFirebase();  
renderOrderTabs();  
renderCart();

}

function changeView(type){

if(type === "day"){  
    getSalesPerDay();  
}else{  
    getSalesPerMonth();  
}

}

function change(index, delta){

    let cart = orders[currentOrderIndex]?.items;

    if(!cart || !cart[index]) return;

    cart[index].qty += delta;

    // لو الكمية بقت صفر نحذف المنتج
    if(cart[index].qty <= 0){
        cart.splice(index, 1);
    }

    renderCart();
    saveOrdersToFirebase();
}

function getSalesPerMonth(){

db.ref('shifts').once('value', snap => {  

    let data = snap.val() || {};  
    let months = {};  

    Object.values(data).forEach(shift => {  
        Object.values(shift).forEach(order => {  

            let d = new Date(order.time);  
            let month = d.getFullYear() + "-" + (d.getMonth()+1);  

            if(!months[month]) months[month] = 0;  

            months[month] += order.totalPrice || 0;  
        });  
    });  

    drawChart(months);  
});

}

let chartInstance;

function drawChart(data){

let labels = Object.keys(data);  
let values = Object.values(data);  

let ctx = document.getElementById('salesChart').getContext('2d');  

// يمسح القديم  
if(chartInstance){  
    chartInstance.destroy();  
}  

chartInstance = new Chart(ctx, {  
    type: 'line',  
    data: {  
        labels: labels,  
        datasets: [{  
            label: 'المبيعات',  
            data: values,  
            borderColor: '#22c55e',  
            backgroundColor: 'rgba(34,197,94,0.2)',  
            fill: true,  
            tension: 0.4  
        }]  
    },  
    options: {  
        responsive: true,  
        plugins: {  
            legend: {  
                labels: { color: 'white' }  
            }  
        },  
        scales: {  
            x: {  
                ticks: { color: 'white' }  
            },  
            y: {  
                ticks: { color: 'white' }  
            }  
        }  
    }  
});

}

function saveLocalOrders(){
localStorage.setItem("orders_backup", JSON.stringify(orders));
}

function autoSave(){
saveLocalOrders();
}

function loadLocalOrders(){
let data = localStorage.getItem("orders_backup");

if(data){  
    orders = JSON.parse(data);  
      
}

}

function getTopItems(){

db.ref('shifts').once('value', snap => {  

    let data = snap.val() || {};  
    let items = {};  

    Object.values(data).forEach(shift => {  
        Object.values(shift).forEach(order => {  

            if(order.items){  
                order.items.forEach(i => {  

                   let name = i.ar;  

                    if(!items[name]) items[name] = 0;  

                    items[name] += i.qty || 1;  
                });  
            }  

        });  
    });  

    drawPieChart(items);  
});

}

let pieInstance;

function drawPieChart(data){

let labels = Object.keys(data);  
let values = Object.values(data);  

let ctx = document.getElementById('topChart').getContext('2d');  

if(pieInstance){  
    pieInstance.destroy();  
}  

pieInstance = new Chart(ctx, {  
    type: 'pie',  
    data: {  
        labels: labels,  
        datasets: [{  
            data: values,  
            backgroundColor: [  
                '#22c55e',  
                '#3b82f6',  
                '#f59e0b',  
                '#ef4444',  
                '#a855f7',  
                '#14b8a6'  
            ]  
        }]  
    },  
    options: {  
        plugins: {  
            legend: {  
                labels: { color: 'white' }  
            }  
        }  
    }  
});

}

function getSalesPerDay(){

db.ref('shifts').once('value', snap => {  

    let result = {};  

    snap.forEach(shift => {  

        shift.forEach(order => {  

            let date = new Date(order.val().time).toLocaleDateString();  

            result[date] = (result[date] || 0) + order.val().totalPrice;  

        });  

    });  

    console.log(result);  

    drawChart(result);  

});

}
