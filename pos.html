<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>POS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<!-- 👇 حطي Chart هنا -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    font-family: 'Cairo', sans-serif;
    display: grid;
    grid-template-columns: 60% 40%;
    height: 100vh;
    margin: 0;
}

/* الهيدر */
.header {
    background: linear-gradient(90deg, #22c55e, #16a34a);
    padding: 15px;
    border-radius: 16px;
    margin-bottom: 15px;
    font-size: 22px;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 5px 20px rgba(34,197,94,0.4);
}

/* البوكسات */
.left, .right {
    background: rgba(30,41,59,0.8);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* الأزرار */
button {
    border: none;
    border-radius: 12px;
    padding: 10px 15px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
    background: linear-gradient(145deg, #334155, #1e293b);
    color: white;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

/* أزرار ملونة */
.btn-green { background: linear-gradient(45deg,#22c55e,#16a34a); }
.btn-red { background: linear-gradient(45deg,#ef4444,#b91c1c); }
.btn-yellow { background: linear-gradient(45deg,#f59e0b,#d97706); }
.btn-blue { background: linear-gradient(45deg,#3b82f6,#1d4ed8); }

/* الأصناف */
#items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
}

.item {
    background: linear-gradient(145deg,#020617,#1e293b);
    border-radius: 18px;
    padding: 10px;
    border: 1px solid #334155;
    text-align: center;
    transition: 0.3s;
}

.item:hover {
    transform: translateY(-5px) scale(1.05);
    background: #334155;
}

.item img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    border-radius: 12px;
}

/* السعر */
.item-p {
    color: #22c55e;
    font-size: 14px;
    margin-top: 5px;
}

/* الكارت */
.cart-item {
    background: linear-gradient(145deg,#020617,#0f172a);
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
}

/* الإجمالي */
#total {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
    color: #22c55e;
    text-align: center;
}

/* التابات */
#orderTabs button {
    margin: 3px;
    border-radius: 10px;
}

/* الترابيزات */
.table {
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.table:hover {
    transform: scale(1.05);
}

.free { background: linear-gradient(45deg,#22c55e,#16a34a); }
.busy { background: linear-gradient(45deg,#ef4444,#b91c1c); }
.open { background: linear-gradient(45deg,#f59e0b,#d97706); }

/* السيرش */
#search {
    background: #020617;
    color: white;
    border: 1px solid #334155;
}

/* اللوجين */
#loginBox {
    background: radial-gradient(circle, #020617, #0f172a);
}

#loginBox input {
    background: #020617;
    color: white;
    border: 1px solid #334155;
}

</style>
</head>

<body>

<div id="salesBox" style="
display:none;
margin:20px;
background:#1e293b;
padding:15px;
border-radius:12px;
">

<h3>📊 مبيعات الأيام</h3>

<h3>🔥 الأكثر مبيعًا</h3>
<canvas id="topChart"></canvas>

<!-- فلترة -->
<select onchange="changeView(this.value)" style="
margin-bottom:10px;
padding:5px;
border-radius:6px;
">
<option value="day">يومي</option>
<option value="month">شهري</option>
</select>

<canvas id="salesChart"></canvas>

</div>

<div id="loginBox" style="
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
">

<h2>🔐 تسجيل الدخول</h2>

<input id="user" placeholder="اسم المستخدم" style="margin:5px;padding:10px;">
<input id="pass" placeholder="كلمة السر" type="password" style="margin:5px;padding:10px;">

<button onclick="login()" style="padding:10px 20px;background:#22c55e;color:white;border:none;border-radius:8px;">
دخول
</button>

</div>
<div class="header">
    ☕ POS System
</div>

<div id="statsBox" style="
display:flex;
gap:10px;
margin-bottom:10px;
">
    <div style="flex:1;background:#020617;padding:10px;border-radius:10px;">
        💰 <span id="todayTotal">0</span> ريال
    </div>

    <div style="flex:1;background:#020617;padding:10px;border-radius:10px;">
        🧾 <span id="orderCount">0</span> طلب
    </div>
</div>

<div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
    <input id="search" placeholder="🔍 بحث" 
    oninput="searchItems(this.value)" 
    style="flex:1; padding:8px; border-radius:8px; border:none;">

    <!-- 👇 اسم الكاشير -->
    <span id="cashierName" style="font-weight:bold;"></span>

    <!-- 👇 زرار الخروج -->
<button onclick="logout()" class="btn-red" style="
    border-radius:50%;
    width:40px;
    height:40px;
    font-size:18px;
">
🚪
</button>

<button onclick="toggleSales()" style="
background:#22c55e;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:10px;
">
عرض المبيعات 📊
</button>

</div>
<div id="mainCategories" class="main-depts"></div>
<div id="categories" class="cat-container"></div>
<div id="items"></div>
</div>
<div style="
position: fixed;
bottom: 10px;
left: 10px;
right: 10px;
z-index: 999;
">
<button onclick="newOrder()" class="btn-green btn-full">
🆕 فاتورة جديدة
</button>

</div>
<div class="right">

<div id="orderTabs"></div> <!-- 👈 هنا بالظبط -->

<h3>🧾 الفاتورة</h3>

<select id="orderType">
<option value="محلي">محلي</option>
<option value="سفري">سفري</option>
</select>

<div id="tables" style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:10px 0;
"></div>

<div id="cart"></div>
<div id="total">0 ريال</div>
<textarea id="note" placeholder="📝 ملاحظات (مثال: بدون سكر - زيادة صوص)" 
style="width:100%; margin-top:10px; padding:8px; border-radius:8px;"></textarea>

<div id="statusBox" style="margin-top:10px; font-size:14px;"></div>

<button onclick="sendOrder()" class="btn-green">➕ إضافة</button>
<button onclick="completeOrder()" class="btn-yellow">💰 تحصيل</button>
<button onclick="printBill()" class="btn-blue">🧾 طباعة</button>
<button onclick="closeShift()" class="btn-blue">📊 تقفيل وردية</button>
<button onclick="restoreOrders()" class="btn-yellow">
🔄 استرجاع الطلبات
</button>

<script>
const firebaseConfig = {
 apiKey: "AIzaSy...",
 databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let orders = [];
let currentOrderIndex = 0;
let allItems = {};
let selectedTable = null;

let cachedHTML = {}; // 👈 هنا بالظبط

let itemsMap = {}; // 👈 لازم دي

let mainCategories = {};

db.ref('main_categories').on('value', snap => {
    mainCategories = snap.val() || {};
    renderMainCategories();
});

// 2. دالة الفلترة عشان الأزرار تشتغل
let currentCategory = 'all';
let allSubCats = {}; 

// 1. سحب كل الأقسام الفرعية وتخزينها
db.ref('sub_categories').on('value', snap => {
    allSubCats = snap.val() || {};
    loadSubDepts('barista'); // يفتح أوتوماتيك على الباريستا
});

// 2. وظيفة عرض الأقسام الفرعية بناءً على القسم الرئيسي
function loadSubDepts(mainName) {

    let html = `<button class="cat-btn active" onclick="filterCat('all', this)">الكل</button>`;
    
    let firstSub = null;

    Object.keys(allSubCats).forEach(key => {
        let cat = allSubCats[key];

        if (cat.mainDept === mainName || cat.parent === mainName) {

            if(!firstSub) firstSub = key; // 👈 أول قسم

            html += `<button class="cat-btn" onclick="filterCat('${key}', this)">${cat.name}</button>`;
        }
    });

    document.getElementById('categories').innerHTML = html;

    // 👇 الجديد: يعرض أول قسم تلقائي
    if(firstSub){
        filterCat(firstSub);
    }
}

function filterCat(catId, btn) {
    currentCategory = catId;
    
    if(btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    let itemsArray = Object.values(allItems);
    
    let filtered = catId === 'all' ? itemsArray : itemsArray.filter(i => {
        return i.sub_id === catId || i.categoryId === catId;
    });
    
    renderItems(filtered);
}


// تحميل الأصناف
db.ref('menu_items').on('value', snap=>{
    allItems = snap.val() || {};
    
    cachedHTML = {}; // 👈 مهم جدًا

    itemsMap = {}; // تصفير

    Object.keys(allItems).forEach(key=>{
        let i = allItems[key];
        i.id = key;        // 👈 أهم سطر
        itemsMap[key] = i; // 👈 نخزن بالـ key
    });

    filterCat(currentCategory); // 👈 مهم جدًا
});

// عرض الأصناف
function renderItems(items){

    let key = currentCategory || "all";

    // 👇 لو متخزن قبل كده استخدمه
    if(cachedHTML[key]){
        document.getElementById('items').innerHTML = cachedHTML[key];
        return;
    }

    let html = "";

    items.forEach(i=>{
        html += `
        <div class="item" onclick="add('${i.id}')">

            <img src="${i.img || 'https://via.placeholder.com/150'}"
            onerror="this.src='https://via.placeholder.com/150'"
            style="
                width:100%;
                height:80px;
                object-fit:cover;
                border-radius:10px;
                margin-bottom:5px;
            ">

            <strong>${i.ar}</strong>
            <span class="item-p">${i.price} ريال</span>

        </div>`;
    });

    // 👇 خزّن النتيجة
    cachedHTML[key] = html;

    document.getElementById('items').innerHTML = html;
}


function renderTables(){

    db.ref('live_orders').once('value', snap => {

        let data = snap.val() || {};
        let html = "";

        for(let i=1; i<=12; i++){
            let status = "free";

            let tableKey = 'T_' + i;

            if(data[tableKey]){
                if(data[tableKey].status === "open"){
                    status = "open"; // أصفر
                }else{
                    status = "busy"; // أحمر (لو اتحاسب)
                }
            }

            html += `
            <div class="table ${status}" onclick="selectTable(${i})">
                T${i}
            </div>`;
        }

        document.getElementById("tables").innerHTML = html;

    });
}

function selectTable(num){

    let tableKey = 'T_' + num;

    db.ref('live_orders/' + tableKey).once('value', snap => {

        if(snap.exists()){
            let data = snap.val();

            // 👇 ندور لو الفاتورة دي مفتوحة قبل كده
            let existingIndex = orders.findIndex(o => o.orderPath === tableKey);

            if(existingIndex !== -1){
                currentOrderIndex = existingIndex;
            }else{
                // 👇 نضيفها كفاتورة جديدة (تاب جديد)
                orders.push({
                    items: data.items.map(i => ({
                        ar: i.ar,
                        qty: i.qty,
                        price: i.p
                    })),
                    orderPath: tableKey
                });

                currentOrderIndex = orders.length - 1;
                saveOrdersToFirebase(); // 👈 هنا
            }

            selectedTable = num;

            renderCart();
            renderOrderTabs();
            
            saveOrdersToFirebase(); // 👈 هنا برضه

            alert("تم فتح الفاتورة 👌");

        }else{
            // 👇 ترابيزة فاضية = فاتورة جديدة
            newOrder();
            selectedTable = num;
        }

    });
}

// إضافة للكارت
function add(name){

if(!orders[currentOrderIndex]){
    orders[currentOrderIndex] = {
        items: [],
        orderPath: null
    };
}

    let item = itemsMap[name];

    let cart = orders[currentOrderIndex].items;

    let found = cart.find(i=>i.id === name);

    if(found) found.qty++;
    else cart.push({...item, id: name, qty:1});

    renderCart();
    
    saveOrdersToFirebase();
}

function restoreOrders(){

    loadLocalOrders();

    renderCart();
    renderOrderTabs();
    renderTables();

    alert("تم استرجاع الطلبات 🔄");
    
}

// عرض الكارت
function renderCart(){

    let cart = orders[currentOrderIndex]?.items || [];

    let html="", total=0;

    cart.forEach((i,idx)=>{
        total += i.price*i.qty;

        html += `<div class="cart-item" style="flex-direction:column; align-items:flex-start;">
    
    <div style="display:flex; justify-content:space-between; width:100%;">
        <span>${i.ar} x ${i.qty}</span>

        <div>
            <button onclick="change(${idx},1)">+</button>
            <button onclick="change(${idx},-1)">-</button>
        </div>
    </div>

<button onclick="openNotePopup(${idx})" style="
    margin-top:5px;
    background:${i.note ? '#f59e0b' : '#334155'};
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    cursor:pointer;
">
📝 ${i.note ? "✏️ تعديل الملاحظة" : "➕ إضافة ملاحظة"}
</button>

</div>`;


    });

    document.getElementById('cart').innerHTML = html;
    document.getElementById('total').innerText = total + " ريال";

}

async function getTakeaway(){
    let snap = await db.ref('takeaway_counter').once('value');
    let num = snap.val() || 1;

    await db.ref('takeaway_counter').set(num + 1);

    return num;
}

// إرسال الطلب
async function sendOrder(){

renderTables();
    // 👇 حطها هنا بالظبط
    if(orders[currentOrderIndex]?.orderPath){
        return alert("تم إرسال الطلب قبل كده ⚠️");
    }

    let cart = orders[currentOrderIndex]?.items || [];

    if(cart.length === 0) return alert("السلة فاضية!");
    document.getElementById("note").value = "";

    let type = document.getElementById('orderType').value;
    let table = selectedTable;
    if(type === "محلي" && !table){
    return alert("اختار ترابيزة الأول ❗");
}

    let cashier = sessionStorage.getItem("cashier");

let order = {
    items: cart.map(i => ({
        ar: i.ar,
        qty: i.qty,
        p: i.price,
        note: i.note || "",
        dept: i.dept || "kitchen"
    })), // 👈 مهم جدًا

    totalPrice: cart.reduce((t, i) => t + (i.price * i.qty), 0),
    
    status: "open",
    type: type,
    table: table,
    cashier: cashier,
    note: document.getElementById("note").value || "", // 👈 دي المهمة
    time: new Date().toISOString()
};

    let orderPath;

    if(type === "محلي"){
        orderPath = 'T_' + table;
    }else{
        let num = await getTakeaway();
        order.orderNum = num;
        orderPath = 'TA_' + num;
    }

    db.ref('live_orders/' + orderPath).set(order);

// 👇 احفظه جوه الأوردر
   orders[currentOrderIndex].orderPath = orderPath;
   saveOrdersToFirebase();

    let shiftId = localStorage.getItem("shiftId");

    if(!shiftId){
        shiftId = "shift_" + Date.now();
        localStorage.setItem("shiftId", shiftId);
    }

    db.ref('shifts/' + shiftId + '/' + orderPath).set(order);

    watchOrderStatus();

    alert("تم إرسال الطلب ✅");
}

function completeOrder(){

    let id = orders[currentOrderIndex]?.orderPath;

    if(!id){
        return alert("الطلب لسه متبعتش ❌");
    }

    // ❌ بدل update
    // ✅ امسح الأوردر
    db.ref('live_orders/'+id).remove();

    // حذف من الليست عندك
    orders.splice(currentOrderIndex, 1);
    currentOrderIndex = 0;

    saveOrdersToFirebase();

    renderCart();
    renderOrderTabs();
    renderTables(); // 👈 مهم جدا

    alert("تم التحصيل 💰");

    newOrder();
}

function printBill(){

    let cart = orders[currentOrderIndex]?.items || [];
    let total = 0;

    let itemsHTML = "";

    cart.forEach(i=>{
        total += i.price * i.qty;

        itemsHTML += `
        <tr>
            <td>${i.ar}</td>
            <td>${i.qty}</td>
            <td>${i.price}</td>
            <td>${i.price * i.qty}</td>
        </tr>`;
    });

    let cashier = sessionStorage.getItem("cashier") || "";
    let date = new Date().toLocaleString();

    let html = `
    <html dir="rtl">
    <head>
    <title>فاتورة</title>
    <style>
        body { font-family: sans-serif; text-align:center; }
        table { width:100%; border-collapse: collapse; margin-top:10px;}
        td, th { border-bottom:1px dashed #000; padding:5px; }
        h2 { margin-bottom:5px; }
    </style>
    </head>

    <body>

        <h2>☕ POS SYSTEM</h2>
        <p>${date}</p>
        <p>👤 الكاشير: ${cashier}</p>

        <table>
            <tr>
                <th>الصنف</th>
                <th>الكمية</th>
                <th>السعر</th>
                <th>الإجمالي</th>
            </tr>

            ${itemsHTML}
        </table>

        <h3>💰 الإجمالي: ${total} ريال</h3>

        <p>شكراً لزيارتكم ❤️</p>

    </body>
    </html>
    `;

    let w = window.open("", "_blank");

w.document.open();
w.document.write(html);
w.document.close();

// 👇 استني شوية وبعدين اطبع
setTimeout(() => {
    w.print();
}, 500);

} // 👈 ده الحل

function newOrder(){

    let orderNumber = Date.now();

    orders.push({
        items: [],
        orderNumber: orderNumber,
        orderPath: null
    });

    selectedTable = null; // 👈 مهم جدًا

    saveOrdersToFirebase();

    currentOrderIndex = orders.length - 1;

    renderCart();
    renderOrderTabs();
    renderTables(); // 👈 عشان يحدث الألوان

        alert("تم فتح فاتورة رقم " + orderNumber);
}

autoSave();

// متابعة حالة الأقسام
function watchOrderStatus(){

    let id = orders[currentOrderIndex]?.orderPath;

    if(!id) return;

    db.ref('live_orders/' + id).on('value', snap => {
        let o = snap.val();
        if(!o) return;

        document.getElementById('statusBox').innerHTML = `
        <span style="color:${o.baristaReady ? '#22c55e' : '#fbbf24'}">☕ باريستا</span> |
        <span style="color:${o.kitchenReady ? '#22c55e' : '#fbbf24'}">🍳 مطبخ</span> |
        <span style="color:${o.dessertReady ? '#22c55e' : '#fbbf24'}">🍰 حلا</span>
        `;
    });
}


let currentNoteIndex = null;

function openNotePopup(index){
    currentNoteIndex = index;

    let item = orders[currentOrderIndex].items[index];

    document.getElementById("popupNote").value = item.note || "";

    document.getElementById("notePopup").style.display = "flex";
}

function closeNotePopup(){
    document.getElementById("notePopup").style.display = "none";
}

function saveNote(){
    let value = document.getElementById("popupNote").value;

    if(currentNoteIndex !== null){
        orders[currentOrderIndex].items[currentNoteIndex].note = value;
    }

    saveOrdersToFirebase();
    renderCart();
    closeNotePopup();
}

function searchItems(text){

    let itemsArray = Object.values(allItems);

    let filtered = itemsArray.filter(i => {

        let matchText = i.ar.toLowerCase().includes(text.toLowerCase());

        let matchCat = currentCategory === 'all' 
            || i.sub_id === currentCategory 
            || i.categoryId === currentCategory;

        return matchText && matchCat;
    });

    renderItems(filtered);
}

function login(){
    let username = document.getElementById("user").value;
    let password = document.getElementById("pass").value;

    db.ref('users').once('value', snap => {
        let users = snap.val();

        if(!users){
            alert("❌ مفيش مستخدمين في السيستم");
            return;
        }

        let found = null;

        Object.keys(users).forEach(key => {
            let u = users[key];

            if(u.username === username && u.password === password){
                found = u;
            }
        });

        if(found){
            sessionStorage.setItem("cashier", found.username);
            sessionStorage.setItem("role", found.role);

            document.getElementById("loginBox").style.display = "none";
            document.getElementById("cashierName").innerText = "👤 " + found.username;

            alert("تم تسجيل الدخول ✅");
            applyPermissions();
        }else{
            alert("بيانات غلط ❌");
        }
    });
}

function addUser(){
    let u = document.getElementById("newUser").value;
    let p = document.getElementById("newPass").value;
    let r = document.getElementById("newRole").value;

    if(!u || !p){
        alert("❌ اكتب البيانات");
        return;
    }

    let newRef = db.ref("users").push();

    newRef.set({
        username: u,
        password: p,
        role: r
    });

    alert("✅ تم إضافة المستخدم");

    document.getElementById("newUser").value = "";
    document.getElementById("newPass").value = "";
}

function checkRole(){
    let role = sessionStorage.getItem("role");

    if(role === "admin"){
        document.getElementById("adminPanel").style.display = "block";
    }else{

function switchOrder(index){
    currentOrderIndex = index;
    renderCart();
    renderOrderTabs();
}

// 👇 حطي هنا بالظبط
function renderOrderTabs(){
    let html = "";

    orders.forEach((o, index)=>{

        let color = "#334155";

        if(o.orderPath){
            color = "#f59e0b"; // أوردر مفتوح
        }

        if(index === currentOrderIndex){
            color = "#22c55e"; // الحالي
        }

        html += `
        <div style="display:inline-flex; align-items:center; margin:3px;">
            
            <button onclick="switchOrder(${index})" style="
                background:${color};
                color:white;
                border:none;
                padding:6px 10px;
                border-radius:8px 0 0 8px;
            ">
            🧾 ${o.orderPath ? o.orderPath : index + 1}
            </button>

            <button onclick="closeTab(${index})" style="
                background:#ef4444;
                color:white;
                border:none;
                padding:6px 8px;
                border-radius:0 8px 8px 0;
                cursor:pointer;
            ">
            ❌
            </button>

        </div>`;
    });

    document.getElementById("orderTabs").innerHTML = html;
}

function closeTab(index){

    // لو دي الفاتورة الحالية
    if(index === currentOrderIndex){
        orders.splice(index, 1);

        currentOrderIndex = 0;
    }else{
        orders.splice(index, 1);
    }

    // لو مفيش فواتير خالص
    if(orders.length === 0){
        newOrder();
    }

    saveOrdersToFirebase();
    renderOrderTabs();
    renderCart();
}

function changeView(type){

    if(type === "day"){
        getSalesPerDay();

function getSalesPerMonth(){

    db.ref('shifts').once('value', snap => {

        let data = snap.val() || {};
        let months = {};

        Object.values(data).forEach(shift => {
            Object.values(shift).forEach(order => {

                let d = new Date(order.time);
                let month = d.getFullYear() + "-" + (d.getMonth()+1);

                if(!months[month]) months[month] = 0;

                months[month] += order.totalPrice || 0;
            });
        });

        drawChart(months);
    });
}

let chartInstance;

function drawChart(data){

    let labels = Object.keys(data);
    let values = Object.values(data);

    let ctx = document.getElementById('salesChart').getContext('2d');

    // يمسح القديم
    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'المبيعات',
                data: values,
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34,197,94,0.2)',
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: { color: 'white' }
                }
            },
            scales: {
                x: {
                    ticks: { color: 'white' }
                },
                y: {
                    ticks: { color: 'white' }
                }
            }
        }
    });
}

function loadLocalOrders(){
    let data = localStorage.getItem("orders_backup");

        orders = JSON.parse(data);
        
    }
}

function getTopItems(){

    db.ref('shifts').once('value', snap => {

        let data = snap.val() || {};
        let items = {};

        Object.values(data).forEach(shift => {
            Object.values(shift).forEach(order => {

                if(order.items){
                    order.items.forEach(i => {

                       let name = i.ar;

                        if(!items[name]) items[name] = 0;

                        items[name] += i.qty || 1;
                    });
                }

            });
        });

        drawPieChart(items);
    });
}


let pieInstance;

function drawPieChart(data){

    let labels = Object.keys(data);
    let values = Object.values(data);

    let ctx = document.getElementById('topChart').getContext('2d');

    if(pieInstance){
        pieInstance.destroy();
    }

    pieInstance = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: [
                    '#22c55e',
                    '#3b82f6',
                    '#f59e0b',
                    '#ef4444',
                    '#a855f7',
                    '#14b8a6'
                ]
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: { color: 'white' }
                }
            }
        }
    });
}

    db.ref('shifts').once('value', snap => {

                result[date] = (result[date] || 0) + order.val().totalPrice;
