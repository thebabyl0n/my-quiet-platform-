<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>POS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;display:flex}
.left{width:60%;padding:10px}
.right{width:40%;background:#1e293b;padding:10px}
.item{background:#334155;padding:10px;margin:5px;border-radius:8px;cursor:pointer}
.cart-item{display:flex;justify-content:space-between;margin:5px}
button{margin:3px;padding:5px 10px}
</style>
</head>

<body>

<div class="left">
<input id="search" placeholder="🔍 بحث">
<div id="items"></div>
</div>

<div class="right">
<h3>🧾 الفاتورة</h3>

<select id="orderType">
<option value="محلي">محلي</option>
<option value="سفري">سفري</option>
</select>

<input id="tableNumber" placeholder="رقم الترابيزة">

<div id="cart"></div>
<div id="total">0 ريال</div>

<button onclick="sendOrder()">➕ إضافة</button>
<button onclick="completeOrder()">💰 تحصيل</button>
<button onclick="closeShift()">📊 تقفيل وردية</button>
</div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSy...",
 databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cart = [];
let allItems = {};
let activeOrderId = null;

// تحميل الأصناف
db.ref('menu_items').on('value', snap=>{
    allItems = snap.val() || {};
    renderItems(Object.values(allItems));
});

// عرض الأصناف
function renderItems(items){
    let html="";
    items.forEach(i=>{
        html += `<div class="item" onclick="add('${i.ar}')">
        ${i.ar} - ${i.price}
        </div>`;
    });
    document.getElementById('items').innerHTML = html;
}

// إضافة للكارت
function add(name){
    let item = Object.values(allItems).find(i=>i.ar===name);
    let found = cart.find(i=>i.ar===name);

    if(found) found.qty++;
    else cart.push({...item, qty:1});

    renderCart();
}

// عرض الكارت
function renderCart(){
    let html="", total=0;

    cart.forEach((i,idx)=>{
        total += i.price*i.qty;

        html += `<div class="cart-item">
        ${i.ar} x ${i.qty}
        <div>
        <button onclick="change(${idx},1)">+</button>
        <button onclick="change(${idx},-1)">-</button>
        </div>
        </div>`;
    });

    document.getElementById('cart').innerHTML = html;
    document.getElementById('total').innerText = total + " ريال";
}

// تغيير الكمية
function change(i,d){
    cart[i].qty += d;
    if(cart[i].qty<=0) cart.splice(i,1);
    renderCart();
}

// رقم سفري
function getTakeaway(){
    return db.ref('counter').transaction(c=>{
        return (c||0)+1;
    }).then(r=>r.snapshot.val());
}

// إرسال الطلب
function sendOrder(){
    if(cart.length===0) return alert("فاضي");

    let type = document.getElementById('orderType').value;
    let table = document.getElementById('tableNumber').value;

    let order = {
        items: cart.map(i=>({ar:i.ar,qty:i.qty,p:i.price,dept:i.dept})),
        totalPrice: cart.reduce((t,i)=>t+(i.price*i.qty),0),
        status:"open",
        type:type
    };

    if(type==="محلي"){
        if(!table) return alert("اكتب ترابيزة");
        activeOrderId = "T_"+table;
        db.ref('live_orders/'+activeOrderId).set(order);
    }

    if(type==="سفري"){
        getTakeaway().then(num=>{
            activeOrderId = "TA_"+num;
            order.orderNum = num;
            db.ref('live_orders/'+activeOrderId).set(order);
        });
    }

    alert("تم الحفظ");
}

// تحصيل
function completeOrder(){
    if(!activeOrderId) return alert("مفيش طلب");

    db.ref('live_orders/'+activeOrderId).update({
        status:"paid",
        time:new Date().toISOString()
    });

    cart=[];
    renderCart();
    activeOrderId=null;

    alert("تم التحصيل");
}

// تقفيل وردية
function closeShift(){
    db.ref('live_orders').once('value', snap=>{
        let total=0;
        snap.forEach(o=>{
            if(o.val().status==="paid"){
                total += o.val().totalPrice;
            }
        });
        alert("الإجمالي: "+total+" ريال");
    });
}
</script>

</body>
</html>
