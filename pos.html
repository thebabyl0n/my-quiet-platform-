<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>POS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;display:flex}
.left{width:60%;padding:10px}
.right{width:40%;background:#1e293b;padding:10px}
.item{background:#334155;padding:10px;margin:5px;border-radius:8px;cursor:pointer}
.cart-item{display:flex;justify-content:space-between;margin:5px}
button{margin:3px;padding:5px 10px}
/* الأقسام (الفولدرات) */
.cat-container { 
    display: flex; 
    gap: 8px; 
    margin: 10px 0; 
    overflow-x: auto; 
    padding: 5px; 
}
.cat-btn { 
    background: #3b82f6; 
    border: none; 
    color: white; 
    padding: 8px 15px; 
    border-radius: 15px; 
    cursor: pointer; 
    white-space: nowrap; 
}
.cat-btn.active { background: #22c55e; }

/* تعديل شبكة الأصناف */
#items { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
    gap: 10px; 
}
.item { 
    background: #334155; 
    padding: 12px; 
    border-radius: 10px; 
    text-align: center; 
    border: 1px solid transparent; 
}
.item-p { color: #22c55e; display: block; font-size: 13px; margin-top: 5px; }

.item-p { color: #22c55e; display: block; font-size: 13px; }

/* 👇 ضيفي هنا */
#orderTabs button{
    font-weight:bold;
    border-radius:10px;
    padding:8px 12px;
    transition:0.3s;
}
#orderTabs button:hover{
    transform:scale(1.05);
}

/* 👇 وبعدين */
</style>
</head>

<body>

<div id="loginBox" style="
position:fixed;
top:0;left:0;right:0;bottom:0;
background:#0f172a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
">

<h2>🔐 تسجيل الدخول</h2>

<input id="user" placeholder="اسم المستخدم" style="margin:5px;padding:10px;">
<input id="pass" placeholder="كلمة السر" type="password" style="margin:5px;padding:10px;">

<button onclick="login()" style="padding:10px 20px;background:#22c55e;color:white;border:none;border-radius:8px;">
دخول
</button>

</div>
<div class="left">
<input id="search" placeholder="🔍 بحث" oninput="searchItems(this.value)">
<div class="main-depts" style="display:flex; gap:10px; margin-bottom:10px;">
    <button class="cat-btn" style="background:#c8a27c; flex:1;" onclick="loadSubDepts('barista')">☕ باريستا</button>
    <button class="cat-btn" style="background:#c8a27c; flex:1;" onclick="loadSubDepts('dessert')">🍰 حلا</button>
    <button class="cat-btn" style="background:#c8a27c; flex:1;" onclick="loadSubDepts('kitchen')">🍳 مطبخ</button>
</div>
<div id="categories" class="cat-container"></div>
<div id="items"></div>
</div>
<div style="
position: fixed;
bottom: 10px;
left: 10px;
right: 10px;
z-index: 999;
">
    <button onclick="newOrder()" style="
    width: 100%;
    padding: 15px;
    font-size: 18px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 12px;
    ">
    🆕 فاتورة جديدة
    </button>
</div>
<div class="right">

<div id="orderTabs"></div> <!-- 👈 هنا بالظبط -->

<h3>🧾 الفاتورة</h3>

<select id="orderType">
<option value="محلي">محلي</option>
<option value="سفري">سفري</option>
</select>

<input id="tableNumber" placeholder="رقم الترابيزة">

<div id="cart"></div>
<div id="total">0 ريال</div>

<div id="statusBox" style="margin-top:10px; font-size:14px;"></div>

<button onclick="sendOrder()">➕ إضافة</button>
<button onclick="completeOrder()">💰 تحصيل</button>
<button onclick="closeShift()">📊 تقفيل وردية</button>

<script>
const firebaseConfig = {
 apiKey: "AIzaSy...",
 databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let orders = [];
let currentOrderIndex = 0;
let allItems = {};
let activeOrders = [];

// 2. دالة الفلترة عشان الأزرار تشتغل
let currentCategory = 'all';
let allSubCats = {}; 

// 1. سحب كل الأقسام الفرعية وتخزينها
db.ref('sub_categories').on('value', snap => {
    allSubCats = snap.val() || {};
    loadSubDepts('barista'); // يفتح أوتوماتيك على الباريستا
});

// 2. وظيفة عرض الأقسام الفرعية بناءً على القسم الرئيسي
function loadSubDepts(mainName) {
    // 1. تلوين الزرار الكبير اللي ضغطت عليه (باريستا/حلا/مطبخ)
    // ملاحظة: لو مدي للزراير id أو class تقدر تميزهم بيه
    
   let html = `<button class="cat-btn active" onclick="filterCat('all', this)">الكل</button>`;
    
    let foundAny = false;
    Object.keys(allSubCats).forEach(key => {
        let cat = allSubCats[key];
        // بنفلتر الأقسام الفرعية اللي تابعة للقسم الكبير ده
        if (cat.mainDept === mainName || cat.parent === mainName) {
            html += `<button class="cat-btn" onclick="filterCat('${key}', this)">${cat.name}</button>`;
            foundAny = true;
        }
    });

    // 2. تحديث قائمة الأقسام الفرعية
    document.getElementById('categories').innerHTML = html || "<p style='color:#666'>لا توجد أقسام فرعية</p>";

    // 3. التعديل اللي إنت عايزه (إخفاء الأصناف)
    // أول ما تدوس على باريستا، شاشة الأصناف تفضى وتستنى تختار قسم فرعي
    document.getElementById('items').innerHTML = `<p style='text-align:center; width:100%; color:var(--gold);'>اختر قسماً فرعياً (مثل: ${mainName}) لعرض المنتجات</p>`;
}

function filterCat(catId, btn) {
    currentCategory = catId;
    
    // تلوين الزرار النشط
    if(btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    let itemsArray = Object.values(allItems);
    
    // هنا التكة: بنخلي البرنامج يدور في الـ sub_id اللي الداشبورد بيبعتها
    let filtered = catId === 'all' ? itemsArray : itemsArray.filter(i => {
        return i.sub_id === catId || i.categoryId === catId;
    });
    
    renderItems(filtered);
}


// تحميل الأصناف
db.ref('menu_items').on('value', snap=>{
    allItems = snap.val() || {};
    filterCat(currentCategory);
});


// عرض الأصناف
function renderItems(items){
    let html="";
    items.forEach(i=>{
        html += `
        <div class="item" onclick="add('${i.ar}')">
            <strong>${i.ar}</strong>
            <span class="item-p">${i.price} ريال</span>
        </div>`;
    });
    document.getElementById('items').innerHTML = html;
}

// إضافة للكارت
function add(name){

    if(!orders[currentOrderIndex]){
        orders[currentOrderIndex] = {items: []};
    }    

    let item = Object.values(allItems).find(i=>i.ar===name);

    let cart = orders[currentOrderIndex].items;

    let found = cart.find(i=>i.ar===name);

    if(found) found.qty++;
    else cart.push({...item, qty:1});

    renderCart();
    
    saveOrdersToFirebase();
}

// عرض الكارت
function renderCart(){

    let cart = orders[currentOrderIndex]?.items || [];

    let html="", total=0;

    cart.forEach((i,idx)=>{
        total += i.price*i.qty;

        html += `<div class="cart-item">
        ${i.ar} x ${i.qty}
        <div>
        <button onclick="change(${idx},1)">+</button>
        <button onclick="change(${idx},-1)">-</button>
        </div>
        </div>`;
    });

    document.getElementById('cart').innerHTML = html;
    document.getElementById('total').innerText = total + " ريال";
}
async function getTakeaway(){
    let snap = await db.ref('takeaway_counter').once('value');
    let num = snap.val() || 1;

    await db.ref('takeaway_counter').set(num + 1);

    return num;
}

// إرسال الطلب
async function sendOrder(){

    let cart = orders[currentOrderIndex]?.items || [];

    if(cart.length === 0) return alert("السلة فاضية!");

    let type = document.getElementById('orderType').value;
    let table = document.getElementById('tableNumber').value;

    let cashier = localStorage.getItem("cashier");

    let order = {
        items: cart.map(i => ({
            ar: i.ar,
            qty: i.qty,
            p: i.price,
            dept: i.dept || "kitchen"
        })),
        totalPrice: cart.reduce((t, i) => t + (i.price * i.qty), 0),
        status: "open",
        type: type,
        table: table,
        cashier: cashier, // 👈 هنا الصح
        time: new Date().toISOString()
    };

    let orderPath;

    if(type === "محلي"){
        orderPath = 'T_' + table;
    }else{
        let num = await getTakeaway();
        order.orderNum = num;
        orderPath = 'TA_' + num;
    }

    db.ref('live_orders/' + orderPath).set(order);

    let shiftId = localStorage.getItem("shiftId");

    if(!shiftId){
        shiftId = "shift_" + Date.now();
        localStorage.setItem("shiftId", shiftId);
    }

    db.ref('shifts/' + shiftId + '/' + orderPath).set(order);

    activeOrders.push(orderPath);

    watchOrderStatus();

    alert("تم إرسال الطلب ✅");
}

function completeOrder(){

    if(activeOrders.length === 0) return alert("مفيش طلب");

    let id = activeOrders[0];
    
    db.ref('live_orders/'+id).update({
        status:"تمت المحاسبة ✅",
        accountingTime:new Date().toISOString()
    });

    // 👇 نحذف الفاتورة من الأساس
    orders.splice(currentOrderIndex, 1);
    currentOrderIndex = 0;
    
    saveOrdersToFirebase();

    renderCart();
    renderOrderTabs();

    activeOrders.shift();

    alert("تم التحصيل 💰");
}

function newOrder(){
    let orderNumber = Date.now(); // رقم فريد

    orders.push({
        items: [],
        orderNumber: orderNumber
    });
    
    saveOrdersToFirebase();

    currentOrderIndex = orders.length - 1;

    document.getElementById('tableNumber').value = "";

    renderCart();
    renderOrderTabs();

    alert("تم فتح فاتورة رقم " + orderNumber);
}

// متابعة حالة الأقسام
function watchOrderStatus(){
    if(activeOrders.length === 0) return;

    let id = activeOrders[activeOrders.length - 1];

    db.ref('live_orders/' + id).on('value', snap => {
        let o = snap.val();
        if(!o) return;

        document.getElementById('statusBox').innerHTML = `
        <span style="color:${o.baristaReady ? '#22c55e' : '#fbbf24'}">☕ باريستا</span> |
        <span style="color:${o.kitchenReady ? '#22c55e' : '#fbbf24'}">🍳 مطبخ</span> |
        <span style="color:${o.dessertReady ? '#22c55e' : '#fbbf24'}">🍰 حلا</span>
        `;
    });
}

function searchItems(text){
    let itemsArray = Object.values(allItems);

    let filtered = itemsArray.filter(i =>
        i.ar.includes(text)
    );

    renderItems(filtered);
}

function login(){

    let name = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(!name || !pass){
        alert("اكتب البيانات");
        return;
    }

    db.ref('users/' + name).once('value', snap => {

        let data = snap.val();

        if(!data){
            alert("المستخدم غير موجود ❌");
            return;
        }

        if(data.pass !== pass){
            alert("كلمة السر غلط ❌");
            return;
        }

        // ✅ تسجيل دخول ناجح
        localStorage.setItem("cashier", name);

        document.getElementById("loginBox").style.display = "none";

        startShift();
    });
}

// تقفيل وردية
function closeShift(){

    let shiftId = localStorage.getItem("shiftId");

    db.ref('shifts/' + shiftId).once('value', snap=>{
        let total=0;

        snap.forEach(o=>{
            total += o.val().totalPrice || 0;
        });

        alert("إجمالي الوردية: " + total + " ريال");

        localStorage.removeItem("shiftId");
    });
}


function switchOrder(index){
    currentOrderIndex = index;
    renderCart();
    renderOrderTabs();
}


// 👇 حطي هنا بالظبط
function renderOrderTabs(){
    let html = "";

    orders.forEach((o, index)=>{
        html += `
        <button onclick="switchOrder(${index})" style="
            background:${index === currentOrderIndex ? '#22c55e' : '#334155'};
            color:white;
            margin:3px;
        ">
        🧾 ${index + 1}
        </button>`;
    });

    document.getElementById("orderTabs").innerHTML = html;
}
window.onload = function(){

    let cashier = localStorage.getItem("cashier");

    if(!cashier){
        // لو مفيش تسجيل دخول
        document.getElementById("loginBox").style.display = "flex";
        return;
    }

    // لو فيه كاشير مخزن
    document.getElementById("loginBox").style.display = "none";

    db.ref('open_orders/' + cashier).once('value', snap => {

        let data = snap.val();

        if(data){
            orders = data;
        }

        if(orders.length === 0){
            newOrder();
        }

        renderOrderTabs();
        renderCart();
    });
}

function saveOrdersToFirebase(){

    let cashier = localStorage.getItem("cashier");

    db.ref('open_orders/' + cashier).set(orders);
}

function startShift(){
    console.log("shift started");
}

// 👇 ده يفضل يفضل زي ما هو
// أول ما الصفحة تفتح
if(orders.length === 0){

}

</script>

</body>
</html>
