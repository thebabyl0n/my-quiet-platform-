<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Alpha Shadow Cafe</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #c8a27c; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-size: cover; background-position: center; background-attachment: fixed; color: white; transition: 0.5s; }
        .overlay { background: rgba(15, 23, 42, 0.85); min-height: 100vh; padding: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        #logo { max-width: 100px; border-radius: 50%; border: 2px solid var(--gold); }
        
        /* Slider العروض */
        .slider-container { overflow-x: auto; display: flex; gap: 10px; margin-bottom: 20px; padding-bottom: 10px; }
        .slider-img { width: 280px; height: 150px; border-radius: 15px; flex-shrink: 0; object-fit: cover; border: 1px solid var(--gold); }

        /* المشروبات */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border-radius: 15px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .item-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        .item-card h4 { margin: 10px 0 5px; font-size: 14px; }
        .item-price { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: block; }
        
        /* الإضافات (Dropdown) */
        .extra-select { width: 100%; padding: 8px; border-radius: 8px; background: var(--dark); color: white; border: 1px solid var(--gold); font-size: 12px; margin-bottom: 10px; }
        .btn-add { background: var(--gold); color: var(--dark); border: none; padding: 8px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }

        /* سلة الطلبات */
        .cart-section { margin-top: 30px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; border: 1px dashed var(--gold); }
        .notes-area { width: 100%; padding: 10px; border-radius: 10px; margin-top: 10px; box-sizing: border-box; }
        .coupon-box { display: flex; gap: 5px; margin-top: 10px; }
        .coupon-box input { flex: 1; padding: 10px; border-radius: 8px; border: none; }
        .btn-send { background: #22c55e; color: white; width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <img id="logo" src="" alt="Logo">
        <h2 id="cafeNameDisplay">تحميل...</h2>
    </header>

    <div class="slider-container" id="offersSlider"></div>

    <div class="menu-grid" id="menuItems"></div>

    <div class="cart-section">
        <h3>🛒 طلباتك</h3>
        <div id="cartList"></div>
        <hr>
        <div class="coupon-box">
            <input type="text" id="couponInput" placeholder="كود الخصم">
            <button onclick="applyCoupon()" style="background:var(--gold); border:none; border-radius:8px; padding:0 10px;">تفعيل</button>
        </div>
        <textarea id="orderNotes" class="notes-area" placeholder="ملاحظاتك (السكر، المزاج، طلبات خاصة)..."></textarea>
        <div style="margin-top:10px; font-size:18px;">الإجمالي: <span id="totalPrice">0</span> ريال</div>
        <button class="btn-send" onclick="sendOrder()">إرسال الطلب عبر واتساب ✅</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let cart = [];
    let discount = 0;
    let welcomeVoice = "";
    let readyVoice = "";
    let extraOptionsHTML = "";

    // 1. تحميل الهوية والمظهر والأصوات
    database.ref('settings').on('value', snap => {
        const s = snap.val();
        if(s) {
            if(s.branding) {
                document.getElementById('cafeNameDisplay').innerText = s.branding.name;
                document.getElementById('pageTitle').innerText = s.branding.name;
                document.getElementById('logo').src = s.branding.logo;
                document.body.style.backgroundImage = `url('${s.branding.bg}')`;
            }
            if(s.audio) {
                welcomeVoice = s.audio.welcome;
                readyVoice = s.audio.ready;
                // نطق الترحيب عند أول لمسة للشاشة (سياسة المتصفح)
                document.body.onclick = () => { if(welcomeVoice) { speak(welcomeVoice); document.body.onclick = null; } };
            }
        }
    });

    // 2. تحميل العروض (Slider)
    database.ref('offers').on('value', snap => {
        let h = "";
        snap.forEach(c => h += `<img src="${c.val().img}" class="slider-img">`);
        document.getElementById('offersSlider').innerHTML = h;
    });

    // 3. تحميل الإضافات (Dropdown)
    database.ref('extras_options').on('value', snap => {
        extraOptionsHTML = `<option value="">بدون إضافات</option>`;
        snap.forEach(c => {
            extraOptionsHTML += `<option value="${c.val().en}" data-ar="${c.val().ar}" data-price="${c.val().price}">${c.val().ar} (+${c.val().price})</option>`;
        });
        loadMenu(); // تحميل المنيو بعد الإضافات
    });

    // 4. تحميل المشروبات
    function loadMenu() {
        database.ref('menu_items').on('value', snap => {
            let h = "";
            snap.forEach(child => {
                const item = child.val();
                h += `
                <div class="item-card">
                    <img src="${item.img}">
                    <h4>${item.ar}</h4>
                    <span class="item-price">${item.price} ريال</span>
                    <select class="extra-select" id="extra-${child.key}">${extraOptionsHTML}</select>
                    <button class="btn-add" onclick="addToCart('${child.key}', '${item.ar}', '${item.en}', ${item.price})">إضافة +</button>
                </div>`;
            });
            document.getElementById('menuItems').innerHTML = h;
        });
    }

    function addToCart(key, ar, en, price) {
        const extraSelect = document.getElementById('extra-'+key);
        const extraEn = extraSelect.value;
        const extraAr = extraSelect.options[extraSelect.selectedIndex].getAttribute('data-ar');
        const extraPrice = parseFloat(extraSelect.options[extraSelect.selectedIndex].getAttribute('data-price') || 0);

        cart.push({ ar, en, price, extraAr, extraEn, extraPrice });
        speak(en + (extraEn ? " with " + extraEn : ""));
        updateCart();
    }

    function updateCart() {
        let h = "";
        let total = 0;
        cart.forEach((item, index) => {
            const itemTotal = item.price + item.extraPrice;
            total += itemTotal;
            h += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>${item.ar} ${item.extraAr ? '('+item.extraAr+')' : ''}</span>
                    <span>${itemTotal} ريال <button onclick="cart.splice(${index},1); updateCart()" style="background:red; color:white; border:none; border-radius:5px;">X</button></span>
                  </div>`;
        });
        
        let finalTotal = total - (total * (discount / 100));
        document.getElementById('cartList').innerHTML = h;
        document.getElementById('totalPrice').innerText = finalTotal.toFixed(2);
    }

    function applyCoupon() {
        const code = document.getElementById('couponInput').value.toUpperCase();
        database.ref('coupons/' + code).once('value', snap => {
            if(snap.exists()) {
                discount = snap.val().pct;
                alert("تم تطبيق خصم " + discount + "%");
                updateCart();
            } else { alert("كود غير صحيح!"); }
        });
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function sendOrder() {
        if(cart.length === 0) return alert("السلة فاضية!");
        if(readyVoice) speak(readyVoice);

        let orderDetails = "طلب جديد:\n";
        cart.forEach(i => {
            orderDetails += `- ${i.ar} ${i.extraAr ? '['+i.extraAr+']' : ''}\n`;
        });
        orderDetails += `\nالملاحظات: ${document.getElementById('orderNotes').value}`;
        orderDetails += `\nالإجمالي بعد الخصم: ${document.getElementById('totalPrice').innerText} ريال`;

        // سجل الطلب في الداتابيز للباريستا
        database.ref('orders').push({
            items: cart,
            notes: document.getElementById('orderNotes').value,
            total: document.getElementById('totalPrice').innerText,
            status: 'pending',
            time: new Date().getTime()
        });

        const phone = "201027179831"; // رقمك أو رقم الكافيه
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(orderDetails)}`);
        cart = [];
        updateCart();
    }
</script>
</body>
</html>
