<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصتي الهادئة</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input[type="file"] { margin: 20px 0; }
        button { background-color: #a0c4ff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #90b4ef; }
    </style>
</head>
<body>
    <div class="container">
        <h2>أهلاً بك</h2>
        <p>ارفع ملفاتك (صور، فيديو، ملفات) بكل سهولة</p>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file">
            <button type="submit">رفع الآن</button>
        </form>
    </div>
</body>
</html>
