<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بارنيز - المنيو الذكي</title>
    <style>
        :root { --primary-color: #006a4d; --accent-color: #c8a27c; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-color); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .logo-welcome { width: 180px; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 3px solid white; object-fit: cover; height: 180px; }
        .btn-start { background-color: var(--accent-color); color: white; border: none; padding: 18px 60px; border-radius: 50px; font-size: 24px; cursor: pointer; font-weight: bold; transition: 0.4s; }
        #table-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 1001; width: 85%; max-width: 380px; text-align: center; }
        select { width: 100%; padding: 15px; margin: 25px 0; border-radius: 12px; border: 2px solid var(--primary-color); font-size: 20px; font-weight: bold; }
        .header { background: white; padding: 20px; position: sticky; top: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.08); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo-small { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .menu-container { padding: 20px; max-width: 600px; margin: auto; padding-bottom: 120px; }
        .menu-item { background: white; margin-bottom: 20px; border-radius: 20px; overflow: hidden; display: flex; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; }
        .item-img { width: 110px; height: 110px; object-fit: cover; border-left: 1px solid #eee; }
        .item-info { padding: 15px; flex-grow: 1; }
        .item-name { font-weight: bold; font-size: 19px; color: #222; }
        .item-price { color: var(--primary-color); font-weight: 800; }
        .btn-add { background: var(--primary-color); color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .cart-float { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #25d366; color: white; padding: 18px; border-radius: 50px; font-size: 18px; font-weight: bold; border: none; display: flex; justify-content: center; align-items: center; gap: 10px; z-index: 200; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400" alt="Barnies" class="logo-welcome">
        <h1>أهلاً بك في بارنيز</h1>
        <p>نكهة القهوة الأصيلة بين يديك</p>
        <button class="btn-start" onclick="showTableModal()">ابدأ طلبك الآن</button>
    </div>

    <div id="table-modal">
        <h2>تشرفنا بزيارتك</h2>
        <p>من فضلك اختر رقم الطاولة</p>
        <select id="table-select">
            <option value="1">طاولة 1</option><option value="2">طاولة 2</option><option value="3">طاولة 3</option><option value="4">طاولة 4</option><option value="5">طاولة 5</option>
        </select>
        <button class="btn-start" onclick="startMenu()" style="width: 100%;">استعراض المنيو</button>
    </div>

    <div id="main-content" style="display: none;">
        <div class="header">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=200" class="logo-small">
            <span id="table-display" style="font-weight: bold; color: var(--primary-color); font-size: 18px;"></span>
        </div>
        <div class="menu-container">
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=400" class="item-img">
                <div class="item-info"><span class="item-name">سبانش لاتيه</span><br><span class="item-price">18 ريال</span></div>
                <button class="btn-add" onclick="addToCart('سبانش لاتيه')">إضافة</button>
            </div>
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400" class="item-img">
                <div class="item-info"><span class="item-name">V60 حار</span><br><span class="item-price">22 ريال</span></div>
                <button class="btn-add" onclick="addToCart('V60 حار')">إضافة</button>
            </div>
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1587049016823-69ef9d68bd44?w=400" class="item-img">
                <div class="item-info"><span class="item-name">كيكة العسل</span><br><span class="item-price">15 ريال</span></div>
                <button class="btn-add" onclick="addToCart('كيكة العسل')">إضافة</button>
            </div>
        </div>
        <button class="cart-float" onclick="sendOrder()">إرسال الطلب (واتساب) - <span id="cart-count">0</span></button>
    </div>

    <script>
        let cart = []; let selectedTable = "";
        function speak(text) { if ('speechSynthesis' in window) { const msg = new SpeechSynthesisUtterance(text); msg.lang = 'ar-SA'; window.speechSynthesis.speak(msg); } }
        function showTableModal() { document.getElementById('table-modal').style.display = 'block'; speak("أهلاً بك في بارنيز.. اختر طاولتك"); }
        function startMenu() { 
            selectedTable = document.getElementById('table-select').value; 
            document.getElementById('welcome-screen').style.display = 'none'; 
            document.getElementById('table-modal').style.display = 'none'; 
            document.getElementById('main-content').style.display = 'block'; 
            document.getElementById('table-display').innerText = "طاولة: " + selectedTable; 
            speak("تفضل المنيو.. وقتاً سعيداً"); 
        }
        function addToCart(name) { cart.push(name); document.getElementById('cart-count').innerText = cart.length; speak("تم إضافة " + name + ".. تأمرني بشيء ثاني؟"); }
        function sendOrder() { 
            if(cart.length === 0) return speak("السلة فارغة");
            const phone = "966579747707"; 
            let text = `*طلب جديد من بارنيز ☕*\n\n📍 طاولة: ${selectedTable}\n📋 الطلبات:\n- ${cart.join('\n- ')}`; 
            speak("شكراً لطلبك.. جاري الإرسال");
            setTimeout(() => { window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank'); }, 1000);
        }
    </script>
</body>
</html>
