<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac", 
        authDomain: "://firebaseapp.com", 
        projectId: "alphashadow-23689", 
        databaseURL: "https://firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 📍 إحداثيات حي النسيم بجدة (السيادة الجغرافية)
    const TARGET_LAT = 21.522492; const TARGET_LON = 39.229700; const ALLOWED_DISTANCE = 0.15;

    let cart = []; let welcomeAudio = ""; let readyAudio = ""; let successMsg = "";
    let oType = ""; let tNum = ""; let extrasStr = ""; let currentOrderId = null;
    let discountValReal = 0; let discountType = "percent"; let activePromo = "";

    // 1. التحقق الجغرافي (Double Shield)
    window.onload = () => {
        validateGeo(() => {
            document.getElementById('geo-shield').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'flex';
        }, () => {
            document.getElementById('geo-status').innerText = "❌ خارج نطاق الإمبراطورية (حي النسيم)";
        });
    };

    function validateGeo(onSuccess, onError) {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const R = 6371;
                const dLat = (TARGET_LAT - pos.coords.latitude) * Math.PI / 180;
                const dLon = (TARGET_LON - pos.coords.longitude) * Math.PI / 180;
                const a = Math.sin(dLat / 2) ** 2 + Math.cos(pos.coords.latitude * Math.PI / 180) * Math.cos(TARGET_LAT * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
                const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                if (dist <= ALLOWED_DISTANCE) onSuccess(); else onError();
            }, onError, { enableHighAccuracy: true });
        } else { alert("GPS مطلوب السيادة 📍"); }
    }

    // 2. تحميل المنيو (تعديل الجدة رقم 1: تطهير القسم)
    function loadMenu() {
        database.ref('menu_items').on('value', snap => {
            let h = "";
            snap.forEach(child => {
                const item = child.val();
                // 🔥 حقنة الجدة: ضمان الـ lowercase والـ trim للقسم
                const itemDept = item.dept ? item.dept.toLowerCase().trim() : 'barista';
                h += `<div class="item-card">
                    <img src="${item.img}">
                    <h4>${item.ar}</h4>
                    <span style="color:var(--gold);font-weight:700;">${item.price} ريال</span>
                    <select class="extra-sel" id="ex-${child.key}">${extrasStr}</select>
                    <button class="add-btn" onclick="addToCart('${child.key}','${item.ar}','${item.en}',${item.price},'${itemDept}')">إضافة +</button>
                </div>`;
            });
            document.getElementById('menu').innerHTML = h;
        });
    }

    function addToCart(k, ar, en, p, dept) {
        const s = document.getElementById('ex-'+k);
        const exAr = s.options[s.selectedIndex].getAttribute('data-ar') || "";
        const exP = parseFloat(s.options[s.selectedIndex].getAttribute('data-p') || 0);
        // 🔥 حقنة الجدة: تمرير الـ dept الصافي للسلة
        cart.push({k, ar, en, p, exAr, exP, qty: 1, dept: dept});
        talk(en); renderCart();
    }

    // 3. إرسال الطلب (تعديل الجدة رقم 2: الختم الموحد)
    function submitOrder() {
        if(!cart.length) return alert("السلة فارغة");
        validateGeo(() => {
            const finalTotal = document.getElementById('total').innerText;
            const subTotal = cart.reduce((acc, i) => acc + (i.p + i.exP) * i.qty, 0);
            let dAmount = (discountType === "percent") ? (subTotal * discountValReal / 100) : discountValReal;
            
            // 🔥 حقنة الجدة: ختم الأقسام المطلوب بدقة Case-Insensitive
            const deptsNeeded = [...new Set(cart.map(item => (item.dept || 'barista').toLowerCase().trim()))];

            const orderData = {
                items: cart, type: oType, table: tNum || 'سفري',
                notes: document.getElementById('notes').value, // مطابق للاستقبال ✅
                promoUsed: activePromo, discountAmount: dAmount.toFixed(2),
                totalPrice: finalTotal, status: 'قيد التحضير ⏳',
                time: new Date().toLocaleTimeString('ar-SA'),
                deptsNeeded: deptsNeeded, // الختم السيادي الملياري ✅
                baristaReady: false, kitchenReady: false, dessertReady: false
            };

            const orderRef = database.ref('live_orders').push();
            orderRef.set(orderData);
            document.getElementById('order-status-bar').style.display = 'block';
            showToast("تم إرسال الطلب بنجاح! 🎉");
            
            // فتح الواتساب (اختياري حسب رغبتك)
            let msg = `*طلب جديد* ☕\n*الإجمالي*: ${finalTotal} ريال`;
            window.open(`https://wa.me{encodeURIComponent(msg)}`);

            cart = []; renderCart();
        }, () => alert("❌ يجب التواجد داخل الكافيه لإتمام الطلب 📍"));
    }

    // ... (باقي الدوال: renderCart, talk, showToast, applyPromo كما هي في نسختك الأصلية) ...
</script>
