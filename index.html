<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بارنيز الذكي - نظام SaaS المتكامل</title>
    <style>
        :root { --primary: #006a4d; --accent: #c8a27c; --bg: #f9f9f9; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); transition: 0.3s; overflow-x: hidden; }
        
        /* شاشة البداية (اللغة ونوع الطلب) */
        #SETUP_SCREEN { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .SETUP_CARD { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.4); }
        .BTN_ACTION { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 50px; width: 100%; font-size: 19px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .BTN_LANG { background: var(--accent); margin-bottom: 25px; border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #eee; margin: 10px 0; font-size: 16px; outline: none; background: #fff; }

        /* المنيو الرئيسي */
        .HEADER { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .LOGO { width: 55px; border-radius: 12px; border: 1px solid #eee; }
        .CONTAINER { padding: 20px; max-width: 550px; margin: auto; padding-bottom: 130px; }
        
        /* كارت المنتج */
        .ITEM_CARD { background: white; border-radius: 25px; display: flex; margin-bottom: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); align-items: center; border: 1px solid #f0f0f0; animation: fadeIn 0.5s ease; }
        .ITEM_IMG { width: 120px; height: 120px; object-fit: cover; }
        .ITEM_INFO { padding: 15px; flex: 1; text-align: right; }
        .ITEM_NAME { font-weight: bold; font-size: 20px; color: #333; display: block; margin-bottom: 5px; }
        .ITEM_PRICE { color: var(--primary); font-weight: 800; font-size: 18px; }
        .BTN_ADD { background: var(--primary); color: white; border: none; padding: 12px 22px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .BTN_ADD:active { transform: scale(0.9); }

        /* السلة العائمة (الواتساب والـ Dashboard) */
        .FOOTER_CART { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #25d366; color: white; padding: 20px; border-radius: 50px; text-align: center; font-weight: bold; font-size: 20px; border: none; box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4); z-index: 1001; display: flex; justify-content: center; align-items: center; gap: 12px; cursor: pointer; }

        /* تعديلات اللغة الإنجليزية */
        body.en { direction: ltr; }
        body.en .ITEM_INFO { text-align: left; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="MAIN_BODY">

    <div id="SETUP_SCREEN">
        <div class="SETUP_CARD">
            <button class="BTN_ACTION BTN_LANG" onclick="SwitchLanguage()">English / عربي</button>
            <h2 id="TXT_WELCOME">مرحباً بك في بارنيز</h2>
            
            <p id="TXT_TYPE_LABEL" style="margin:0; font-weight:bold;">نوع الطلب:</p>
            <select id="ORDER_TYPE" onchange="CheckOrderType()">
                <option value="dine">محلي (Inside)</option>
                <option value="take">سفري (Takeaway)</option>
            </select>

            <div id="TABLE_SELECTOR">
                <p id="TXT_TABLE_LABEL" style="margin:0; font-weight:bold;">رقم الطاولة:</p>
                <select id="TABLE_NUMBER">
                    <option value="1">1</option><option value="2">2</option>
                    <option value="3">3</option><option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <button class="BTN_ACTION" onclick="StartApplication()" id="TXT_START_BTN">ابدأ الطلب</button>
        </div>
    </div>

    <div id="APP_CONTENT" style="display:none;">
        <div class="HEADER">
            <img src="https://raw.githubusercontent.com/thebabyl0n/my-quiet-platform-/main/logo.jpg" class="LOGO" onerror="this.src='https://via.placeholder.com/60?text=Barnies'">
            <b id="TXT_NAV_TITLE" style="font-size:22px;">منيو بارنيز الذكي</b>
            <span id="BADGE_INFO" style="color:var(--primary); font-weight:bold; background:#e8f5e9; padding:6px 15px; border-radius:12px; font-size:14px;"></span>
        </div>

        <div id="MENU_LIST" class="CONTAINER"></div>

        <button class="FOOTER_CART" onclick="SendOrder()">
            <span id="TXT_SEND_BTN">إرسال الطلب</span> (<span id="CART_COUNT">0</span>)
        </button>
    </div>

    <script>
        let currentLang = 'ar';
        let userCart = [];
        // بيانات المنيو - الجدة قالت روابط مستقرة
        const products = [
            { id: 1, ar: "سبانش لاتيه حار", en: "Hot Spanish Latte", p: 18, img: "https://images.unsplash.com/photo-1541167760496-162955ed8a9f?auto=format&fit=crop&w=400&q=80", cat: "coffee" },
            { id: 2, ar: "V60 حار", en: "Hot V60", p: 22, img: "https://images.unsplash.com/photo-1544787210-22db3677f29e?auto=format&fit=crop&w=400&q=80", cat: "coffee" },
            { id: 3, ar: "كيكة العسل", en: "Honey Cake", p: 15, img: "https://images.unsplash.com/photo-1586040140378-b5634cb4c8fc?auto=format&fit=crop&w=400&q=80", cat: "cake" },
            { id: 4, ar: "كرواسون سادة", en: "Plain Croissant", p: 12, img: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=400&q=80", cat: "bakery" }
        ];

        // 🎙️ دالة الصوت الاحترافية (حل الجدة القاتل للتداخل)
        function Speak(text) {
            window.speechSynthesis.cancel(); // إيقاف فوري لأي صوت شغال
            setTimeout(() => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = currentLang === 'ar' ? 'ar-SA' : 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1.0;
                
                // التأكد من عدم التداخل نهائياً
                utterance.onstart = () => { window.speechSynthesis.cancel(); }; 

                window.speechSynthesis.speak(utterance);
            }, 50);
        }

        // تبديل اللغة
        function SwitchLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.body.className = currentLang === 'en' ? 'en' : '';
            const dict = {
                ar: {welcome:"مرحباً بك في بارنيز", type:"نوع الطلب:", table:"رقم الطاولة:", start:"ابدأ الطلب", nav:"منيو بارنيز الذكي", send:"إرسال الطلب"},
                en: {welcome:"Welcome to Barnies", type:"Order Type:", table:"Table Number:", start:"Start Order", nav:"Smart Barnies Menu", send:"Send Order"}
            };
            document.getElementById('TXT_WELCOME').innerText = dict[currentLang].welcome;
            document.getElementById('TXT_TYPE_LABEL').innerText = dict[currentLang].type;
            document.getElementById('TXT_TABLE_LABEL').innerText = dict[currentLang].table;
            document.getElementById('TXT_START_BTN').innerText = dict[currentLang].start;
            document.getElementById('TXT_NAV_TITLE').innerText = dict[currentLang].nav;
            document.getElementById('TXT_SEND_BTN').innerText = dict[currentLang].send;
            
            Speak(currentLang === 'ar' ? "تم التحويل للعربية" : "Switched to English");
        }

        function CheckOrderType() {
            document.getElementById('TABLE_SELECTOR').style.display = document.getElementById('ORDER_TYPE').value === 'take' ? 'none' : 'block';
        }

        // بدء التطبيق
        function StartApplication() {
            const type = document.getElementById('ORDER_TYPE').value;
            const table = document.getElementById('TABLE_NUMBER').value;
            
            document.getElementById('SETUP_SCREEN').style.display = 'none';
            document.getElementById('APP_CONTENT').style.display = 'block';
            
            let info = type === 'take' ? (currentLang === 'ar' ? 'سفري' : 'Takeaway') : (currentLang === 'ar' ? 'طاولة: ' : 'Table: ') + table;
            document.getElementById('BADGE_INFO').innerText = info;
            
            RenderMenu();
            Speak(currentLang === 'ar' ? `أهلاً بك، طلبك ${info}` : `Welcome, your order is ${info}`);
        }

        // عرض المنيو
        function RenderMenu() {
            document.getElementById('MENU_LIST').innerHTML = products.map(item => `
                <div class="ITEM_CARD">
                    <img src="${item.img}" class="ITEM_IMG" onerror="this.src='https://via.placeholder.com/120?text=Coffee'">
                    <div class="ITEM_INFO">
                        <span class="ITEM_NAME">${currentLang === 'ar' ? item.ar : item.en}</span>
                        <span class="ITEM_PRICE">${item.p} ${currentLang === 'ar' ? 'ريال' : 'SAR'}</span>
                    </div>
                    <button class="BTN_ADD" onclick="SmartAdd('${item.ar}', '${item.en}', '${item.cat}')">${currentLang === 'ar' ? 'إضافة' : 'Add'}</button>
                </div>
            `).join('');
        }

        // 🧠 الإضافة الذكية والاقتراحات (لمسة الجدة الـ VIP)
        function SmartAdd(ar, en, cat) {
            userCart.push(currentLang === 'ar' ? ar : en);
            document.getElementById('CART_COUNT').innerText = userCart.length;
            
            Speak(currentLang === 'ar' ? `تم إضافة ${ar}` : `Added ${en}`);

            // 🔥 ترقية الاقتراح الذكي (Up-selling)
            if (cat === 'coffee') {
                setTimeout(() => {
                    let msg = currentLang === 'ar' ? 
                        "ذوقك عالي! تحب تضيف كيكة العسل معاها؟" : 
                        "Great taste! Would you like to add Honey Cake to your order?";
                    
                    if(confirm(msg)) {
                        userCart.push(currentLang === 'ar' ? "كيكة العسل" : "Honey Cake");
                        document.getElementById('CART_COUNT').innerText = userCart.length;
                        Speak(currentLang === 'ar' ? "يا جماله! أضفنا الكيكة" : "Perfect! Cake added");
                    }
                }, 2000);
            }
        }

        // إرسال الطلب (واتساب + تجهيز للـ Dashboard)
        function SendOrder() {
            if(userCart.length === 0) return;
            const info = document.getElementById('BADGE_INFO').innerText;
            const text = `*طلب جديد من منيو بارنيز*\n📍 النوع: ${info}\n📋 الأصناف:\n- ${userCart.join('\n- ')}`;
            
            // رابط الواتساب السعودي المباشر
            window.open(`https://wa.me/966579747707?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
