<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بارنيز - منيو الإخوة</title>
    <style>
        :root { --primary: #006a4d; --accent: #c8a27c; --bg: #fdfdfd; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; transition: 0.3s; }
        
        /* شاشة البداية */
        #setup { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .card-setup { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-lang { background: var(--accent); margin-bottom: 25px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; margin: 10px 0; font-size: 16px; outline: none; }

        /* المنيو */
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .logo-sm { width: 55px; border-radius: 12px; }
        .container { padding: 15px; max-width: 500px; margin: auto; padding-bottom: 120px; }
        .item-row { background: white; border-radius: 20px; display: flex; margin-bottom: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.06); align-items: center; border: 1px solid #f5f5f5; }
        
        /* الصور HD */
        .img-box { width: 110px; height: 110px; flex-shrink: 0; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-box { padding: 15px; flex: 1; text-align: right; }
        .item-name { font-weight: bold; font-size: 19px; color: #222; display: block; }
        .item-price { color: var(--primary); font-weight: 800; font-size: 17px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }

        /* سلة الواتساب */
        .cart-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 440px; background: #25d366; color: white; padding: 20px; border-radius: 50px; text-align: center; font-weight: bold; font-size: 20px; border: none; box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); z-index: 1000; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        body.en { direction: ltr; }
        body.en .info-box { text-align: left; }
    </style>
</head>
<body id="body-tag">

    <div id="setup">
        <div class="card-setup">
            <button class="btn-action btn-lang" onclick="changeL()">English / عربي</button>
            <h2 id="m1">مرحباً بك في بارنيز</h2>
            
            <p id="m2" style="margin:0; font-weight:bold;">نوع الطلب:</p>
            <select id="sel-type" onchange="toggleT()">
                <option value="dine">محلي (Dine-in)</option>
                <option value="take">سفري (Takeaway)</option>
            </select>

            <div id="div-table">
                <p id="m3" style="margin:0; font-weight:bold;">رقم الطاولة:</p>
                <select id="sel-table">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
                </select>
            </div>

            <button class="btn-action" onclick="startApp()" id="m4">ابدأ الطلب</button>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <div class="header">
            <img src="https://raw.githubusercontent.com/thebabyl0n/my-quiet-platform-/main/logo.jpg" class="logo-sm" onerror="this.src='https://via.placeholder.com/60'">
            <b id="m5" style="font-size:20px;">منيو بارنيز</b>
            <span id="label-info" style="color:var(--primary); font-weight:bold; background:#eee; padding:5px 12px; border-radius:10px;"></span>
        </div>
        <div id="items-list" class="container"></div>
        <button class="cart-btn" onclick="sendW()">
            <span id="m6">إرسال الطلب</span> (<span id="cart-num">0</span>)
        </button>
    </div>

    <script>
        let lang = 'ar'; let cart = [];
        const menu = [
            { id:1, ar:"سبانش لاتيه حار", en:"Hot Spanish Latte", p:18, img:"https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=400" },
            { id:2, ar:"V60 حار", en:"Hot V60", p:22, img:"https://images.unsplash.com/photo-1544787210-22db3677f29e?w=400" },
            { id:3, ar:"كيكة العسل", en:"Honey Cake", p:15, img:"https://images.unsplash.com/photo-1586040140378-b5634cb4c8fc?w=400" }
        ];

        // 🎤 دالة الصوت الإمبراطورية - إيقاف فوري وتشغيل ذكي
        function talk(text) {
            window.speechSynthesis.cancel();
            setTimeout(() => {
                const speech = new SpeechSynthesisUtterance(text);
                speech.lang = (lang === 'ar') ? 'ar-SA' : 'en-US';
                speech.rate = 0.85;
                window.speechSynthesis.speak(speech);
            }, 40);
        }

        function changeL() {
            lang = (lang === 'ar') ? 'en' : 'ar';
            document.getElementById('body-tag').className = (lang === 'en') ? 'en' : '';
            const words = {
                ar: {m1:"مرحباً بك في بارنيز", m2:"نوع الطلب:", m3:"رقم الطاولة:", m4:"ابدأ الطلب", m5:"منيو بارنيز", m6:"إرسال الطلب"},
                en: {m1:"Welcome to Barnies", m2:"Order Type:", m3:"Table Number:", m4:"Start Order", m5:"Barnies Menu", m6:"Send Order"}
            };
            for(let id in words[lang]) document.getElementById(id).innerText = words[lang][id];
            talk(lang === 'ar' ? "تم اختيار العربية" : "English selected");
        }

        function toggleT() {
            document.getElementById('div-table').style.display = (document.getElementById('sel-type').value === 'take') ? 'none' : 'block';
        }

        function startApp() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app-ui').style.display = 'block';
            const typeText = document.getElementById('sel-type').value === 'take' ? (lang==='ar'?'سفري':'Takeaway') : (lang==='ar'?'طاولة: ':'Table: ') + document.getElementById('sel-table').value;
            document.getElementById('label-info').innerText = typeText;
            render();
            talk(lang === 'ar' ? "أهلاً بك.. استمتع بالمنيو الخاص بنا" : "Welcome.. please enjoy our menu");
        }

        function render() {
            document.getElementById('items-list').innerHTML = menu.map(i => `
                <div class="item-row">
                    <div class="img-box"><img src="${i.img}"></div>
                    <div class="info-box">
                        <span class="item-name">${lang==='ar'?i.ar:i.en}</span>
                        <span class="item-price">${i.p} ${lang==='ar'?'ريال':'SAR'}</span>
                    </div>
                    <button class="btn-add" onclick="addItem('${i.ar}','${i.en}')">${lang==='ar'?'إضافة':'Add'}</button>
                </div>
            `).join('');
        }

        function addItem(ar, en) {
            cart.push(lang === 'ar' ? ar : en);
            document.getElementById('cart-num').innerText = cart.length;
            talk(lang === 'ar' ? "تم إضافة " + ar : "Added " + en);
        }

        function sendW() {
            if(cart.length === 0) return;
            const msg = `*New Order / طلب جديد*\n📍 Type: ${document.getElementById('label-info').innerText}\n📋 Items:\n- ${cart.join('\n- ')}`;
            window.open(`https://wa.me/966579747707?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
