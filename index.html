<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Shadow | Smart Order</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #c8a27c; --dark: #0f172a; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; text-align: center; }
        .screen { position: fixed; inset: 0; background: var(--dark); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: 0.5s; }
        .order-btn { background: var(--gold); border: none; padding: 15px 40px; border-radius: 12px; margin: 10px; font-weight: bold; width: 220px; cursor: pointer; color: var(--dark); }
        .main-app { display: none; padding: 15px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { border: 1px solid #eee; padding: 10px; border-radius: 15px; background: #fff; }
        .add-btn { background: var(--dark); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 10001; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="check-screen" class="screen">
    <h2 id="check-msg">جاري التأكد من تواجدك في الكافيه... 📍</h2>
</div>

<div id="welcome-screen" class="screen" style="display: none;">
    <h2>Alpha Shadow</h2>
    <p>حي النسيم - فرع جدة ☕</p>
    <button class="order-btn" onclick="startOrder('سفري')">🚗 سفري</button>
    <button class="order-btn" onclick="startOrder('محلي')">☕ محلي</button>
</div>

<div class="main-app" id="app">
    <div class="menu-grid" id="menu"></div>
    <div style="background:#f9f9f9; padding:20px; border-radius:20px; margin-top:20px; border: 1px solid #ddd;">
        <h3>🛒 سلة الطلبات</h3>
        <div id="cartList"></div>
        <h4>الإجمالي: <span id="total">0</span> ريال</h4>
        <button class="order-btn" style="background:var(--green); color:white; width:100%;" onclick="submitWithLocationCheck()">إرسال الطلب (تأكيد نهائي للموقع 📍)</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 📍 إحداثيات حي النسيم من الصورة اللي بعتها
    const CAFE_LAT = 21.522492; 
    const CAFE_LON = 39.229700;
    const ALLOWED_DISTANCE = 0.15; // سماح بـ 150 متر حول النقطة

    let cart = []; let oType = "";

    window.onload = () => {
        checkLocation(() => {
            document.getElementById('check-screen').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'flex';
        }, () => {
            document.getElementById('check-msg').innerHTML = "❌ عذراً.. لازم تكون داخل فرع حي النسيم عشان تطلب";
        });
    };

    function checkLocation(onSuccess, onError) {
        if (!navigator.geolocation) return alert("المتصفح لا يدعم تحديد الموقع");
        navigator.geolocation.getCurrentPosition((pos) => {
            const dist = getDist(pos.coords.latitude, pos.coords.longitude, CAFE_LAT, CAFE_LON);
            if (dist <= ALLOWED_DISTANCE) onSuccess();
            else onError();
        }, (err) => {
            alert("يرجى تفعيل خدمة الموقع (GPS) للمتابعة");
            onError();
        }, { enableHighAccuracy: true });
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    db.ref('menu_items').on('value', snap => {
        let h = "";
        snap.forEach(c => {
            const i = c.val();
            h += `<div class="item-card"><h4>${i.ar}</h4><p>${i.price} ريال</p><button class="add-btn" onclick="addToCart('${i.ar}', ${i.price}, '${i.dept || 'barista'}')">إضافة +</button></div>`;
        });
        document.getElementById('menu').innerHTML = h;
    });

    function startOrder(t) { oType = t; document.getElementById('welcome-screen').style.display = 'none'; document.getElementById('app').style.display = 'block'; }
    function addToCart(ar, p, dept) { cart.push({ar, p, dept}); renderCart(); showToast(`تم إضافة ${ar}`); }
    function renderCart() { let h = ""; let total = 0; cart.forEach(i => { h += `<div>${i.ar} - ${i.p} ريال</div>`; total += i.p; }); document.getElementById('total').innerText = total; document.getElementById('cartList').innerHTML = h; }

    function submitWithLocationCheck() {
        if(!cart.length) return alert("السلة فارغة");
        
        // 📍 الفحص الثاني عند الإرسال
        checkLocation(() => {
            const depts = [...new Set(cart.map(i => i.dept))];
            const data = {
                items: cart, type: oType, status: 'قيد التحضير ⏳',
                time: new Date().toLocaleTimeString('ar-SA'),
                deptsNeeded: depts, baristaReady: false, kitchenReady: false
            };
            db.ref('live_orders').push(data).then(() => {
                alert("تم إرسال طلبك بنجاح! ✅");
                cart = []; renderCart();
            });
        }, () => alert("❌ فشل التحقق.. أنت خارج نطاق الكافيه حالياً"));
    }

    function showToast(m) {
        const t = document.getElementById('toast'); t.innerText = m;
        t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000);
    }
</script>
</body>
</html>
