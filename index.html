<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Shadow VIP</title>
    <style>
        :root { --primary: #0f172a; --accent: #22c55e; --gold: #c8a27c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8fafc; overflow-x: hidden; padding-bottom: 100px; }
        
        /* شاشة الاستقبال بالخلفية الهيبة اللي اخترتها */
        .hero { 
            position: fixed; inset: 0; 
            background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)), url('https://i.postimg.cc/kMQRJDQ3/xresch_blueprint_6944719_1920.jpg'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 2000; color: white; text-align: center;
        }

        .btn-main { 
            background: var(--gold); color: white; border: none; padding: 15px 40px; 
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px;
            width: 280px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card { background: white; margin: 15px; border-radius: 20px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee; }
        .card img { width: 100px; height: 100px; object-fit: cover; margin: 5px; border-radius: 15px; }
        .card-info { padding: 10px; flex: 1; text-align: right; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        .cart-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #25d366; color: white; padding: 18px 50px; border-radius: 50px; font-weight: bold; border: none; box-shadow: 0 10px 25px rgba(37,211,102,0.4); z-index: 1000; font-size: 18px; width: 90%; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="hero">
        <h1 style="font-size: 35px; margin-bottom: 5px;">Alpha-Shadow</h1>
        <p style="color: var(--gold); font-size: 18px; margin-bottom: 30px;">The Barn's Code</p>
        <div id="step1">
            <button class="btn-main" onclick="setMode('local')">📍 محلي / Dine-in</button><br>
            <button class="btn-main" onclick="setMode('away')">🚗 سفري / Takeaway</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div style="background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <b style="letter-spacing: 1px;">ALPHA SHADOW VIP</b>
            <span id="mode-badge" style="background:var(--gold); padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: bold;"></span>
        </div>
        
        <div id="menu-items"></div>

        <button class="cart-btn" onclick="sendOrder()">
            إرسال الطلب / Send Order (<span id="count">0</span>)
        </button>
    </div>

    <script>
        let orderMode = "";
        let cart = [];

        // قائمة الأصناف بالروابط المباشرة اللي رفعتها
        const menu = [
            { ar: "سبانش لاتيه بارد", en: "Iced Spanish Latte", price: 18, img: "https://i.postimg.cc/pVf5WyDG/FB_IMG_1775615731297.jpg" },
            { ar: "V60 حار", en: "Hot V60 Coffee", price: 22, img: "https://i.postimg.cc/Y26Lrj1d/FB_IMG_1775615760389.jpg" },
            { ar: "كيكة العسل الملكية", en: "Honey Cake", price: 15, img: "https://i.postimg.cc/bYxSydQ3/Screenshot_٢٠٢٦٠٤٠٨_٠٥٣٨٤٢_Brave.jpg" }
        ];

        function speak(text, lang) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang;
            window.speechSynthesis.speak(msg);
        }

        function setMode(mode) {
            orderMode = mode;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // نطق ترحيبي ثنائي اللغة بالترتيب
            const welcomeAr = mode === 'local' ? "يا هلا بيك.. تم اختيار محلي" : "أبشر.. طلبك سفري وعينك ما تشوف إلا النور";
            const welcomeEn = mode === 'local' ? "Welcome! Dine-in mode activated." : "Sure! Takeaway mode activated.";
            
            speak(welcomeAr, 'ar-SA');
            setTimeout(() => speak(welcomeEn, 'en-US'), 3500);
            
            document.getElementById('mode-badge').innerText = mode === 'local' ? "محلي | Dine-in" : "سفري | Takeaway";
            render();
        }

        function render() {
            let html = "";
            menu.forEach((item, i) => {
                html += `
                <div class="card">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/100?text=Coffee'">
                    <div class="card-info">
                        <b style="font-size:17px;">${item.ar}</b><br>
                        <small style="color:#64748b;">${item.en}</small><br>
                        <span style="color:var(--accent); font-weight:bold; font-size:18px;">${item.price} SAR</span>
                    </div>
                    <button class="btn-add" onclick="addToCart(${i})">إضافة / Add</button>
                </div>`;
            });
            document.getElementById('menu-items').innerHTML = html;
        }

        function addToCart(i) {
            cart.push(menu[i]);
            document.getElementById('count').innerText = cart.length;
            speak("تمت الإضافة", 'ar-SA');
        }

        function sendOrder() {
            if(cart.length === 0) return;
            const itemsList = cart.map(i => "- " + i.ar + " (" + i.en + ")").join("\n");
            const type = orderMode === 'local' ? "محلي / Dine-in" : "سفري / Takeaway";
            const msg = `*طلب جديد من Alpha-Shadow VIP*\n\n*النوع:* ${type}\n*الطلبات:*\n${itemsList}\n\n*شكراً لطلبكم!*`;
            window.open(`https://wa.me/966579747707?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
