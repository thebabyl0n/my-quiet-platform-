<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Shadow VIP: The Barn's Code</title>
    <style>
        :root { --primary: #0f172a; --accent: #22c55e; --gold: #c8a27c; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); transition: 0.3s; }
        .header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .lang-btn { background: var(--gold); border: none; padding: 8px 15px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        
        /* شاشات البداية */
        .overlay { position: fixed; inset: 0; background: var(--primary); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; }
        .btn-start { background: var(--gold); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* الكروت */
        .card { background: white; margin: 15px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; display: flex; align-items: center; }
        .card img { width: 120px; height: 120px; object-fit: cover; }
        .card-body { padding: 15px; flex: 1; text-align: right; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-left: 10px; }
        
        .cart-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #25d366; color: white; padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; box-shadow: 0 10px 30px rgba(37,211,102,0.4); z-index: 1000; }
    </style>
</head>
<body>

    <div id="welcome" class="overlay">
        <h1 id="w-title">Alpha-Shadow</h1>
        <p id="w-sub">The Barn's Code</p>
        <button class="btn-start" onclick="startApp()">ابدأ التجربة ☕ Start</button>
    </div>

    <div class="header">
        <span style="font-weight:900;">ALPHA SHADOW VIP</span>
        <button class="lang-btn" onclick="toggleLang()">EN / عربي</button>
    </div>

    <div id="menu-container" style="padding-bottom: 100px;"></div>

    <button class="cart-btn" onclick="checkout()">
        <span id="cart-text">إرسال الطلب</span> (<span id="count">0</span>)
    </button>

    <script>
        let lang = "ar";
        let cart = [];
        const items = [
            { ar: "سبانش لاتيه بارد", en: "Iced Spanish Latte", price: 18, img: "https://images.unsplash.com/photo-1592663516240-203496458514?w=300" },
            { ar: "V60 حار", en: "Hot V60 Coffee", price: 22, img: "https://images.unsplash.com/photo-1544787210-2827448b303c?w=300" },
            { ar: "كيكة العسل الملكية", en: "Honey Cake", price: 15, img: "https://images.unsplash.com/photo-1527515848392-f076f80928a3?w=300" }
        ];

        function speak(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = lang === "ar" ? "ar-SA" : "en-US";
            window.speechSynthesis.speak(m);
        }

        function startApp() {
            document.getElementById('welcome').style.display = 'none';
            speak(lang === "ar" ? "نورتنا في ألفا شادو.. اطلب اللي يروقك" : "Welcome to Alpha Shadow, enjoy your coffee");
            render();
        }

        function toggleLang() {
            lang = lang === "ar" ? "en" : "ar";
            document.body.dir = lang === "ar" ? "rtl" : "ltr";
            document.getElementById('cart-text').innerText = lang === "ar" ? "إرسال الطلب" : "Send Order";
            render();
        }

        function render() {
            let html = "";
            items.forEach((item, i) => {
                html += `
                <div class="card">
                    <img src="${item.img}">
                    <div class="card-body">
                        <b style="font-size:18px;">${lang === "ar" ? item.ar : item.en}</b><br>
                        <span style="color:var(--accent); font-weight:bold;">${item.price} ${lang === "ar" ? "ريال" : "SAR"}</span>
                    </div>
                    <button class="btn-add" onclick="add(${i})">${lang === "ar" ? "إضافة" : "Add"}</button>
                </div>`;
            });
            document.getElementById("menu-container").innerHTML = html;
        }

        function add(i) {
            cart.push(items[i]);
            document.getElementById("count").innerText = cart.length;
            speak(lang === "ar" ? "تمت إضافة " + items[i].ar : "Added " + items[i].en);
        }

        function checkout() {
            if (cart.length === 0) return speak(lang === "ar" ? "السلة فاضية" : "Cart is empty");
            const phone = "966579747707";
            let list = cart.map(i => "- " + (lang === "ar" ? i.ar : i.en)).join("\n");
            let msg = `*Alpha-Shadow: The Barn's Code*\n\n${lang === 'ar' ? 'الطلبات' : 'Orders'}:\n${list}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
