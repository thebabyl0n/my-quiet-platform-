<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Shadow VIP | Menu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #22c55e; --gold: #c8a27c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8fafc; padding-bottom: 160px; }
        .hero { position: fixed; inset: 0; background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)), url('https://i.postimg.cc/kMQRJDQ3/xresch_blueprint_6944719_1920.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: white; text-align: center; }
        .btn-main { background: var(--gold); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 10px; width: 280px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s; }
        .table-input { padding: 12px; border-radius: 10px; border: 1px solid var(--gold); width: 80%; margin-top: 10px; font-size: 16px; text-align: center; display: none; color: black; outline: none; }
        .card { background: white; margin: 15px; border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee; padding: 15px; }
        .card-top { display: flex; align-items: center; width: 100%; }
        .card img { width: 70px; height: 70px; object-fit: cover; border-radius: 12px; }
        .card-info { padding: 0 15px; flex: 1; }
        .counter-box { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 5px 10px; border-radius: 50px; }
        .btn-step { background: white; border: 1px solid #cbd5e1; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .qty { font-weight: bold; min-width: 20px; text-align: center; color: var(--primary); }
        .options-select { width: 100%; margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 14px; background: #f8fafc; outline: none; }
        .notes-area { width: 90%; margin: 15px auto; display: block; padding: 12px; border-radius: 15px; border: 1px solid #cbd5e1; font-family: inherit; resize: none; outline: none; }
        .cart-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 18px; border-radius: 50px; font-weight: bold; border: none; width: 90%; font-size: 18px; z-index: 1000; box-shadow: 0 10px 25px rgba(34,197,94,0.4); }
        #status-notif { position: fixed; top: 20px; width: 90%; left: 5%; background: var(--accent); color: white; padding: 15px; border-radius: 15px; text-align: center; display: none; z-index: 3000; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .footer-signature { text-align: center; padding: 30px 10px; color: #64748b; font-size: 12px; border-top: 1px solid #e2e8f0; background: #fff; margin-top: 20px; }
        .partnership-tag { color: var(--gold); font-weight: bold; letter-spacing: 2px; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div id="status-notif">طلبك جاهز! استلمه من الكاونتر ✨</div>

    <div id="welcome-screen" class="hero">
        <h1 style="font-size: 35px;">Alpha-Shadow</h1>
        <p style="color: var(--gold); font-size: 18px;">The Barn's Code</p>
        <button class="btn-main" onclick="askTable()">📍 محلي / Dine-in</button>
        <input type="number" id="tableNum" class="table-input" placeholder="رقم الطاولة">
        <button id="confirmTable" class="btn-main" style="display:none; background:var(--accent);" onclick="setMode('local')">تأكيد</button>
        <button class="btn-main" onclick="setMode('away')">🚗 سفري / Takeaway</button>
    </div>

    <div id="main-content" style="display:none;">
        <div style="background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;">
            <b style="letter-spacing: 1px;">ALPHA SHADOW VIP</b>
            <span id="mode-badge" style="background:var(--gold); padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: bold;"></span>
        </div>
        
        <div id="menu-items"></div>

        <textarea id="order-notes" class="notes-area" rows="3" placeholder="اكتب هنا ملاحظاتك (مثلاً: السكر، تقسيم الطلب، إلخ...)"></textarea>

        <div class="footer-signature">
            <p style="margin: 0;">Developed with 💡 by <b>Shadow & Alpha</b></p>
            <span class="partnership-tag">HAMADA ENGINEERING PARTNERSHIP</span>
        </div>

        <button class="cart-btn" onclick="sendOrder()">
            إرسال الطلب | <span id="total-price">0</span> SAR
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
            authDomain: "alphashadow-23689.firebaseapp.com",
            projectId: "alphashadow-23689",
            databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let orderMode = ""; let tableNumber = "";
        
        const menu = [
            { id: 0, ar: "سبانش لاتيه بارد", en: "Iced Spanish Latte", price: 18, img: "https://i.postimg.cc/pVf5WyDG/FB_IMG_1775615731297.jpg", qty: 0, 
              opts: [{name: "Standard", price: 0}, {name: "No Sugar", price: 0}, {name: "Almond Milk", price: 2}, {name: "Double Shot", price: 2}]},
            { id: 1, ar: "V60 حار", en: "V 60 Hot Coffee", price: 22, img: "https://i.postimg.cc/Y26Lrj1d/FB_IMG_1775615760389.jpg", qty: 0, 
              opts: [{name: "Standard", price: 0}, {name: "Extra Hot", price: 0}]},
            { id: 2, ar: "كيكة العسل الملكية", en: "Royal Honey Cake", price: 15, img: "https://i.postimg.cc/bYxSydQ3/Screenshot_٢٠٢٦٠٤٠٨_٠٥٣٨٤٢_Brave.jpg", qty: 0, 
              opts: [{name: "Fresh", price: 0}, {name: "Extra Honey", price: 2}]}
        ];

        function speak(text, lang = 'en-US') {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text; msg.lang = lang;
            window.speechSynthesis.speak(msg);
        }

        function askTable() { 
            document.getElementById('tableNum').style.display = 'block'; 
            document.getElementById('confirmTable').style.display = 'inline-block'; 
        }
        
        function setMode(mode) {
            orderMode = mode;
            if(mode === 'local') tableNumber = document.getElementById('tableNum').value || "1";
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('mode-badge').innerText = mode === 'local' ? `طاولة: ${tableNumber}` : "سفري";
            speak("Welcome to Alpha Shadow, Your coffee is being coded", 'en-US');
            render();
        }

        function render() {
            let html = ""; let total = 0;
            menu.forEach((item) => {
                const optElement = document.getElementById(`opt-${item.id}`);
                const selectedOptIndex = optElement ? optElement.value : 0;
                const optPrice = item.opts[selectedOptIndex].price;
                total += (item.qty * (item.price + optPrice));
                html += `
                <div class="card">
                    <div class="card-top">
                        <img src="${item.img}">
                        <div class="card-info"><b>${item.ar}</b><br><small>${item.price} SAR</small></div>
                        <div class="counter-box">
                            <button class="btn-step" onclick="updateQty(${item.id}, -1)">-</button>
                            <span class="qty">${item.qty}</span>
                            <button class="btn-step" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <select class="options-select" id="opt-${item.id}" onchange="render()">
                        ${item.opts.map((o, index) => `<option value="${index}">${o.name} ${o.price > 0 ? '(+'+o.price+' SAR)' : ''}</option>`).join('')}
                    </select>
                </div>`;
            });
            document.getElementById('menu-items').innerHTML = html;
            document.getElementById('total-price').innerText = total;
        }

        function updateQty(id, step) {
            if (menu[id].qty + step < 0) return;
            menu[id].qty += step;
            if (step > 0) speak(menu[id].qty + " " + menu[id].en, 'en-US');
            render();
        }

        function sendOrder() {
            const orderedItems = menu.filter(i => i.qty > 0);
            if(orderedItems.length === 0) { speak("Please select an item first", 'en-US'); return; }
            
            const notes = document.getElementById('order-notes').value;
            const typeStr = orderMode === 'local' ? `محلي (طاولة ${tableNumber})` : "سفري";
            
            const itemsList = orderedItems.map(i => {
                const optIndex = document.getElementById(`opt-${i.id}`).value;
                const optName = i.opts[optIndex].name;
                return `${i.qty} x ${i.ar} (${optName})`;
            });

            const newOrderRef = database.ref('orders').push();
            newOrderRef.set({
                type: typeStr, items: itemsList, notes: notes,
                time: new Date().toLocaleTimeString('ar-SA'),
                isLocal: orderMode === 'local',
                totalPrice: document.getElementById('total-price').innerText,
                status: 'pending'
            });

            // الجملة اللي "تجنن" مدمجة هنا
            newOrderRef.on('value', snap => {
                if(snap.val() && snap.val().status === 'ready') {
                    document.getElementById('status-notif').style.display = 'block';
                    speak("Your order is ready! Enjoy your Alpha experience.", 'en-US');
                }
            });

            speak("Order sent successfully. Enjoy!", 'en-US');
            
            const msg = `*طلب جديد من Alpha-Shadow*\n*النوع:* ${typeStr}\n*الطلبات:*\n${itemsList.join("\n")}\n*ملاحظات:* ${notes}\n*الإجمالي:* ${document.getElementById('total-price').innerText} SAR`;
            window.open(`https://wa.me/966579747707?text=${encodeURIComponent(msg)}`);
            
            menu.forEach(i => i.qty = 0); 
            document.getElementById('order-notes').value = "";
            render();
        }
    </script>
</body>
</html>
