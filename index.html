<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Shadow | القمة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #c8a27c; --dark-bg: #0f172a; --card-bg: #1e293b; --green: #22c55e; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark-bg); color: var(--text); padding-bottom: 50px; }
        
        #welcome-screen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .welcome-logo { max-width: 120px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 15px; }
        
        .main-app { display: none; padding: 15px; }
        
        /* تصميم الأقسام الجديد لمنع التداخل */
        .dept-section { margin-bottom: 30px; clear: both; }
        .dept-title { 
            color: var(--gold); 
            background: rgba(200, 162, 124, 0.1);
            padding: 10px 15px; 
            border-right: 5px solid var(--gold); 
            border-radius: 5px;
            margin: 20px 0; 
            font-size: 20px; 
            font-weight: bold;
            display: block;
        }

        .menu-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .item-card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 12px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 15px; margin-bottom: 8px; }
        .item-card h4 { margin: 5px 0; font-size: 14px; color: var(--text); }
        
        .extra-sel { 
            width: 100%; 
            padding: 6px; 
            border-radius: 8px; 
            background: #0f172a; 
            color: var(--gold); 
            border: 1px solid rgba(200, 162, 124, 0.4); 
            margin: 8px 0; 
            font-size: 11px;
            outline: none;
        }

        .order-btn { background: var(--gold); color: var(--dark-bg); border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* السلة */
        .cart-box { background: var(--card-bg); padding: 20px; border-radius: 24px; margin-top: 40px; border: 1px solid var(--gold); }
        .promo-input { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #334155; margin-bottom: 10px; }
        .send-btn { background: var(--green); color: white; width: 100%; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; border: none; margin-top: 15px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <img id="logoW" class="welcome-logo" src=""><h2 id="nameW">Alpha Shadow</h2>
    <button class="order-btn" style="width:150px" onclick="startOrder('سفري')">🚗 سفري</button>
    <button class="order-btn" style="width:150px" onclick="document.getElementById('table-entry').style.display='block'">☕ محلي</button>
    <div id="table-entry" style="display:none; margin-top:10px;">
        <input type="number" id="tblNo" class="promo-input" style="width:80px; text-align:center" placeholder="طاولة">
        <button class="order-btn" onclick="startOrder('محلي')">دخول</button>
    </div>
</div>

<div class="main-app" id="app">
    <div id="slider" style="display:flex; overflow-x:auto; gap:10px; margin-bottom:20px;"></div>
    
    <div id="menu-container"></div> 
    
    <div class="cart-box">
        <h3 style="color:var(--gold); margin-top:0;">🛒 السلة <span id="typeLbl"></span></h3>
        <div id="cartList"></div>
        <div style="display:flex; gap:5px; margin: 15px 0;">
            <input type="text" id="promoCode" class="promo-input" style="margin:0" placeholder="كود الخصم">
            <button class="order-btn" onclick="applyPromo()">تفعيل</button>
        </div>
        <div id="totalBox" style="text-align:center; font-size:22px; color:var(--gold); font-weight:bold;">الإجمالي: <span id="total">0</span> ريال</div>
        <textarea id="notes" class="promo-input" style="height:60px; margin-top:15px;" placeholder="ملاحظاتك للطلب..."></textarea>
        <button class="send-btn" onclick="submitOrder()">إرسال الطلب ✅</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac", authDomain: "alphashadow-23689.firebaseapp.com", projectId: "alphashadow-23689", databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let cart = [], extrasStr = "", welcomeAudio = "", readyAudio = "", successMsg = "", oType = "", tNum = "", discountValReal = 0, discountType = "percent";

    database.ref('settings').on('value', snap => {
        const s = snap.val(); if(s) {
            document.getElementById('nameW').innerText = s.branding.name;
            document.getElementById('logoW').src = s.branding.logo;
            welcomeAudio = s.audio.welcome; readyAudio = s.audio.ready; successMsg = s.audio.msgText;
        }
    });

    // جلب الإضافات أولاً
    database.ref('extras_options').on('value', snap => {
        extrasStr = `<option value="">بدون إضافات</option>`;
        snap.forEach(c => { let e = c.val(); extrasStr += `<option value="${e.en}" data-ar="${e.ar}" data-p="${e.price}">${e.ar} (+${e.price})</option>`; });
        loadMenu(); 
    });

    // تحميل المنيو بالأقسام بشكل يمنع التداخل
    function loadMenu() {
        database.ref('menu_items').on('value', snap => {
            const depts = {}; 
            const container = document.getElementById('menu-container');
            container.innerHTML = ""; // تصفير الحاوية عشان مفيش حاجة تسيح على بعض

            snap.forEach(c => {
                const item = c.val(); 
                const d = item.dept || "أخرى";
                if(!depts[d]) depts[d] = "";
                depts[d] += `
                <div class="item-card">
                    <img src="${item.img}">
                    <h4>${item.ar}</h4>
                    <span style="color:var(--gold); font-weight:bold;">${item.price} ريال</span>
                    <select class="extra-sel" id="ex-${c.key}">${extrasStr}</select>
                    <button class="order-btn" style="font-size:13px" onclick="addToCart('${c.key}','${item.ar}','${item.en}',${item.price})">إضافة +</button>
                </div>`;
            });

            for(let d in depts) { 
                container.innerHTML += `
                <div class="dept-section">
                    <div class="dept-title">${d}</div>
                    <div class="menu-grid">${depts[d]}</div>
                </div>`; 
            }
        });
    }

    function startOrder(t) {
        oType = t; tNum = document.getElementById('tblNo').value;
        if(t === 'محلي' && !tNum) return alert("رقم الطاولة!");
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('typeLbl').innerText = `(${t} ${tNum?'- '+tNum:''})`;
        if(welcomeAudio) talk(welcomeAudio);
    }

    function addToCart(k, ar, en, p) {
        const s = document.getElementById('ex-'+k);
        const exAr = s.options[s.selectedIndex].getAttribute('data-ar') || "";
        const exP = parseFloat(s.options[s.selectedIndex].getAttribute('data-p') || 0);
        cart.push({ar, en, p, exAr, exP, qty: 1});
        talk(en + (exAr ? " with extra" : ""));
        renderCart();
    }

    function renderCart() {
        let h = "", total = 0;
        cart.forEach((i, x) => {
            let itemPrice = i.p + i.exP; total += itemPrice;
            h += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.1)">
                <span style="font-size:14px">${i.ar} ${i.exAr?'<small>('+i.exAr+')</small>':''}</span>
                <span>${itemPrice} ريال <button onclick="cart.splice(${x},1);renderCart()" style="background:none; border:none; color:#f87171">✕</button></span>
            </div>`;
        });
        let d = (discountType === "percent") ? (total * discountValReal / 100) : discountValReal;
        document.getElementById('total').innerText = (total - d).toFixed(2);
        document.getElementById('cartList').innerHTML = h;
    }

    function applyPromo() {
        const code = document.getElementById('promoCode').value.toUpperCase();
        database.ref('coupons/' + code).once('value', snap => {
            const p = snap.val();
            if(p) { 
                discountValReal = p.value || p.discount; 
                discountType = p.type || "percent";
                alert("✅ تم تفعيل الخصم"); renderCart();
            } else { alert("❌ كود غير صحيح"); }
        });
    }

    function submitOrder() {
        if(!cart.length) return alert("السلة فارغة");
        const note = document.getElementById('notes').value;
        const total = document.getElementById('total').innerText;
        database.ref('live_orders').push({ items: cart, type: oType, table: tNum, notes: note, totalPrice: total, status: '⏳ قيد التحضير' });
        
        let msg = `*طلب جديد Alpha Shadow*\n`;
        cart.forEach(i => msg += `- ${i.ar} ${i.exAr?'('+i.exAr+')':''}\n`);
        msg += `*الإجمالي*: ${total}\n*الملاحظات*: ${note}`;
        window.open(`https://wa.me/966579747707?text=${encodeURIComponent(msg)}`);
        
        alert("🎉 تم إرسال طلبك!");
        cart = []; renderCart();
    }

    function talk(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
</script>
</body>
</html>
