<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Shadow | النظام الملكي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --gold: #c8a27c; 
            --dark-bg: #0f141e; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --green: #22c55e;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark-bg); color: var(--text); overflow-x: hidden; background-attachment: fixed; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 15px 30px; border-radius: 50px; z-index: 10001; transition: 0.5s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: bold; text-align: center; width: 80%; }
        #toast.show { top: 20px; }
        #geo-shield { position: fixed; inset: 0; background: var(--dark-bg); z-index: 11000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #welcome-screen { position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s ease-in-out; background-size: cover; background-position: center; }
        .welcome-logo { max-width: 140px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 20px; box-shadow: 0 0 20px rgba(200, 162, 124, 0.3); }
        .order-btn { background: rgba(15, 20, 30, 0.8); color: var(--gold); border: 1px solid var(--gold); padding: 15px 45px; border-radius: 50px; font-size: 18px; font-weight: bold; margin: 12px; cursor: pointer; width: 220px; transition: 0.3s; backdrop-filter: blur(5px); }
        .main-app { display: none; padding: 15px; padding-bottom: 100px; }
        #order-status-bar { background: rgba(200, 162, 124, 0.1); color: var(--gold); padding: 15px; text-align: center; border-radius: 15px; margin-bottom: 20px; font-weight: bold; border: 1px solid var(--gold); }
        .slider-container { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; }
        .slider-img { width: 85%; height: 180px; border-radius: 20px; flex-shrink: 0; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .item-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 20px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; transition: 0.3s; }
        .item-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .extra-sel { width: 100%; padding: 8px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: #fff; font-size: 11px; margin-bottom: 10px; outline: none; }
        .add-btn { background: var(--gold); color: #000; border: none; padding: 10px; border-radius: 12px; width: 100%; font-weight: 800; font-size: 13px; cursor: pointer; }
        .cart-box { margin-top: 40px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; border: 1px solid rgba(200, 162, 124, 0.2); }
        .total-price { font-size: 24px; font-weight: 800; color: var(--gold); text-align: center; margin: 25px 0; }
        .send-btn { background: var(--green); color: white; border: none; width: 100%; padding: 18px; border-radius: 20px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="geo-shield">
    <h2 id="geo-status" style="color: var(--gold);">جاري تفعيل Geo-Location Shield... 📍</h2>
    <p style="opacity: 0.5;">Alpha Shadow Security Protocol</p>
</div>

<div id="welcome-screen" style="display:none;">
    <img id="logoW" class="welcome-logo" src="">
    <h2 id="nameW" style="letter-spacing: 2px;">Alpha Shadow</h2>
    <button class="order-btn" onclick="startOrder('سفري')">🚗 سفري</button>
    <button class="order-btn" onclick="document.getElementById('table-entry').style.display='block'">☕ محلي</button>
    <div id="table-entry" style="display:none;">
        <input type="number" id="tblNo" style="width: 80px; padding: 12px; border-radius: 12px; border: 1px solid var(--gold); background: transparent; color: #fff; text-align: center; font-size: 18px;" placeholder="طاولة">
        <br>
        <button class="order-btn" style="width: 140px; margin-top: 15px;" onclick="startOrder('محلي')">دخول</button>
    </div>
</div>

<div class="main-app" id="app">
    <div id="order-status-bar" style="display:none;">حالة الطلب: قيد التحضير ⏳</div>
    <div class="slider-container" id="slider"></div>
    <div class="menu-grid" id="menu"></div>
    
    <div class="cart-box">
        <h3 style="margin:0 0 15px 0; color: var(--gold);">🛒 السلة (<span id="typeLbl"></span> <span id="tblLbl"></span>)</h3>
        <div id="cartList"></div>
        <div class="total-price">الإجمالي النهائي: <span id="total">0</span> ريال</div>
        <button class="send-btn" onclick="submitOrder()">إرسال الطلب ✅</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const TARGET_LAT = 21.522492; const TARGET_LON = 39.229700; const ALLOWED_DISTANCE = 0.50; 
    let cart = []; let welcomeAudio = ""; let readyAudio = ""; let successMsg = "";
    let oType = ""; let tNum = ""; let extrasStr = ""; let currentOrderId = null;

    window.onload = () => {
        validateGeo(() => {
            document.getElementById('geo-shield').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'flex';
        }, () => {
            document.getElementById('geo-status').innerText = "❌ خارج نطاق الإمبراطورية (حي النسيم)";
        });
    };

    function validateGeo(onSuccess, onError) {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = calculateDist(pos.coords.latitude, pos.coords.longitude, TARGET_LAT, TARGET_LON);
                if (dist <= ALLOWED_DISTANCE) onSuccess(); else onError();
            }, onError, { enableHighAccuracy: true });
        } else { alert("GPS غير مدعوم"); }
    }

    function calculateDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // سحب الإعدادات بالكامل بما فيها الصورة الخارجية bg2
    database.ref('settings').on('value', snap => {
        const s = snap.val();
        if(s) {
            if(s.branding) {
                document.getElementById('nameW').innerText = s.branding.name || "Alpha Shadow";
                document.getElementById('logoW').src = s.branding.logo || "";
                if(s.branding.bg) document.body.style.backgroundImage = `url('${s.branding.bg}')`;
                if(s.branding.bg2) document.getElementById('welcome-screen').style.backgroundImage = `url('${s.branding.bg2}')`;
            }
            if(s.audio) { welcomeAudio = s.audio.welcome; readyAudio = s.audio.ready; successMsg = s.audio.msgText; }
        }
    });

    // سحب الإضافات
    database.ref('extras_options').on('value', snap => {
        extrasStr = `<option value="" data-p="0">بدون إضافات</option>`;
        snap.forEach(c => {
            const d = c.val();
            extrasStr += `<option value="${d.en || ''}" data-ar="${d.ar}" data-p="${d.price || 0}">${d.ar} (+${d.price} ريال)</option>`;
        });
        loadMenu();
    });

    // سحب العروض (السلايدر)
    database.ref('offers').on('value', snap => {
        let h = "";
        snap.forEach(c => { h += `<img src="${c.val().img}" class="slider-img">`; });
        document.getElementById('slider').innerHTML = h;
    });

    function loadMenu() {
        database.ref('menu_items').on('value', snap => {
            let h = "";
            snap.forEach(child => {
                const item = child.val();
                h += `<div class="item-card">
                    <img src="${item.img}">
                    <h4>${item.ar}</h4>
                    <span style="color:var(--gold);font-weight:700;">${item.price} ريال</span>
                    <select class="extra-sel" id="ex-${child.key}">${extrasStr}</select>
                    <button class="add-btn" onclick="addToCart('${child.key}','${item.ar}','${item.en}',${item.price},'${item.dept}')">إضافة +</button>
                </div>`;
            });
            document.getElementById('menu').innerHTML = h;
        });
    }

    function startOrder(type) {
        oType = type; tNum = document.getElementById('tblNo').value;
        if(type === 'محلي' && !tNum) return alert("الرجاء إدخال رقم الطاولة");
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            if(welcomeAudio) talk(welcomeAudio);
        }, 500);
    }

    function addToCart(k, ar, en, p, dept) {
        const s = document.getElementById('ex-'+k);
        const exAr = s.options[s.selectedIndex].getAttribute('data-ar') || "";
        const exP = parseFloat(s.options[s.selectedIndex].getAttribute('data-p') || 0);
        cart.push({k, ar, en, p, exAr, exP, qty: 1, dept: dept});
        talk(en); renderCart();
    }

    function renderCart() {
        let h = ""; let subTotal = 0;
        cart.forEach((i, x) => {
            let itemTotal = (i.p + i.exP) * i.qty;
            subTotal += itemTotal;
            h += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${i.ar} ${i.exAr ? '[+'+i.exAr+']' : ''}</span>
                    <button onclick="cart.splice(${x},1); renderCart()" style="background:red; color:#fff; border:none; border-radius:5px;">حذف</button>
                  </div>`;
        });
        document.getElementById('total').innerText = subTotal.toFixed(2);
        document.getElementById('cartList').innerHTML = h;
    }

    function submitOrder() {
        if(!cart.length) return alert("السلة فارغة");
        const orderRef = database.ref('live_orders').push();
        orderRef.set({
            items: cart, type: oType, table: tNum || 'سفري',
            totalPrice: document.getElementById('total').innerText,
            status: 'قيد التحضير ⏳', time: new Date().toLocaleTimeString('ar-SA')
        }).then(() => {
            showToast(successMsg || "تم الإرسال!");
            cart = []; renderCart();
        });
    }

    function talk(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 5000); }
</script>
</body>
</html>
