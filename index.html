<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Shadow VIP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --gold: #c8a27c; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8fafc; padding-bottom: 180px; }
        .hero { position: fixed; inset: 0; background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)), url('https://i.postimg.cc/kMQRJDQ3/xresch_blueprint_6944719_1920.jpg'); background-size: cover; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .btn-main { background: var(--gold); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 10px; width: 250px; }
        .offer-slider { width: 100%; overflow-x: auto; display: flex; gap: 10px; padding: 10px; background: #fff; border-bottom: 2px solid var(--gold); }
        .offer-slider img { height: 150px; border-radius: 15px; flex-shrink: 0; }
        .card { background: white; margin: 10px; border-radius: 15px; padding: 10px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        .qty-box { display: flex; align-items: center; gap: 10px; margin-right: auto; }
        .btn-step { background: #f1f5f9; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; }
        .discount-section { background: white; margin: 10px; padding: 15px; border-radius: 15px; text-align: center; }
        .cart-btn { position: fixed; bottom: 20px; left: 5%; width: 90%; background: var(--green); color: white; padding: 15px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="hero">
        <h1>Alpha-Shadow</h1>
        <button class="btn-main" onclick="setMode('local')">📍 محلي / Dine-in</button>
        <button class="btn-main" onclick="setMode('away')">🚗 سفري / Takeaway</button>
    </div>

    <div id="main-content" style="display:none;">
        <div class="offer-slider" id="offerSlider"></div>
        
        <div id="menu-items"></div>

        <div class="discount-section">
            <input type="text" id="couponInput" placeholder="كود الخصم" style="padding:10px; border-radius:10px; border:1px solid #ddd; width:60%;">
            <button onclick="applyCoupon()" style="padding:10px; background:var(--gold); border:none; border-radius:10px; color:white;">تطبيق</button>
            <p id="discountMsg" style="color:var(--green); font-size:12px; margin-top:5px;"></p>
        </div>

        <textarea id="order-notes" style="width:90%; margin:10px 5%; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="ملاحظات الطلب..."></textarea>

        <button class="cart-btn" onclick="sendOrder()">
            إرسال الطلب | <span id="total-price">0</span> SAR
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
            authDomain: "alphashadow-23689.firebaseapp.com",
            projectId: "alphashadow-23689",
            databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let menuData = []; let orderMode = ""; let discount = 0;

        function setMode(mode) {
            orderMode = mode;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadData();
        }

        function loadData() {
            database.ref('offers').on('value', snap => {
                let html = "";
                snap.forEach(child => { html += `<img src="${child.val().img}">`; });
                document.getElementById('offerSlider').innerHTML = html;
            });

            database.ref('menu_items').on('value', snap => {
                menuData = [];
                snap.forEach(child => { menuData.push({...child.val(), qty: 0}); });
                render();
            });
        }

        function render() {
            let html = ""; let total = 0;
            menuData.forEach((item, index) => {
                total += (item.qty * item.price);
                html += `
                <div class="card">
                    <img src="${item.img}">
                    <div style="margin-right:10px"><b>${item.ar}</b><br><small>${item.price} SAR</small></div>
                    <div class="qty-box">
                        <button class="btn-step" onclick="updateQty(${index}, -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="btn-step" onclick="updateQty(${index}, 1)">+</button>
                    </div>
                </div>`;
            });
            let finalTotal = total - (total * (discount / 100));
            document.getElementById('menu-items').innerHTML = html;
            document.getElementById('total-price').innerText = finalTotal.toFixed(2);
        }

        function updateQty(i, s) { if(menuData[i].qty+s >= 0) { menuData[i].qty+=s; render(); } }

        function applyCoupon() {
            const code = document.getElementById('couponInput').value.toUpperCase();
            database.ref('coupons').child(code).once('value', snap => {
                if(snap.exists()) {
                    discount = snap.val().pct;
                    document.getElementById('discountMsg').innerText = `تم تطبيق خصم ${discount}%`;
                    render();
                } else { alert("كود غير صحيح"); }
            });
        }

        function sendOrder() {
            const items = menuData.filter(i => i.qty > 0).map(i => `${i.qty} x ${i.ar}`);
            if(items.length === 0) return;
            const total = document.getElementById('total-price').innerText;
            const msg = `*طلب جديد*\nالنوع: ${orderMode}\nالطلبات:\n${items.join('\n')}\nالإجمالي: ${total} SAR`;
            window.open(`https://wa.me/966579747707?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
