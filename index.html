<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Shadow | النظام الملكي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* الديزاين الفخم اللي طلبته مع الحفاظ على هوية الماستر */
        :root { 
            --gold: #c8a27c; 
            --dark-bg: #0f141e; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --green: #22c55e;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--dark-bg); 
            color: var(--text); 
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* توست التنبيهات الفخم */
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: var(--gold); color: #000; padding: 15px 30px; 
            border-radius: 50px; z-index: 10001; transition: 0.5s; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: bold; 
            text-align: center; width: 80%;
        }
        #toast.show { top: 20px; }

        /* شاشة الحماية */
        #geo-shield { 
            position: fixed; inset: 0; background: var(--dark-bg); 
            z-index: 11000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
        }

        /* شاشة الترحيب الماستر بالديزاين الجديد */
        #welcome-screen { 
            position: fixed; inset: 0; background: radial-gradient(circle, #1a2332 0%, #0f141e 100%); 
            z-index: 10000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; transition: 0.8s ease-in-out; 
        }
        .welcome-logo { 
            max-width: 140px; border-radius: 50%; border: 2px solid var(--gold); 
            margin-bottom: 20px; box-shadow: 0 0 20px rgba(200, 162, 124, 0.3);
        }

        .order-btn { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            padding: 15px 45px; border-radius: 50px; font-size: 18px; 
            font-weight: bold; margin: 12px; cursor: pointer; width: 220px;
            transition: 0.3s;
        }
        .order-btn:hover { background: var(--gold); color: #000; }

        /* التطبيق الرئيسي */
        .main-app { display: none; padding: 15px; padding-bottom: 100px; }

        #order-status-bar { 
            background: rgba(200, 162, 124, 0.1); color: var(--gold); 
            padding: 15px; text-align: center; border-radius: 15px; 
            margin-bottom: 20px; font-weight: bold; border: 1px solid var(--gold);
        }

        .slider-container { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; }
        .slider-img { width: 85%; height: 180px; border-radius: 20px; flex-shrink: 0; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        .item-card { 
            background: var(--card-bg); backdrop-filter: blur(10px); 
            border-radius: 20px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); 
            text-align: center; transition: 0.3s;
        }
        .item-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .item-card h4 { margin: 5px 0; font-size: 15px; color: #eee; }

        .extra-sel { 
            width: 100%; padding: 8px; border-radius: 12px; border: none; 
            background: rgba(255,255,255,0.1); color: #fff; font-size: 11px; margin-bottom: 10px; outline: none;
        }
        .extra-sel option { background: #1a2332; }

        .add-btn { 
            background: var(--gold); color: #000; border: none; 
            padding: 10px; border-radius: 12px; width: 100%; 
            font-weight: 800; font-size: 13px; cursor: pointer; 
        }

        /* السلة الماستر بشكل فخم */
        .cart-box { 
            margin-top: 40px; background: rgba(255,255,255,0.03); 
            padding: 20px; border-radius: 25px; border: 1px solid rgba(200, 162, 124, 0.2); 
        }

/* --- تنسيق عناصر السلة (الاسم والزراير) --- */
          .cart-item span {
          color: white !important;
    /* ظل أسود قوي عشان الكلام ينطق فوق أي خلفية */
          text-shadow: 2px 2px 5px rgba(0,0,0,1); 
         font-weight: bold;
         flex: 1;
         font-size: 14px;
      }

           .cart-item button {
    /* لون ذهبي فخم للزراير عشان تبان */
           background: var(--gold) !important; 
           color: var(--primary) !important;
           font-weight: bold;
           border-radius: 5px;
           border: none;
           padding: 5px 12px;
           cursor: pointer;
           margin: 0 2px;
           transition: 0.3s;
      }

            .cart-item button:active {
            transform: scale(0.9);
       }
        
        .total-price { 
            font-size: 26px; font-weight: 900; color: #ffffff; 
            text-align: center; margin: 25px 0; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        .promo-container { display: flex; gap: 8px; margin-bottom: 15px; }

        /* تعديل مربع كود الخصم - دهبي غامق */
        .promo-input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #a67c52; 
            background: rgba(255,255,255,0.05); 
            color: #c8a27c; 
            outline: none; 
        }

        /* تعديل لون جملة "لديك كود خصم" */
        .promo-input::placeholder {
            color: #a67c52;
            opacity: 0.8;
        }


        .discount-row { display: flex; justify-content: space-between; color: #ff4d4d; font-weight: bold; margin-bottom: 10px; font-size: 14px; }

.send-btn { 
    background: var(--green); 
    color: white; 
    border: none; 
    width: 100%; 
    padding: 18px; 
    border-radius: 20px; 
    font-size: 18px; 
    font-weight: bold; 
    box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
    
    cursor: pointer;
    transition: all 0.15s ease;
}
.send-btn:active {
    transform: scale(0.92); /* يصغر لما يتداس */
    box-shadow: 0 4px 10px rgba(0,0,0,0.4); /* يقل العمق */
}

.send-btn:hover {
    transform: scale(1.03); /* يكبر بسيط */
}
.send-btn:active {
    transform: scale(0.9);
    filter: brightness(0.85);
}
        
    </style>
</head>
<body>

<div id="toast"></div>

<div id="geo-shield">
    <h2 id="geo-status" style="color: var(--gold);">جاري تفعيل Geo-Location Shield... 📍</h2>
    <p style="opacity: 0.5;">Alpha Shadow Security Protocol</p>
</div>

<div id="welcome-screen" style="display:none;">
    <img id="logoW" class="welcome-logo" src="">
    <h2 id="nameW" style="letter-spacing: 2px;">Alpha Shadow</h2>
    <button class="order-btn" onclick="startOrder('سفري')">🚗 سفري</button>
    <button class="order-btn" onclick="toggleTableEntry()">☕ محلي</button>
    <div id="table-entry">
        <input type="number" id="tblNo" style="width: 80px; padding: 12px; border-radius: 12px; border: 1px solid var(--gold); background: transparent; color: #fff; text-align: center; font-size: 18px;" placeholder="طاولة">
        <br>
        <button class="order-btn" style="width: 140px; margin-top: 15px;" onclick="startOrder('محلي')">دخول</button>

<div class="main-app" id="app">
    <div id="order-status-bar" style="display:none;">حالة الطلب: قيد التحضير ⏳</div>

    <div class="cart-box">
        <h3 style="margin:0 0 15px 0; color: var(--gold);">🛒 السلة (<span id="typeLbl"></span> <span id="tblLbl"></span>)</h3>
        <div id="cartList"></div>
        
        <div class="promo-container" style="margin-top:20px;">
            <input type="text" id="promoCode" class="promo-input" placeholder="لديك كود خصم؟">
            <button class="promo-btn" onclick="applyPromo()">تفعيل</button>
        </div>
        
        <div id="discountInfo" style="display:none;" class="discount-row">
            <span>خصم الكوبون:</span>
            <span id="discountVal">0</span>
        </div>
        
        <div class="total-price">الإجمالي النهائي: <span id="total">0</span> ريال</div>
        <textarea id="notes" style="width:100%; padding:15px; border-radius:15px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; margin-bottom:20px; font-family:inherit;" rows="3" placeholder="ملاحظاتك الإضافية..."></textarea>
        <button class="send-btn" onclick="submitOrder()">إرسال الطلب ✅</button>
    </div>
</div>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const TARGET_LAT = 21.522492;
    const TARGET_LON = 39.229700;
    const ALLOWED_DISTANCE = 0.50; 
    let cart = []; let welcomeAudio = ""; let readyAudio = ""; let successMsg = "";
    let oType = ""; let tNum = ""; let extrasStr = ""; let currentOrderId = null;
    let discountValReal = 0; let discountType = "percent"; let activePromo = "";

// --- الرادار الذكي (بيتحط قبل الـ onload) ---
const urlParams = new URLSearchParams(window.location.search);
const tableIdFromUrl = urlParams.get('table'); 
const orderTypeFromUrl = urlParams.get('type'); 

window.onload = () => {
    validateGeo(() => {
        document.getElementById('geo-shield').style.display = 'none';
        
        // التكتيك الاحترافي: فحص نوع الباركود
        if (tableIdFromUrl) {
            // باركود طاولة (محلي)
            oType = 'محلي';
            tNum = tableIdFromUrl;
            enterApp(`أهلاً بك على طاولة رقم ${tNum} ☕️`);
        } else if (orderTypeFromUrl === 'takeaway') {
            // باركود الكاشير (سفري ثابت)
            oType = 'سفري';
            tNum = ""; 
            enterApp("أهلاً بك.. طلبك سفري 🚗");
        } else {
            // اللينك العادي
            document.getElementById('welcome-screen').style.display = 'flex';
        }
    }, () => {
        document.getElementById('geo-status').innerText = "❌ خارج نطاق الإمبراطورية (حي النسيم)";
    });
};

// وظيفة الدخول السريع (بتحطها بعد قفلة الـ onload)
function enterApp(message) {
    document.getElementById('welcome-screen').style.display = 'none'; 
    document.getElementById('app').style.display = 'block';
    document.getElementById('typeLbl').innerText = oType;
    document.getElementById('tblLbl').innerText = tNum ? `(طاولة ${tNum})` : "";
    showToast(message);
    if(welcomeAudio) talk(welcomeAudio);
}

    function validateGeo(onSuccess, onError) {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = calculateDist(pos.coords.latitude, pos.coords.longitude, TARGET_LAT, TARGET_LON);
                if (dist <= ALLOWED_DISTANCE) onSuccess(); else onError();
            }, onError, { enableHighAccuracy: true });
        } else { alert("GPS غير مدعوم"); }
    }

    function calculateDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
// 1. جلب العروض وربطها بالضغط (النسخة الذكية)
database.ref('offers').on('value', snap => {
    let sliderHtml = "";
    if (snap.exists()) {
        snap.forEach(child => {
            const data = child.val();
            if(data && data.img){
sliderHtml += `<div class="offer-container" style="position:relative; display:inline-block; margin:5px;">
    <img src="${data.img}" class="offer-img" onclick="quickAddOffer('${data.itemAr}', ${data.price}, '${data.dept}')" 
         style="cursor: pointer; border: 2px solid var(--gold); border-radius:15px; width:280px;">
    <div style="position:absolute; bottom:15px; right:15px; background:rgba(0,0,0,0.7); color:white; padding:5px 10px; border-radius:8px; font-weight:bold;">
        ${data.itemAr} - ${data.price} ريال
    </div>
</div>`;

            }
        });
    } else {
        sliderHtml = `<p style="text-align:center; width:100%; color:var(--gold);">انتظروا عروضنا الملكية قريباً...</p>`;
    }
    const sliderDiv = document.getElementById('slider');
    if(sliderDiv) { sliderDiv.innerHTML = sliderHtml; }
});

// 2. محرك الإضافة للسلة (بدونه الضغط على الصورة مش هيشتغل)
function quickAddOffer(ar, p, dept) {
    // التأكد إن السعر رقم حقيقي وليس نص أو فاضي
    const priceNum = parseFloat(p);
    if (!ar || isNaN(priceNum)) {
        alert("عذراً، حدث خطأ في بيانات العرض!");
        return;
    }

    cart.push({
        k: 'OFFER_' + Date.now(), 
        ar: ar, 
        en: 'Special Offer', 
        p: priceNum, // السعر هنا بقى رقم نظيف
        exAr: "", 
        exEn: "", 
        exP: 0, 
        qty: 1, 
        dept: dept || 'barista'
    });

    renderCart();
    showToast("✅ تم إضافة العرض الملكي للسلة!");
}


    database.ref('settings').on('value', snap => {
        const s = snap.val();
        if(s) {
            // 🎨 الجزء الخاص بالاسم واللوجو والخلفيات
            if(s.branding) {
                document.getElementById('nameW').innerText = s.branding.name || "Alpha Shadow";
                document.getElementById('logoW').src = s.branding.logo || "";
                
                // 1. خلفية المنيو الداخلية (bg)
                if(s.branding.bg) {
                    document.body.style.backgroundImage = `url('${s.branding.bg}')`;
                    document.body.style.backgroundSize = "cover";
                    document.body.style.backgroundPosition = "center";
                    document.body.style.backgroundAttachment = "fixed";
                }

                // 2. التعديل اللي كان ناقص: خلفية شاشة الترحيب الخارجية (bg2)
                if(s.branding.bg2) {
                    const welcomeScreen = document.getElementById('welcome-screen');
                    if(welcomeScreen) {
                        welcomeScreen.style.backgroundImage = `url('${s.branding.bg2}')`;
                        welcomeScreen.style.backgroundSize = "cover";
                        welcomeScreen.style.backgroundPosition = "center";
                    }
                }
            }
            // 🔊 الجزء الخاص بالأصوات (سيبه زي ما هو عشان يفضل شغال)
            if(s.audio) {
                welcomeAudio = s.audio.welcome;
                readyAudio = s.audio.ready;
                successMsg = s.audio.msgText;
            }
        }
    });

database.ref('extras_options').on('value', snap => {
    // البدء بخيار "بدون إضافات"
    extrasStr = `<option value="" data-ar="بدون إضافات" data-p="0">بدون إضافات</option>`;
    
    snap.forEach(c => {
        const data = c.val();
        if(data.ar) {
            // التعديل هنا: خليت الـ value هو data.ar عشان نضمن النطق بالعربي النظيف
            // وطيرنا الـ data.en اللي كان بيجيب أرقام
            extrasStr += `<option value="${data.ar}" data-ar="${data.ar}" data-p="${data.price || 0}">${data.ar} (+${data.price || 0} ريال)</option>`;
        }
    });
    loadMenu(); 
});

// 1. الدالة اللي بتعرض البوابات الـ 3 (باريستا - حلا - مطبخ)
function loadMenu() {
    let mainSelectionHtml = `
        <div style="grid-column: 1/-1; text-align: center; margin-bottom: 20px;">
            <h2 style="color:var(--gold);">قائمة السيادة 👑</h2>
            <p style="color:var(--text-muted);">اختر القسم المفضل</p>
        </div>
        
        <div class="item-card" onclick="filterSubByMain('barista', 'قسم الباريستا')" style="cursor:pointer; border: 2px solid var(--gold);">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=500">
            <h3 style="color:var(--gold);">☕ المشروبات</h3>
        </div>

        <div class="item-card" onclick="filterSubByMain('dessert', 'قسم الحلا')" style="cursor:pointer; border: 2px solid var(--gold);">
            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=500">
            <h3 style="color:var(--gold);">🍰 الحلا</h3>
        </div>

        <div class="item-card" onclick="filterSubByMain('kitchen', 'قسم المطبخ')" style="cursor:pointer; border: 2px solid var(--gold);">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=500">
            <h3 style="color:var(--gold);">🍔 المطبخ</h3>
        </div>
    `;
    document.getElementById('menu').innerHTML = mainSelectionHtml;
}

// 2. الدالة اللي بتجيب الأقسام الفرعية (فلتر بالقسم الرئيسي)
function filterSubByMain(mainDeptName, title) {
    // التعديل هنا: بنستخدم 'parent' عشان ده اللي في لوحة التحكم بتاعتك
    database.ref('sub_categories').orderByChild('parent').equalTo(mainDeptName).on('value', snap => {
        let h = `
            <div style="grid-column: 1/-1; text-align: right; margin-bottom: 15px;">
                <button onclick="loadMenu()" style="background:transparent; color:var(--gold); border:1px solid var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer;">⬅️ العودة للرئيسية</button>
                <h3 style="display:inline-block; margin-right:15px; color:white;">${title}</h3>
            </div>
        `;
        if (snap.exists()) {
            snap.forEach(child => {
                const sub = child.val();
                h += `
                    <div class="item-card" onclick="loadSubItems('${child.key}', '${sub.name}')" style="cursor:pointer; border: 1px solid rgba(200, 162, 124, 0.3);">
                        <img src="${sub.img || 'https://via.placeholder.com/150'}">
                        <h4>${sub.name}</h4>
                        <span style="color:var(--gold); font-size:12px;">تصفح الأصناف 📂</span>
                    </div>`;
            });
        } else {
            h += `<p style="grid-column: 1/-1; text-align:center; color:var(--gold);">قريباً.. أصناف جديدة ☕</p>`;
        }
        document.getElementById('menu').innerHTML = h;
    });
}

// 3. الدالة اللي بتعرض الأصناف اللي جوه القسم الفرعي
function loadSubItems(subId, subName) {
    // التعديل هنا: بنستخدم 'sub_id' عشان ده اللي في لوحة التحكم بتاعتك
    database.ref('menu_items').orderByChild('sub_id').equalTo(subId).on('value', snap => {
        let h = `<div style="grid-column: 1/-1; text-align: right; margin-bottom: 10px;">
                    <button onclick="loadMenu()" style="background:transparent; color:var(--gold); border:1px solid var(--gold); padding:5px 15px; border-radius:10px; cursor:pointer;">⬅️ العودة</button>
                    <h3 style="display:inline-block; margin-right:15px; color:white;">${subName}</h3>
                 </div>`;
        if(snap.exists()){
            snap.forEach(child => {
                const item = child.val();
                h += `<div class="item-card">
                    <img src="${item.img || 'https://via.placeholder.com/150'}">
                    <h4>${item.ar}</h4>
                    <span style="color:var(--gold);font-weight:700;display:block;margin-bottom:10px;">${item.price} ريال</span>
                    <select class="extra-sel" id="ex-${child.key}">${extrasStr}</select>
                    <button class="add-btn" onclick="addToCart('${child.key}','${item.ar}','${item.en}',${item.price},'${item.dept}')">إضافة +</button>
                </div>`;
            });
        } else {
            h += `<p style="grid-column: 1/-1; text-align:center; color:var(--gold);">لا توجد أصناف حالياً ☕</p>`;
        }
        document.getElementById('menu').innerHTML = h;
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
    });
}


    function startOrder(type) {
        oType = type; tNum = document.getElementById('tblNo').value;
        if(type === 'محلي' && !tNum) return alert("الرجاء إدخال رقم الطاولة");
        document.getElementById('typeLbl').innerText = type;
        document.getElementById('tblLbl').innerText = tNum ? `(طاولة ${tNum})` : "";
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            if(welcomeAudio) talk(welcomeAudio);
        }, 500);
    }

    function addToCart(k, ar, en, p, dept) {
        const s = document.getElementById('ex-'+k);
        // التعديل هنا: هناخد الاسم العربي أو الإنجليزي النضيف
        const exAr = s.options[s.selectedIndex].getAttribute('data-ar') || "";
        const exEn = s.value; // ده اللي كان فيه الأرقام
        const exP = parseFloat(s.options[s.selectedIndex].getAttribute('data-p') || 0);

        // --- الفنش الملكي للنطق ---
        // لو الزبون مختار إضافة، هينطق (المنتج + مع + الإضافة) بالعربي
        // لو مش مختار، هينطق المنتج بس
        let speechMsg = ar; 
        if (exAr && exAr !== "بدون إضافات") {
            speechMsg = ar + " مع " + exAr;
        }
        
        talk(speechMsg); // ندهنا دالة الصوت اللي لسه مصلحينها
        // --------------------------

        // باقي الكود بتاع الـ cart.push زي ما هو كمل عليه...
        
        // البحث عن المنتج في السلة بناءً على الكود والإضافة العربية لضمان الدقة
        const existingItem = cart.find(i => i.k === k && (i.exAr === exAr));
        
        if (existingItem) { 
            existingItem.qty += 1; 
        } 
        else { 
            cart.push({k, ar, en, p, exAr, exEn, exP, qty: 1, dept: dept}); 
        }

        // --- الجزء الخاص بتنظيف الصوت ---
        // بنقطع النص عند علامة _ عشان نطير الأرقام وننطق الكلمة بس
        let cleanEx = exEn.split('_')[0]; 
        talk(en + (cleanEx ? " with " + cleanEx : ""));
        // ---------------------------------

        renderCart();
    }

    function renderCart() {
        let h = ""; let subTotal = 0;
        cart.forEach((i, x) => {
            let itemTotal = (i.p + i.exP) * i.qty;
            subTotal += itemTotal;
            h += `<div class="cart-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="item-name"><span class="item-qty">${i.qty}x</span> ${i.ar}</span>
                        <span style="color:var(--gold); font-weight:800; font-size:16px;">${itemTotal.toFixed(2)} ريال</span>
                    </div>
                    ${i.exAr ? `<div style="color:var(--gold); font-size:13px; margin-top:5px;">+ إضافة: ${i.exAr}</div>` : ''}
                    <div style="margin-top:10px;">
                        <button onclick="updateQty(${x}, -1)" style="border:none;background:rgba(255,255,255,0.1);color:#fff;padding:5px 15px;border-radius:8px;cursor:pointer;">➖</button>
                        <button onclick="updateQty(${x}, 1)" style="border:none;background:rgba(255,255,255,0.1);color:#fff;padding:5px 15px;border-radius:8px;cursor:pointer;margin-right:5px;">➕</button>
                    </div>
                  </div>`;
        });
        let dAmt = (discountType === "percent") ? (subTotal * discountValReal / 100) : discountValReal;
        let finalT = subTotal - dAmt;
        document.getElementById('total').innerText = (finalT < 0 ? 0 : finalT).toFixed(2);
        document.getElementById('cartList').innerHTML = h;
        if(dAmt > 0) {
            document.getElementById('discountInfo').style.display='flex';
            document.getElementById('discountVal').innerText = `-${dAmt.toFixed(2)} ريال`;
        } else {
            document.getElementById('discountInfo').style.display='none';
        }
    }

    function applyPromo() {
        const code = document.getElementById('promoCode').value.trim().toUpperCase();
        if (!code) return showToast("الرجاء إدخال الكود أولاً");

        database.ref('coupons/' + code).once('value', snap => {
            const promo = snap.val();
            if (promo) {
                let val = promo.value || promo.discount || promo.amount || 0;
                discountValReal = parseFloat(val);
                let type = (promo.type || "").toString().toLowerCase();
                if (type.includes("نسبة") || type === "percent") {
                    discountType = "percent";
                } else {
                    discountType = "fixed";
                }
                activePromo = code;
                showToast(`✅ تم تفعيل خصم: ${discountValReal}${discountType === 'percent' ? '%' : ' ريال'}`);
                renderCart();
            } else {
                discountValReal = 0; activePromo = "";
                showToast("❌ كود الخصم غير صحيح");
                renderCart();
            }
        });
    }

    function updateQty(index, change) {
        cart[index].qty += change;
        if (cart[index].qty <= 0) cart.splice(index, 1);
        renderCart();
    }

function talk(t) {
    window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    
    // فحص ذكي: لو الكلام فيه حروف عربي، اقلب اللسان "عربي سعودي"
    // لو كله إنجليزي، خليه "إنجليزي أمريكاني"
    const isArabic = /[\u0600-\u06FF]/.test(t);
    
    if (isArabic) {
        m.lang = 'ar-SA';
        m.rate = 0.9; // سرعة هادية عشان الزبون يفهم
    } else {
        m.lang = 'en-US';
        m.rate = 1.0;
    }

    window.speechSynthesis.speak(m);
}

// 👈 اضف "ماكينة الصوت الملكي" هنا بالظبط
function callOrderNumber(num, type) {
    // 1. دي المقدمة الآلية اللي بتعرف الزبون نوع طلبه ورقمه
    let intro = (type === 'سفري') 
                ? `نعتز بخدمتكم. طلب السفري رقم ${num}. ` 
                : `حياكم الله. طلب الطاولة رقم ${num}. `;

    // 2. دي الجملة اللي أنت بتتحكم فيها من لوحة التحكم (السرية)
    // لو الخانة عندك فاضية، السيستم هينطق جملة بسيطة "طلبكم جاهز"
    let yourSecretWord = readyAudio || "طلبكم أصبح جاهزاً الآن.";

    // 3. هنا بيحصل الدمج الآلي (المقدمة + جملتك)
    let speechText = intro + yourSecretWord;

    // 4. فلتر الأمان عشان النطق يطلع "سبيكة" واحدة بدون تشويش
    let cleanText = speechText.replace(/[{}]/g, '').replace(/[-_]/g, ' ').trim(); 

    const msg = new SpeechSynthesisUtterance(cleanText);
    msg.lang = "ar-SA"; // نبرة سعودية فخمة
    msg.rate = 0.8;    // سرعة وقورة وواضحة
    msg.pitch = 1.0;
    msg.volume = 1;

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(msg);
}

async function submitOrder() {
    if(!cart.length) return alert("السلة فارغة");
    
    validateGeo(async () => {
        const finalTotalRaw = document.getElementById('total').innerText;
        const finalTotalNum = parseFloat(finalTotalRaw.replace(/[^\d.]/g, '')) || 0;
        const subTotal = cart.reduce((acc, i) => acc + (i.p + i.exP) * i.qty, 0);
        let dAmount = (discountType === "percent") ? (subTotal * discountValReal / 100) : discountValReal;
        const deptsNeeded = [...new Set(cart.map(item => (item.dept || 'barista').toLowerCase().trim()))];

        const finalItemsForSystem = cart.map(item => {
            return {
                k: item.k,
                ar: item.exAr ? `${item.ar} [+${item.exAr}]` : item.ar,
                p: item.p,
                exP: item.exP,
                qty: item.qty,
                dept: item.dept
            };
        });

        const orderPreview = {
            items: finalItemsForSystem,
            type: oType,
            table: tNum || 'سفري',
            totalPrice: finalTotalNum,
            time: new Date().toISOString()
        };

        if (!navigator.onLine) {
            let offlineOrders = JSON.parse(localStorage.getItem("offlineOrders") || "[]");
            offlineOrders.push(orderPreview);
            localStorage.setItem("offlineOrders", JSON.stringify(offlineOrders));
            showToast("📡 تم حفظ الطلب.. سيُرسل تلقائياً عند توفر الإنترنت");
            cart = []; 
            renderCart();
            return;
        }

        let orderNumber = null;

        if (oType === 'سفري') {
            try {
                const counterRef = database.ref('orders_counter');

                const result = await counterRef.transaction((currentData) => {
                    const todayStr = new Date().toLocaleDateString('en-GB');

                    if (!currentData || currentData.date !== todayStr) {
                        return { count: 1, date: todayStr };
                    } else {
                        return {
                            count: (currentData.count || 0) + 1,
                            date: todayStr
                        };
                    }
                });

                orderNumber = result.snapshot.val().count;

            } catch (e) {
                orderNumber = Math.floor(Math.random() * 1000);
            }
        }

        const orderData = {
            orderNum: orderNumber,
            title: oType === 'سفري' ? 'سفري ' + orderNumber : 'طاولة ' + tNum,
            items: finalItemsForSystem,
            type: oType, 
            table: tNum || 'سفري',
            notes: document.getElementById('notes').value, 
            promoUsed: activePromo || "بدون كوبون", 
            discountAmount: dAmount.toFixed(2),
            totalPrice: finalTotalNum,
            status: 'قيد التحضير ⏳',
            time: new Date().toISOString(), 
            displayTime: new Date().toLocaleTimeString('ar-SA'),
            date: new Date().toLocaleDateString('en-GB'),
            deptsNeeded: deptsNeeded,
            baristaReady: false, 
            kitchenReady: false, 
            dessertReady: false
        };

        const newOrderRef = database.ref('live_orders').push();
        const orderId = newOrderRef.key; 

        // ✅ مهم: نضمن الحفظ الأول
        await newOrderRef.set(orderData);

        // ✅ المتابعة بعد التأكيد
        trackMyOrderLive(orderId); 

        let displayMsg = "";
        let finalNumber = "";

        if (oType === "محلي") {
            finalNumber = tNum;
            displayMsg = "طاولة [" + finalNumber + "]";
        } else {
            finalNumber = orderNumber;
            displayMsg = "طلب سفري رقم [" + finalNumber + "]";
        }

        // ✅ صوت مرة واحدة فقط
        callOrderNumber(finalNumber, oType);

        showToast("تم إرسال الطلب بنجاح! " + displayMsg);
        alert("تم استلام طلبك لـ " + displayMsg + ".. بوقار السيادة! 🎉");

        cart = []; 
        renderCart(); 
        activePromo = ""; 
        discountValReal = 0; 
        document.getElementById('promoCode').value = ""; 
        document.getElementById('notes').value = ""; 

        if(document.getElementById('order-status-bar')) {
            document.getElementById('order-status-bar').style.display = 'block';
        }

    }, () => alert("❌ فشل التحقق الجغرافي: يجب التواجد داخل الفرع لإتمام الطلب"));
}

function showToast(m) {

        t.innerText = m;
        t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 5000);
    }
}

function trackMyOrderLive(orderId) {
    if (!orderId) return;

    database.ref('live_orders/' + orderId).on('value', async (snapshot) => {
        const order = snapshot.val();
        if (!order) return;

        let statusText = "⏳ طلبك قيد التحضير...";

        // 🧠 تحديد الأقسام المطلوبة فقط
        const needed = order.deptsNeeded || [];

        const baristaDone = !needed.includes('barista') || order.baristaReady;
        const kitchenDone = !needed.includes('kitchen') || order.kitchenReady;
        const dessertDone = !needed.includes('dessert') || order.dessertReady;

        // ✅ لو كل المطلوب جاهز
if (baristaDone && kitchenDone && dessertDone && order.status !== "تم التجهيز ✅") {
    await database.ref('live_orders/' + orderId).update({
        status: "تم التجهيز ✅"
    });
}

            // 🔥 تحديث الحالة في الداتابيس
            await database.ref('live_orders/' + orderId).update({
                status: "تم التجهيز ✅"
            });
        } 
        else if (order.baristaReady) {
            statusText = "☕ القهوة جاهزة";
        } 
        else if (order.kitchenReady) {
            statusText = "🍔 الأكل جاهز";
        }
        else if (order.dessertReady) {
            statusText = "🍰 الحلا جاهزة";
        }

        showToast(statusText);

        // ✨ تحديث شريط الحالة في الواجهة
        const bar = document.getElementById('order-status-bar');
        if (bar) {
            bar.innerText = statusText;
        }
    });
}
