<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamicTitle">Alpha-Shadow</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --gold: #c8a27c; --green: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8fafc; padding-bottom: 180px; }
        .hero { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: 0.5s; }
        .hero::before { content: ""; position: absolute; inset: 0; background: rgba(15,23,42,0.8); z-index: -1; }
        .btn-main { background: var(--gold); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 10px; width: 250px; font-size: 18px; }
        .offer-slider { width: 100%; overflow-x: auto; display: flex; gap: 10px; padding: 10px; background: #fff; border-bottom: 2px solid var(--gold); }
        .offer-slider img { height: 150px; border-radius: 15px; flex-shrink: 0; }
        .card { background: white; margin: 12px; border-radius: 20px; padding: 12px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card img { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; margin-left: 12px; }
        .qty-box { display: flex; align-items: center; gap: 10px; margin-right: auto; background: #f1f5f9; padding: 5px 10px; border-radius: 50px; }
        .btn-step { background: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        .footer-cart { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 1500; text-align: center; }
        .cart-btn { width: 90%; background: var(--green); color: white; padding: 18px; border-radius: 50px; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="hero">
        <img id="storeLogo" src="" style="width: 130px; margin-bottom: 20px; border-radius: 20px; display: none;">
        <h1 id="storeNameDisp">جاري التحميل...</h1>
        <button class="btn-main" onclick="showTables()">📍 محلي / Dine-in</button>
        <div id="tables-container" style="display:none;">
            <select id="tableNum" style="padding:10px; border-radius:10px; margin-bottom:10px; width:180px;">
                <option value="0">رقم الطاولة</option>
                <script>for(let i=1; i<=20; i++) document.write(`<option value="${i}">طاولة ${i}</option>`);</script>
            </select><br>
            <button class="btn-main" style="width:120px; background:var(--green);" onclick="setMode('local')">دخول</button>
        </div>
        <button class="btn-main" onclick="setMode('away')">🚗 سفري / Takeaway</button>
    </div>

    <div id="main-content" style="display:none;">
        <div class="offer-slider" id="offerSlider"></div>
        <div id="menu-items"></div>
        <div style="text-align:center; padding:15px;">
            <input type="text" id="couponInput" placeholder="كود خصم" style="padding:10px; border-radius:10px; border:1px solid #ddd; width:50%;">
            <button onclick="applyCoupon()" style="padding:10px; background:var(--gold); border:none; border-radius:10px; color:white;">خصم</button>
            <p id="discountMsg" style="color:var(--green); font-weight:bold;"></p>
        </div>
        <textarea id="order-notes" style="width:90%; margin:10px 5%; padding:10px; border-radius:15px; border:1px solid #ddd;" placeholder="ملاحظاتك..."></textarea>
        <div class="footer-cart">
            <p style="margin-bottom:10px; font-weight:bold;">طلبك جاهز؟ إرسال 👇</p>
            <button class="cart-btn" onclick="sendOrder()">إرسال الطلب | <span id="total-price">0</span> SAR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
            authDomain: "alphashadow-23689.firebaseapp.com",
            projectId: "alphashadow-23689",
            databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let menuData = []; let orderMode = ""; let discount = 0;
        let identity = {}; let audio = {};

        // تحميل الإعدادات من Admin
        database.ref('settings').on('value', snap => {
            const s = snap.val();
            if(s) {
                identity = s.identity || {};
                audio = s.audio || {};
                
                document.getElementById('storeNameDisp').innerText = identity.nameAr || "Alpha-Shadow";
                document.getElementById('dynamicTitle').innerText = identity.nameAr || "Alpha-Shadow";
                if(identity.logo) { document.getElementById('storeLogo').src = identity.logo; document.getElementById('storeLogo').style.display = 'block'; }
                if(identity.bg) document.getElementById('welcome-screen').style.backgroundImage = `url('${identity.bg}')`;
            }
        });

        function showTables() { document.getElementById('tables-container').style.display = 'block'; }

        function setMode(mode) {
            if(mode === 'local' && document.getElementById('tableNum').value === "0") { alert("اختر الطاولة!"); return; }
            orderMode = mode;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // نطق الترحيب المخصص من Admin
            speak(audio.welcome || "Welcome to our coffee shop");
            loadMenu();
        }

        function loadMenu() {
            database.ref('offers').on('value', snap => {
                let h = ""; snap.forEach(c => h += `<img src="${c.val().img}">`);
                document.getElementById('offerSlider').innerHTML = h;
            });
            database.ref('menu_items').on('value', snap => {
                menuData = []; snap.forEach(c => menuData.push({...c.val(), qty: 0}));
                render();
            });
        }

        function render() {
            let h = ""; let t = 0;
            menuData.forEach((item, i) => {
                t += (item.qty * item.price);
                h += `<div class="card"><img src="${item.img}"><div><b>${item.ar}</b><br><small>${item.price} SAR</small></div>
                <div class="qty-box"><button class="btn-step" onclick="updateQty(${i},-1)">-</button><span>${item.qty}</span><button class="btn-step" onclick="updateQty(${i},1)">+</button></div></div>`;
            });
            let final = t - (t * (discount/100));
            document.getElementById('menu-items').innerHTML = h;
            document.getElementById('total-price').innerText = final.toFixed(2);
        }

        function updateQty(i, s) { 
            if(menuData[i].qty+s >= 0) { 
                menuData[i].qty+=s; 
                if(s > 0) speak("Ready"); 
                render(); 
            } 
        }

        function speak(text) {
            let m = new SpeechSynthesisUtterance(text);
            m.lang = 'en-US'; window.speechSynthesis.speak(m);
        }

        function applyCoupon() {
            const code = document.getElementById('couponInput').value.toUpperCase();
            database.ref('coupons').child(code).once('value', snap => {
                if(snap.exists()) { discount = snap.val().pct; document.getElementById('discountMsg').innerText = `خصم ${discount}%`; render(); }
                else alert("كود خطأ");
            });
        }

        function sendOrder() {
            const items = menuData.filter(i => i.qty > 0).map(i => `${i.qty} x ${i.ar}`);
            if(items.length === 0) return;
            
            // نطق رسالة النهاية المخصصة من Admin
            speak(audio.done || "Your order is ready, Enjoy");

            const table = document.getElementById('tableNum').value;
            const type = orderMode === 'local' ? `📍 محلي (طاولة ${table})` : `🚗 سفري`;
            const msg = `*طلب جديد*\nالنوع: ${type}\nالطلبات:\n${items.join('\n')}\nالإجمالي: ${document.getElementById('total-price').innerText} SAR`;
            
            setTimeout(() => { window.open(`https://wa.me/966579747707?text=${encodeURIComponent(msg)}`); }, 2000);
        }
    </script>
</body>
</html>
