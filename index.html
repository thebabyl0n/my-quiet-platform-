<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Alpha Shadow Cafe</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #c8a27c; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--dark); background-size: cover; background-position: center; background-attachment: fixed; color: white; overflow-x: hidden; }
        
        /* شاشة البداية */
        #welcome-screen { position: fixed; inset: 0; background: var(--dark); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: 0.5s; }
        .welcome-logo { max-width: 150px; margin-bottom: 20px; border-radius: 50%; border: 3px solid var(--gold); }
        .order-type-btn { background: var(--gold); color: var(--dark); border: none; padding: 15px 40px; border-radius: 12px; font-size: 20px; font-weight: bold; margin: 10px; cursor: pointer; width: 200px; transition: 0.3s; }
        .order-type-btn:hover { transform: scale(1.05); }

        /* الصفحة الرئيسية */
        .overlay { background: rgba(15, 23, 42, 0.85); min-height: 100vh; padding: 20px; display: none; }
        header { text-align: center; margin-bottom: 20px; }
        #main-logo { max-width: 80px; border-radius: 50%; border: 2px solid var(--gold); }
        
        .slider-container { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 10px; }
        .slider-img { width: 280px; height: 150px; border-radius: 15px; flex-shrink: 0; object-fit: cover; border: 1px solid var(--gold); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); border-radius: 15px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .item-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        
        .extra-select { width: 100%; padding: 8px; border-radius: 8px; background: var(--dark); color: white; border: 1px solid var(--gold); font-size: 12px; margin: 10px 0; }
        .btn-add { background: var(--gold); color: var(--dark); border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }

        .cart-section { margin-top: 30px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; border: 1px dashed var(--gold); }
        .notes-area { width: 100%; padding: 10px; border-radius: 10px; margin-top: 10px; box-sizing: border-box; }
        .btn-send { background: #22c55e; color: white; width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <img id="welcomeLogo" class="welcome-logo" src="" alt="">
    <h1 id="welcomeCafeName" style="color: var(--gold);">تحميل...</h1>
    <div style="display: flex; flex-wrap: wrap; justify-content: center;">
        <button class="order-type-btn" onclick="startApp('سفري')">🚗 سفري</button>
        <button class="order-type-btn" onclick="startApp('محلي')">☕ محلي</button>
    </div>
</div>

<div class="overlay" id="mainApp">
    <header>
        <img id="main-logo" src="" alt="">
        <h2 id="cafeNameDisplay"></h2>
    </header>

    <div class="slider-container" id="offersSlider"></div>
    <div class="menu-grid" id="menuItems"></div>

    <div class="cart-section">
        <h3>🛒 طلباتك (<span id="orderTypeLabel"></span>)</h3>
        <div id="cartList"></div>
        <hr>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input type="text" id="couponInput" placeholder="كود الخصم" style="flex:1; padding:10px; border-radius:8px; border:none;">
            <button onclick="applyCoupon()" style="background:var(--gold); border:none; border-radius:8px; padding:0 15px; font-weight:bold;">تفعيل</button>
        </div>
        <textarea id="orderNotes" class="notes-area" placeholder="ملاحظاتك (السكر، المزاج، طلبات خاصة)..."></textarea>
        <div style="margin-top:15px; font-size:20px; text-align: center;">الإجمالي: <span id="totalPrice" style="color:var(--gold)">0</span> ريال</div>
        <button class="btn-send" onclick="sendOrder()">تأكيد وإرسال الطلب ✅</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let cart = [];
    let discount = 0;
    let welcomeVoice = "";
    let readyVoice = "";
    let orderType = "";
    let extraOptionsHTML = "";

    // 1. ربط الهوية والأصوات بالأدمن
    database.ref('settings').on('value', snap => {
        const s = snap.val();
        if(s) {
            if(s.branding) {
                document.getElementById('welcomeCafeName').innerText = s.branding.name;
                document.getElementById('cafeNameDisplay').innerText = s.branding.name;
                document.getElementById('pageTitle').innerText = s.branding.name;
                document.getElementById('welcomeLogo').src = s.branding.logo;
                document.getElementById('main-logo').src = s.branding.logo;
                document.body.style.backgroundImage = `url('${s.branding.bg}')`;
            }
            if(s.audio) {
                welcomeVoice = s.audio.welcome;
                readyVoice = s.audio.ready;
            }
        }
    });

    // جلب العروض والإضافات والمنيو من الأدمن
    database.ref('offers').on('value', snap => {
        let h = "";
        snap.forEach(c => h += `<img src="${c.val().img}" class="slider-img">`);
        document.getElementById('offersSlider').innerHTML = h;
    });

    database.ref('extras_options').on('value', snap => {
        extraOptionsHTML = `<option value="">بدون إضافات</option>`;
        snap.forEach(c => {
            extraOptionsHTML += `<option value="${c.val().en}" data-ar="${c.val().ar}" data-price="${c.val().price}">${c.val().ar} (+${c.val().price})</option>`;
        });
        loadMenu();
    });

    function loadMenu() {
        database.ref('menu_items').on('value', snap => {
            let h = "";
            snap.forEach(child => {
                const item = child.val();
                h += `
                <div class="item-card">
                    <img src="${item.img}">
                    <h4>${item.ar}</h4>
                    <span style="color:var(--gold); display:block; margin-bottom:5px;">${item.price} ريال</span>
                    <select class="extra-select" id="extra-${child.key}">${extraOptionsHTML}</select>
                    <button class="btn-add" onclick="addToCart('${child.key}', '${item.ar}', '${item.en}', ${item.price})">إضافة +</button>
                </div>`;
            });
            document.getElementById('menuItems').innerHTML = h;
        });
    }

    // تشغيل التطبيق ونطق الترحيب
    function startApp(type) {
        orderType = type;
        document.getElementById('orderTypeLabel').innerText = type;
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            if(welcomeVoice) speak(welcomeVoice);
        }, 500);
    }

    function addToCart(key, ar, en, price) {
        const sel = document.getElementById('extra-'+key);
        const exEn = sel.value;
        const exAr = sel.options[sel.selectedIndex].getAttribute('data-ar');
        const exPrice = parseFloat(sel.options[sel.selectedIndex].getAttribute('data-price') || 0);

        cart.push({ ar, en, price, exAr, exEn, exPrice });
        speak(en + (exEn ? " with " + exEn : "")); // نطق المشروب والإضافة بالإنجليزية
        updateCart();
    }

    function updateCart() {
        let h = ""; let total = 0;
        cart.forEach((item, index) => {
            let itemTotal = item.price + item.exPrice;
            total += itemTotal;
            h += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:rgba(255,255,255,0.05); padding:8px; border-radius:8px;">
                    <span>${item.ar} ${item.exAr ? '<small>('+item.exAr+')</small>' : ''}</span>
                    <span>${itemTotal} ريال <button onclick="cart.splice(${index},1); updateCart()" style="background:#ff4d4d; color:white; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; margin-right:5px;">X</button></span>
                  </div>`;
        });
        let final = total - (total * (discount / 100));
        document.getElementById('cartList').innerHTML = h;
        document.getElementById('totalPrice').innerText = final.toFixed(2);
    }

    function applyCoupon() {
        const code = document.getElementById('couponInput').value.toUpperCase();
        database.ref('coupons/' + code).once('value', snap => {
            if(snap.exists()) {
                discount = snap.val().pct;
                alert("تم تفعيل خصم " + discount + "%");
                updateCart();
            } else { alert("كود الخصم غير صحيح!"); }
        });
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    // إرسال الطلب للباريستا والواتساب
    function sendOrder() {
        if(cart.length === 0) return alert("السلة فارغة!");
        if(readyVoice) speak(readyVoice);

        let details = `*طلب جديد (${orderType})*:\n`;
        cart.forEach(i => details += `- ${i.ar} ${i.exAr ? '['+i.exAr+']' : ''}\n`);
        details += `\n*الملاحظات*: ${document.getElementById('orderNotes').value}`;
        details += `\n*الإجمالي*: ${document.getElementById('totalPrice').innerText} ريال`;

        // إرسال للباريستا
        database.ref('orders').push({
            items: cart,
            type: orderType,
            notes: document.getElementById('orderNotes').value,
            total: document.getElementById('totalPrice').innerText,
            status: 'pending',
            time: Date.now()
        });

        window.open(`https://wa.me/201027179831?text=${encodeURIComponent(details)}`);
        cart = []; updateCart();
    }
</script>
</body>
</html>
