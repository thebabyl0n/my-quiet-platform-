<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة الكاشير | نظام الظل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --gold: #c8a27c; --text: #f1f5f9; --accent: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #334155; position: relative; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .table-no { background: var(--gold); color: var(--bg); padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 18px; }
        .order-time { font-size: 12px; color: #94a3b8; margin-top: 5px; }
        .items-list { margin: 15px 0; border-top: 1px solid #334155; padding-top: 10px; }
        .item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .total { font-size: 20px; font-weight: bold; color: var(--accent); border-top: 2px dashed #334155; padding-top: 10px; display: flex; justify-content: space-between; }
        .btn-done { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-done:hover { opacity: 0.9; transform: scale(0.98); }
        audio { display: none; }
    </style>
</head>
<body>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="header">
    <h2>🖥️ شاشة مراقبة الطلبات (الكاشير)</h2>
    <div id="status">متصل بالسيستم 🟢</div>
</div>

<div class="grid" id="ordersGrid">
    </div>

<script>
    // نفس إعدادات الـ Firebase بتاعتك يا حودة
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // استماع لحظي للطلبات الجديدة
    database.ref('live_orders').on('value', (snapshot) => {
        const grid = document.getElementById('ordersGrid');
        grid.innerHTML = ''; // تنظيف الشاشة قبل التحديث
        
        if (snapshot.exists()) {
            document.getElementById('notifSound').play(); // تشغيل صوت التنبيه
            
            snapshot.forEach((child) => {
                const order = child.val();
                const orderId = child.key;
                
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `<div class="item"><span>${item.name} × ${item.qty}</span> <span>${item.price} ريال</span></div>`;
                });

                grid.innerHTML += `
                    <div class="order-card">
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <div>
                                <span class="table-no">طاولة ${order.table}</span>
                                <div class="order-time">${order.time}</div>
                            </div>
                            <span style="color:var(--gold)">#${orderId.slice(-4)}</span>
                        </div>
                        
                        <div class="items-list">
                            ${itemsHtml}
                        </div>

                        <div class="total">
                            <span>الإجمالي:</span>
                            <span>${order.totalPrice} ريال</span>
                        </div>

                        <button class="btn-done" onclick="completeOrder('${orderId}')">تم المحاسبة والتسليم ✅</button>
                    </div>
                `;
            });
        } else {
            grid.innerHTML = '<h3 style="grid-column: 1/-1; text-align:center; color:#64748b;">لا توجد طلبات حالياً.. الشغل واقف يا وحش! ☕</h3>';
        }
    });

    // وظيفة إنهاء الأوردر
    function completeOrder(id) {
        if(confirm('هل تم استلام المبلغ وتسليم الطلب؟')) {
            // بننقل الطلب للأرشيف عشان مبيعات آخر اليوم (اختياري)
            database.ref('live_orders/' + id).once('value').then(snap => {
                database.ref('history_orders').push(snap.val());
                // بنحذفه من الشاشة الرئيسية
                database.ref('live_orders/' + id).remove();
            });
        }
    }
</script>
</body>
</html>
