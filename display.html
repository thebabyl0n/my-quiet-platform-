<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العرض الاحترافي | Alpha Shadow</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --gold: #c8a27c; --text: #f1f5f9; --accent: #22c55e; --blue: #3b82f6; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid #334155; position: relative; transition: 0.3s; }
        .is-ready { border-color: var(--accent); opacity: 0.8; } /* تمييز الطلب الجاهز */
        .table-no { background: var(--gold); color: var(--bg); padding: 5px 15px; border-radius: 8px; font-weight: bold; font-size: 20px; }
        .items-list { margin: 15px 0; border-top: 1px solid #334155; padding-top: 12px; }
        .item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #475569; padding-bottom: 5px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-ready { background: var(--blue); } /* زرار التنبيه */
        .btn-done { background: var(--accent); }  /* زرار الحذف النهائي (للكاشير) */
        .status-badge { font-size: 14px; padding: 4px 8px; border-radius: 5px; background: #334155; color: var(--gold); }
    </style>
</head>
<body>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="header">
    <h2 id="screenTitle">جاري التعرف على القسم...</h2>
    <div id="status">⏳</div>
</div>

<div class="grid" id="ordersGrid"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const screenType = urlParams.get('dept'); 

    // ضبط العناوين
    const titles = { 'barista': '☕ باريستا', 'kitchen': '🍔 مطبخ', 'dessert': '🍰 حلا', 'cashier': '💰 كاشير' };
    const isCashier = (!screenType || screenType === 'cashier');
    document.getElementById('screenTitle').innerText = titles[screenType] || titles['cashier'];

    database.ref('live_orders').on('value', (snapshot) => {
        const grid = document.getElementById('ordersGrid');
        grid.innerHTML = ''; 
        
        snapshot.forEach((child) => {
            const order = child.val();
            const orderId = child.key;
            let itemsHtml = '';
            let hasMyItems = false;

            order.items.forEach(item => {
                if (isCashier || item.dept === screenType) {
                    hasMyItems = true;
                    itemsHtml += `<div class="item"><span>${item.ar} × ${item.qty}</span><span>${(item.p * item.qty).toFixed(2)}</span></div>`;
                }
            });

            if (hasMyItems) {
                const readyClass = order.status === 'جاهز للاستلام ✅' ? 'is-ready' : '';
                
                let buttons = '';
                if (isCashier) {
                    // الكاشير عنده زرار الحذف النهائي فقط
                    buttons = `<button class="btn btn-done" onclick="deleteOrder('${orderId}')">تم المحاسبة والحذف ✅</button>`;
                } else {
                    // الأقسام عندها زرار "جاهز" وزرار "إخفاء من شاشتي" (اختياري)
                    buttons = `
                        <button class="btn btn-ready" onclick="markReady('${orderId}')">📣 جاهز</button>
                        <button class="btn" style="background:#475569" onclick="this.parentElement.parentElement.style.display='none'">❌ إخفاء</button>
                    `;
                }

                grid.innerHTML += `
                    <div class="order-card ${readyClass}">
                        <div style="display:flex; justify-content:space-between;">
                            <span class="table-no">طاولة ${order.table}</span>
                            <span class="status-badge">${order.status || 'تحت التجهيز'}</span>
                        </div>
                        <div class="items-list">${itemsHtml}</div>
                        <div class="btn-group">${buttons}</div>
                    </div>`;
            }
        });
    });

    // وظيفة "جاهز": تغير الحالة وترسل تنبيه بدون حذف
    function markReady(id) {
        database.ref('live_orders/' + id).update({ status: 'جاهز للاستلام ✅' });
        // هنا ممكن تضيف كود يخلي الموبايل يصفر عند الزبون
    }

    // وظيفة الحذف (للكاشير فقط): تمسح من الداتابيز نهائياً
    function deleteOrder(id) {
        if(confirm('تأكيد المحاسبة وحذف الطلب نهائياً؟')) {
            database.ref('live_orders/' + id).remove();
        }
    }
</script>
</body>
</html>
