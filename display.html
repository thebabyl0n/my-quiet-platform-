<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Shadow | Tracking System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --gold: #c8a27c; --text: #f1f5f9; --accent: #22c55e; --blue: #3b82f6; --note: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid #334155; position: relative; }
        .table-no { background: var(--gold); color: var(--bg); padding: 5px 12px; border-radius: 8px; font-weight: bold; }
        .item { margin-bottom: 8px; border-bottom: 1px dashed #475569; padding-bottom: 8px; display: flex; justify-content: space-between; }
        .customer-note { background: rgba(251, 191, 36, 0.1); color: var(--note); padding: 10px; border-radius: 8px; border-right: 4px solid var(--note); margin-top: 10px; font-weight: bold; }
        .price-tag { color: var(--gold); font-weight: bold; }
        .total-box { margin-top: 15px; padding: 10px; background: rgba(34, 197, 94, 0.1); border-radius: 8px; color: var(--accent); font-size: 18px; font-weight: 800; text-align: center; border: 1px solid var(--accent); }
        .status-bar { display: flex; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .dept-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; background: #334155; color: #94a3b8; border: 1px solid #475569; }
        .dept-ready { background: rgba(34, 197, 94, 0.2); color: var(--accent); border-color: var(--accent); font-weight: bold; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; }
        .btn-cashier { background: var(--accent); }
        .btn-dept { background: var(--blue); }
    </style>
</head>
<body onclick="enableAudio()">

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div class="header">
    <h2 id="screenTitle">🖥️ جاري التحميل...</h2>
    <div id="status" onclick="enableAudio()" style="font-size: 14px; color: var(--gold); cursor: pointer; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px;">🔇 اضغط لتفعيل التنبيهات</div>
</div>

<div class="grid" id="ordersGrid"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const screenType = (urlParams.get('dept') || 'cashier').toLowerCase().trim(); 
    const isCashier = (screenType === 'cashier');
    const titles = { 'barista': '☕ باريستا', 'kitchen': '🍔 مطبخ', 'dessert': '🍰 حلا', 'cashier': '💰 كاشير الحسابات' };
    document.getElementById('screenTitle').innerText = titles[screenType] || titles['cashier'];

    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let audioEnabled = false;
    let knownOrders = new Set();

    function enableAudio() { 
        audioEnabled = true; 
        document.getElementById('status').innerText = "✅ التنبيهات تعمل";
        document.getElementById('status').style.color = "var(--accent)";
        document.getElementById('notifSound').play().catch(e => {});
        requestWakeLock();
    }

    database.ref('live_orders').on('value', (snapshot) => {
        const grid = document.getElementById('ordersGrid');
        grid.innerHTML = ''; 
        let alertNow = false;
        let noteNow = false;

        snapshot.forEach((child) => {
            const order = child.val();
            const orderId = child.key;
            if (!order || !order.items) return;

            // 🛡️ الفلتر الحاسم (1): لو الطلب المدير رَحله للأرشيف.. اخفيه فوراً
            if (order.status === "تم الترحيل للأرشيف 📦") return;

            // 🛡️ الفلتر الحاسم (2): لو الطلب الكاشير حاسبه.. اخفيه من هنا عشان الزحمة
            if (order.status === "تمت المحاسبة ✅") return;

            let itemsHtml = '';
            let forMe = false;
            const finalNote = order.notes || order.note || "";

           order.items.forEach((item, index) => {
                const itemDept = (item.dept || 'barista').toLowerCase().trim();
                if (isCashier || itemDept === screenType) {
                    forMe = true;
                    const isItemReady = order[itemDept + 'Ready'] === true;
                    const price = isCashier ? `<span class="price-tag">${(item.p * item.qty).toFixed(2)} ريال</span>` : "";
              itemsHtml += `<div class="item">
                   <span><b>${item.ar}</b> × ${item.qty} ${isItemReady?'✅':''}</span>
                   ${isCashier ? `<button onclick="removeItem('${orderId}', ${index})" 
                   style="background:#ef4444; border:none; color:white; border-radius:6px; padding:2px 8px; cursor:pointer;">❌</button>` : ""}
                   ${price}
                   </div>`;
                }
            });

            if (forMe) {
                if (!knownOrders.has(orderId)) { 
                    alertNow = true; 
                    if (finalNote.trim() !== "") noteNow = true;
                    knownOrders.add(orderId); 
                }

                let statusBar = "";
                if (isCashier) {
                    statusBar = `<div class="status-bar">
                        <span class="dept-badge ${order.baristaReady?'dept-ready':''}">☕ باريستا ${order.baristaReady?'✅':'⏳'}</span>
                        <span class="dept-badge ${order.kitchenReady?'dept-ready':''}">🍔 مطبخ ${order.kitchenReady?'✅':'⏳'}</span>
                        <span class="dept-badge ${order.dessertReady?'dept-ready':''}">🍰 حلا ${order.dessertReady?'✅':'⏳'}</span>
                    </div>`;
                }

                const isDone = order[screenType + 'Ready'] === true;
const btn = isCashier
    ? `<button class="btn btn-cashier" onclick="completeOrder('${orderId}')">تحصيل المبلغ وإتمام ✅</button>
       <button class="btn" style="background: #ef4444; margin-top: 8px;" onclick="requestCancel('${orderId}')">⚠️ طلب إلغاء الطلب</button>`
    : `<button class="btn btn-dept" ${isDone?'disabled':''} onclick='markReady("${orderId}", ${JSON.stringify(order)})'>${isDone?'تم إرسال الإشعار ✅':'تم التجهيز 📣'}</button>`;

                grid.innerHTML += `
                    <div class="order-card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="table-no">${order.type === 'سفري' ? '🚗 ' + (order.orderNum || '---') : '☕ ' + order.table}</span>
                            <span style="color:var(--gold); font-size:12px;">#${orderId.slice(-4)}</span>
                        </div>
                        ${statusBar}
                        <div style="margin-top:10px;">${itemsHtml}</div>
                        ${finalNote ? `<div class="customer-note">📝 ملاحظة: ${finalNote}</div>` : ''}
                        ${isCashier ? `<div class="total-box">المطلوب: ${order.totalPrice} ريال</div>` : ''}
                        ${btn}
                    </div>`;
            }
        });

        if (alertNow && audioEnabled) {
            forcePlay('notifSound');
            if (noteNow) {
                setTimeout(() => {
                    window.speechSynthesis.cancel();
                    const msg = new SpeechSynthesisUtterance("تنبيه لقسم " + (titles[screenType] || "الطلبات") + "، توجد ملاحظة في الطلب");
                    msg.lang = 'ar-SA';
                    msg.rate = 0.9;
                    window.speechSynthesis.speak(msg);
                }, 1300);
            }
        }
    });

    // دالة تم التجهيز: بتحسب الوقت وتجمده في finalWait
    function markReady(id, orderData) { 
        if (!orderData.time) return;
        const start = new Date(orderData.time);
        const now = new Date();
        const diff = Math.floor((now - start) / 60000);
        const finalWait = diff > 0 ? diff : 0;

        database.ref('live_orders/' + id).update({ 
            [screenType + 'Ready']: true,
            finalWait: finalWait // 👈 تجميد الوقت للداشبورد
        }); 
    }

// 👈 دي الدالة اللي كانت بتمسح .. عدلها لكدة:
function completeOrder(id) { 
    if(confirm('هل تم استلام المبلغ وإتمام الطلب؟')) {
        // بدل remove() هنستخدم update()
        database.ref('live_orders/' + id).update({
            status: "تمت المحاسبة ✅", // دي اللي الداشبورد مستنياها عشان تلون الأوردر وتثبته
            accountingTime: new Date().toISOString()
        }).then(() => {
            console.log("تم تحديث حالة الدفع بنجاح");
        });
    }
}
function requestCancel(id) {
    if(confirm('هل تريد إرسال طلب إلغاء للمدير؟')) {
        database.ref('live_orders/' + id).update({
            status: "طلب إلغاء ⚠️",
            cancelRequested: true,
            cancelTime: new Date().toISOString()
        }).then(() => {
            alert("تم إرسال الطلب للمدير.. في انتظار الموافقة.");
        });
    }
}

    let wakeLock = null;
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {}
    }

    setInterval(() => {
        if (audioEnabled) {
            const silentDistract = document.getElementById('notifSound');
            const oldVol = silentDistract.volume;
            silentDistract.volume = 0.01;
            silentDistract.play().catch(e => {});
            setTimeout(() => { silentDistract.volume = oldVol; }, 500);
        }
    }, 20000);

    function forcePlay(audioId) {
        const audio = document.getElementById(audioId);
        audio.pause();
        audio.currentTime = 0;
        if (window.AudioContext || window.webkitAudioContext) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            context.resume().then(() => { audio.play(); });
        } else {
            audio.play();
        }
    }
    function removeItem(orderId, itemIndex) {
    if(!confirm("حذف الصنف من الطلب؟")) return;

    database.ref('live_orders/' + orderId).once('value').then(snap => {
        const order = snap.val();
        if (!order || !order.items) return;

        // حذف الصنف
        order.items.splice(itemIndex, 1);

        // إعادة حساب السعر
        let newTotal = 0;
        order.items.forEach(i => {
            newTotal += (i.p * i.qty);
        });

        // تحديث في Firebase
        database.ref('live_orders/' + orderId).update({
            items: order.items,
            totalPrice: newTotal
        });

    });
}
</script>
</body>
</html>
