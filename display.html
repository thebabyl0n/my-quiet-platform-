<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Shadow | Tracking System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --gold: #c8a27c; --text: #f1f5f9; --accent: #22c55e; --blue: #3b82f6; --note: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid #334155; }
        .table-no { background: var(--gold); color: var(--bg); padding: 5px 12px; border-radius: 8px; font-weight: bold; }
        .item { margin-bottom: 8px; border-bottom: 1px dashed #475569; padding-bottom: 8px; display: flex; justify-content: space-between; }
        .customer-note { background: rgba(251, 191, 36, 0.1); color: var(--note); padding: 10px; border-radius: 8px; border-right: 4px solid var(--note); margin-top: 10px; font-weight: bold; }
        .price-tag { color: var(--gold); font-weight: bold; font-size: 14px; }
        .total-box { margin-top: 15px; padding-top: 10px; border-top: 2px solid var(--accent); color: var(--accent); font-size: 18px; font-weight: 800; text-align: center; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .btn-cashier { background: var(--accent); }
        .btn-dept { background: var(--blue); }
    </style>
</head>
<body onclick="enableAudio()">

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<div class="header">
    <h2 id="screenTitle">🖥️ جاري التحميل...</h2>
    <div id="status" style="font-size: 14px; color: var(--gold); cursor: pointer; padding: 10px; border: 1px solid var(--gold); border-radius: 8px;">🔇 اضغط هنا لتفعيل الصوت</div>
</div>

<div class="grid" id="ordersGrid"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const screenType = (urlParams.get('dept') || 'cashier').toLowerCase().trim(); 
    const isCashier = (screenType === 'cashier');
    
    const titles = { 'barista': '☕ باريستا', 'kitchen': '🍔 مطبخ', 'dessert': '🍰 حلا', 'cashier': '💰 كاشير الحسابات' };
    document.getElementById('screenTitle').innerText = titles[screenType] || titles['cashier'];

    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let audioEnabled = false;
    let knownOrders = new Set();

    // دالة تفعيل الصوت (مهمة جداً لسياسات المتصفح)
    function enableAudio() { 
        audioEnabled = true; 
        document.getElementById('status').innerText = "✅ الصوت يعمل";
        document.getElementById('status').style.color = "var(--accent)";
        document.getElementById('status').style.borderColor = "var(--accent)";
        // تشغيل صامت لتأكيد الإذن
        document.getElementById('notifSound').play().then(() => {
            document.getElementById('notifSound').pause();
            document.getElementById('notifSound').currentTime = 0;
        }).catch(e => console.log("Audio Init"));
    }

    database.ref('live_orders').on('value', (snapshot) => {
        const grid = document.getElementById('ordersGrid');
        grid.innerHTML = ''; 
        let shouldPlayAlert = false;
        let shouldSayNote = false;

        snapshot.forEach((child) => {
            const order = child.val();
            const orderId = child.key;
            if (!order || !order.items) return;

            let itemsHtml = '';
            let orderHasItemsForMe = false;
            // التحقق من وجود ملاحظة في أي مسمى (notes أو note)
            const finalNote = order.notes || order.note || "";

            order.items.forEach(item => {
                const itemDept = (item.dept || 'barista').toLowerCase().trim();
                
                if (isCashier || itemDept === screenType) {
                    orderHasItemsForMe = true;
                    const isReady = order[itemDept + 'Ready'] === true;
                    const priceInfo = isCashier ? `<span class="price-tag">${(item.p * item.qty).toFixed(2)} ريال</span>` : "";
                    
                    itemsHtml += `
                        <div class="item">
                            <span><b>${item.ar}</b> × ${item.qty} ${isReady ? '✅' : '⏳'}</span>
                            ${priceInfo}
                        </div>`;
                }
            });

            if (orderHasItemsForMe) {
                // إذا كان طلب جديد لهذا القسم أو الكاشير
                if (!knownOrders.has(orderId)) { 
                    shouldPlayAlert = true; 
                    if (finalNote.trim() !== "") {
                        shouldSayNote = true;
                    }
                    knownOrders.add(orderId); 
                }

                const isDone = order[screenType + 'Ready'] === true;
                const btn = isCashier 
                    ? `<button class="btn btn-cashier" onclick="deleteOrder('${orderId}')">تم الحساب - حذف ✅</button>`
                    : `<button class="btn btn-dept" ${isDone?'disabled':''} onclick="markReady('${orderId}','${screenType}')">${isDone?'جاهز ✅':'تجهيز القسم 📣'}</button>`;

                const totalBox = isCashier ? `<div class="total-box">الإجمالي: ${order.totalPrice} ريال</div>` : "";

                grid.innerHTML += `
                    <div class="order-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span class="table-no">طاولة ${order.table}</span>
                            <span style="color:var(--gold)">#${orderId.slice(-4)}</span>
                        </div>
                        ${itemsHtml}
                        ${finalNote ? `<div class="customer-note">⚠️ ملاحظة: ${finalNote}</div>` : ''}
                        ${totalBox}
                        ${btn}
                    </div>`;
            }
        });

        // تنفيذ التنبيهات الصوتية
        if (shouldPlayAlert && audioEnabled) {
            const bell = document.getElementById('notifSound');
            bell.currentTime = 0;
            bell.play().catch(e => console.log("Play error"));

            if (shouldSayNote) {
                // ننتظر الجرس يخلص وننطق الملاحظة
                setTimeout(() => {
                    window.speechSynthesis.cancel(); // إلغاء أي نطق قديم
                    const msg = new SpeechSynthesisUtterance("تنبيه، يوجد ملاحظة في هذا الطلب");
                    msg.lang = 'ar-SA';
                    msg.rate = 0.9;
                    window.speechSynthesis.speak(msg);
                }, 1200);
            }
        }
    });

    function markReady(id, dept) { 
        database.ref('live_orders/' + id).update({ [dept + 'Ready']: true }); 
    }
    
    function deleteOrder(id) { 
        if(confirm('تأكيد الحساب وحذف الطلب؟')) {
            database.ref('live_orders/' + id).remove(); 
        }
    }
</script>
</body>
</html>
