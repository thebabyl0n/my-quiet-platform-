<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العرض الاحترافي | Alpha Shadow</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --gold: #c8a27c; --text: #f1f5f9; --accent: #22c55e; --blue: #3b82f6; --note: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 20px; border: 2px solid #334155; transition: 0.3s; position: relative; }
        .ready-border { border-color: var(--accent) !important; box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .table-no { background: var(--gold); color: var(--bg); padding: 5px 15px; border-radius: 8px; font-weight: bold; font-size: 20px; }
        .items-list { margin: 15px 0; border-top: 1px solid #334155; padding-top: 12px; }
        .item { margin-bottom: 12px; border-bottom: 1px dashed #475569; padding-bottom: 8px; }
        .item-row { display: flex; justify-content: space-between; font-weight: bold; }
        .extra-info { font-size: 14px; color: var(--gold); margin-top: 4px; display: block; }
        .customer-note { background: rgba(251, 191, 36, 0.1); color: var(--note); padding: 10px; border-radius: 8px; border-right: 4px solid var(--note); margin-top: 10px; font-size: 14px; }
        .total { font-size: 19px; font-weight: bold; color: var(--accent); border-top: 2px solid #334155; padding-top: 10px; display: flex; justify-content: space-between; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; color: white; transition: 0.3s; }
        .btn-cashier { background: var(--accent); }
        .btn-dept { background: var(--blue); }
        .btn:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<div class="header">
    <h2 id="screenTitle">🖥️ جاري التحميل...</h2>
    <div id="status">⏳</div>
</div>

<div class="grid" id="ordersGrid"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
        authDomain: "alphashadow-23689.firebaseapp.com",
        projectId: "alphashadow-23689",
        databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const screenType = urlParams.get('dept'); 
    const isCashier = (!screenType || screenType === 'cashier');

    const titles = { 'barista': '☕ باريستا', 'kitchen': '🍔 مطبخ', 'dessert': '🍰 حلا', 'cashier': '💰 كاشير' };
    document.getElementById('screenTitle').innerText = titles[screenType] || titles['cashier'];

    database.ref('live_orders').on('value', (snapshot) => {
        const grid = document.getElementById('ordersGrid');
        grid.innerHTML = ''; 
        
        snapshot.forEach((child) => {
            const order = child.val();
            const orderId = child.key;
            let itemsHtml = '';
            let hasMyItems = false;

            order.items.forEach(item => {
                if (isCashier || item.dept === screenType) {
                    hasMyItems = true;
                    // عرض الصنف + الإضافات (لو موجودة)
                    itemsHtml += `
                        <div class="item">
                            <div class="item-row">
                                <span>${item.ar || item.name} × ${item.qty}</span>
                                ${isCashier ? `<span>${(item.p * item.qty).toFixed(2)}</span>` : ''}
                            </div>
                            ${item.exAr ? `<span class="extra-info">+ إضافات: ${item.exAr}</span>` : ''}
                        </div>`;
                }
            });

            if (hasMyItems) {
                const isReady = order.status === 'جاهز للاستلام ✅';
                
                // زر الكاشير يحذف، القسم يحدث الحالة
                const btnHtml = isCashier 
                    ? `<button class="btn btn-cashier" onclick="deleteOrder('${orderId}')">تم المحاسبة والحذف ✅</button>`
                    : `<button class="btn btn-dept" ${isReady ? 'disabled' : ''} onclick="markReady('${orderId}')">${isReady ? 'تم إرسال التنبيه 🔔' : 'جاهز للتسليم 📣'}</button>`;

                grid.innerHTML += `
                    <div class="order-card ${isReady ? 'ready-border' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="table-no">طاولة ${order.table}</span>
                            <span style="color:var(--gold); font-size:12px;">#${orderId.slice(-4)}</span>
                        </div>
                        
                        <div class="items-list">${itemsHtml}</div>

                        ${order.note ? `<div class="customer-note">📝 ملاحظة: ${order.note}</div>` : ''}

                        <div class="total">
                            <span>${isCashier ? 'الإجمالي:' : 'الحالة:'}</span>
                            <span>${isCashier ? order.totalPrice + ' ريال' : (order.status || 'قيد التحضير')}</span>
                        </div>
                        ${btnHtml}
                    </div>`;
            }
        });
    });

    function markReady(id) {
        database.ref('live_orders/' + id).update({ status: 'جاهز للاستلام ✅' });
        document.getElementById('notifSound').play().catch(e => {});
    }

    function deleteOrder(id) {
        if(confirm('تأكيد المحاسبة والحذف النهائي؟')) {
            database.ref('live_orders/' + id).remove();
        }
    }
</script>
</body>
</html>
