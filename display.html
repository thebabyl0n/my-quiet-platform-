<script>
const firebaseConfig = {
    apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
    authDomain: "alphashadow-23689.firebaseapp.com",
    projectId: "alphashadow-23689",
    databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
const screenType = urlParams.get('dept'); 
const isCashier = (!screenType || screenType === 'cashier');

let audioEnabled = false;
let knownOrders = new Set();

function enableAudio() { 
    audioEnabled = true; 
    document.getElementById('status').innerText = "✅ الصوت شغال"; 
}

const titles = { 
    'barista': '☕ باريستا', 
    'kitchen': '🍔 مطبخ', 
    'dessert': '🍰 حلا', 
    'cashier': '💰 كاشير' 
};
document.getElementById('screenTitle').innerText = titles[screenType] || titles['cashier'];

database.ref('live_orders').on('value', (snapshot) => {
    const grid = document.getElementById('ordersGrid');
    grid.innerHTML = ''; 
    let newOrderDetected = false;
    let noteDetected = false;

    snapshot.forEach((child) => {
        const order = child.val();
        const orderId = child.key;

        if (!order || !order.items) return;

        let itemsHtml = '';
        let hasMyItems = false;

        const finalNote = order.notes || order.note || "";

        order.items.forEach(item => {

            const isThisItemForMe = (
                item.dept === screenType ||
                (order.deptsNeeded && order.deptsNeeded.includes(screenType))
            );

            if (isCashier || isThisItemForMe) {

                hasMyItems = true;

                let extrasHtml = "";
                let rawExtras = item.extras || item.extra || item.addedItems || "";

                if (rawExtras) {
                    if (Array.isArray(rawExtras) && rawExtras.length > 0) {
                        extrasHtml = `<div class="extras-list">➕ ${rawExtras.join(' - ')}</div>`;
                    } else if (typeof rawExtras === 'string' && rawExtras.trim() !== "") {
                        extrasHtml = `<div class="extras-list">➕ ${rawExtras}</div>`;
                    }
                }

                const isReady = order[item.dept + 'Ready'] === true;

                itemsHtml += `
                <div class="item">
                    <span><b>${item.ar}</b> × ${item.qty} ${isReady ? '✅' : '⏳'}</span>
                    ${extrasHtml}
                </div>`;
            }
        });

        if (!hasMyItems) return;

        if (!knownOrders.has(orderId)) {
            newOrderDetected = true;
            if (finalNote) noteDetected = true;
            knownOrders.add(orderId);
        }

        let trackingHtml = '';
        if (isCashier) {
            trackingHtml = `
            <div class="track-box">
                <span class="badge ${order.baristaReady ? 'ready-badge' : ''}">☕ باريستا</span>
                <span class="badge ${order.kitchenReady ? 'ready-badge' : ''}">🍔 مطبخ</span>
                <span class="badge ${order.dessertReady ? 'ready-badge' : ''}">🍰 حلا</span>
            </div>`;
        }

        const myReady = order[screenType + 'Ready'] === true;

        const btnHtml = isCashier 
        ? `<button class="btn btn-cashier" onclick="deleteOrder('${orderId}')">تم الحذف ✅</button>`
        : `<button class="btn btn-dept" ${myReady ? 'disabled' : ''}
            onclick="markDeptReady('${orderId}', '${screenType}')">
            ${myReady ? 'تم التنفيذ ✅' : 'تم تجهيز الطلب 📣'}
        </button>`;

        grid.innerHTML += `
        <div class="order-card">
            <div style="display:flex; justify-content:space-between;">
                <span class="table-no">طاولة ${order.table}</span>
                <span style="color:var(--gold)">#${orderId.slice(-4)}</span>
            </div>

            ${itemsHtml}
            ${trackingHtml}

            ${finalNote ? `<div class="customer-note">⚠️ ${finalNote}</div>` : ''}

            <div style="margin-top:10px; font-weight:bold; color:var(--accent)">
                ${isCashier ? 'الإجمالي: ' + order.totalPrice + ' ريال' : 'قيد التحضير'}
            </div>

            ${btnHtml}
        </div>`;
    });

    if (newOrderDetected && audioEnabled) {
        document.getElementById('notifSound').play();

        if (noteDetected) {
            setTimeout(() => {
                const msg = new SpeechSynthesisUtterance("يوجد ملاحظة في الطلب");
                msg.lang = 'ar-SA';
                speechSynthesis.speak(msg);
            }, 1000);
        }
    }
});

function markDeptReady(id, dept) {
    let update = {};
    update[dept + 'Ready'] = true;
    database.ref('live_orders/' + id).update(update);
}

function deleteOrder(id) {
    if(confirm('تأكيد الحذف؟')) {
        database.ref('live_orders/' + id).remove();
    }
}
</script>
