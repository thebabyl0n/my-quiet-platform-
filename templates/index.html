<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة بارنيز الذكية</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f1ea; margin: 0; padding: 20px; text-align: center; color: #3e2723; }
        .header { margin-bottom: 20px; }
        .logo { width: 120px; border-radius: 50%; border: 3px solid #3e2723; }
        .menu-item { background: #fff; margin: 10px auto; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-add { background-color: #3e2723; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .cart-section { margin-top: 30px; padding: 20px; background: #e0d8c3; border-radius: 15px; max-width: 400px; margin-left: auto; margin-right: auto; }
        select { padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 15px; font-size: 16px; border: 1px solid #3e2723; }
        .btn-order { background-color: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://i.imgur.com/your-barnies-logo.png" alt="Barnies Logo" class="logo">
        <h1>أهلاً بك في بارنيز</h1>
        <p>اطلب كل اللي في خاطرك مرة واحدة</p>
    </div>

    <div id="menu">
        <div class="menu-item">
            <span>سبانش لاتيه - 18 ريال</span>
            <button class="btn-add" onclick="addToCart('سبانش لاتيه', 18)">إضافة +</button>
        </div>
        <div class="menu-item">
            <span>V60 كوفي - 22 ريال</span>
            <button class="btn-add" onclick="addToCart('V60 كوفي', 22)">إضافة +</button>
        </div>
        <div class="menu-item">
            <span>كيكة العسل - 15 ريال</span>
            <button class="btn-add" onclick="addToCart('كيكة العسل', 15)">إضافة +</button>
        </div>
    </div>

    <div class="cart-section">
        <h3>طلباتك:</h3>
        <ul id="cart-list" style="list-style: none; padding: 0;"></ul>
        <hr>
        <p>إجمالي الحساب: <span id="total-price">0</span> ريال</p>
        
        <label for="table-select">اختر رقم الطاولة:</label>
        <select id="table-select">
            <option value="1">طاولة رقم 1</option>
            <option value="2">طاولة رقم 2</option>
            <option value="3">طاولة رقم 3</option>
        </select>

        <button class="btn-order" onclick="sendOrder()">إرسال الطلب عبر واتساب</button>
    </div>

    <script>
        let cart = [];
        let total = 0;

        // وظيفة نطق الترحيب بصوت أنثوي
        function welcomeVoice() {
            const msg = new SpeechSynthesisUtterance("أهلاً بك في بارنيز، يسعدنا خدمتك. اطلب الآن وسنصل إليك فوراً");
            msg.lang = 'ar-SA';
            
            // البحث عن صوت أنثوي في النظام
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(voice => voice.name.includes('Female') || voice.name.includes('Google Arabic'));
            if (femaleVoice) msg.voice = femaleVoice;
            
            window.speechSynthesis.speak(msg);
        }

        // تشغيل الصوت عند أول ضغطة في الصفحة (بسبب سياسة المتصفح)
        window.onclick = function() {
            if (!window.voicePlayed) {
                welcomeVoice();
                window.voicePlayed = true;
            }
        };

        function addToCart(name, price) {
            cart.push(name);
            total += price;
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map(item => `<li>${item}</li>`).join('');
            document.getElementById('total-price').innerText = total;
        }

        function sendOrder() {
            if (cart.length === 0) {
                alert("السلة فاضية يا بطل!");
                return;
            }
            const tableNum = document.getElementById('table-select').value;
            const phoneNumber = "9665XXXXXXXX"; // هنا تحط رقم واتساب الكاشير اللي في السعودية
            
            let message = `*طلب جديد من بارنيز* \n`;
            message += `📍 *رقم الطاولة:* ${tableNum}\n`;
            message += `📋 *الطلبات:* \n- ${cart.join('\n- ')}\n`;
            message += `💰 *الإجمالي:* ${total} ريال`;

            const encodedMsg = encodeURIComponent(message);
            window.open(`https://wa.me/${phoneNumber}?text=${encodedMsg}`, '_blank');
        }
    </script>

</body>
</html>
