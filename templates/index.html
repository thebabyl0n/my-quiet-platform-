<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بارنيز - المنيو الذكي</title>
    <style>
        :root { --primary-color: #006a4d; --accent-color: #c8a27c; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: #333; text-align: center; }
        
        /* شاشة الترحيب */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-color); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .logo-welcome { width: 180px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-start { background-color: var(--accent-color); color: white; border: none; padding: 15px 50px; border-radius: 50px; font-size: 22px; cursor: pointer; font-weight: bold; }
        
        /* اختيار الطاولة */
        #table-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); z-index: 1001; width: 85%; max-width: 350px; }
        select { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 2px solid var(--primary-color); font-size: 18px; }

        /* المنيو */
        .header { background: white; padding: 15px; position: sticky; top: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); z-index: 100; display: flex; align-items: center; justify-content: space-around; }
        .logo-small { width: 60px; border-radius: 10px; }
        .menu-container { padding: 15px; max-width: 600px; margin: auto; padding-bottom: 100px; }
        .menu-item { background: white; margin-bottom: 15px; border-radius: 15px; overflow: hidden; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; }
        .item-img { width: 110px; height: 110px; object-fit: cover; }
        .item-info { padding: 15px; flex-grow: 1; text-align: right; }
        .item-name { font-weight: bold; font-size: 18px; display: block; color: #222; }
        .item-price { color: var(--primary-color); font-weight: bold; font-size: 16px; }
        .btn-add { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 15px; font-weight: bold; }

        .cart-float { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #25d366; color: white; padding: 18px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 200; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <img src="logo.jpg" alt="Barnies" class="logo-welcome">
        <h1 style="margin: 10px;">عالم بارنيز</h1>
        <p>القهوة التي تعشقها.. بذكاء</p>
        <button class="btn-start" onclick="showTableModal()">دخول</button>
    </div>

    <div id="table-modal">
        <h2 style="color: var(--primary-color); margin-top: 0;">رقم الطاولة</h2>
        <select id="table-select">
            <option value="1">طاولة رقم 1</option>
            <option value="2">طاولة رقم 2</option>
            <option value="3">طاولة رقم 3</option>
            <option value="4">طاولة رقم 4</option>
        </select>
        <button class="btn-start" onclick="startMenu()" style="width: 100%;">استعراض المنيو</button>
    </div>

    <div id="main-content" style="display: none;">
        <div class="header">
            <img src="logo.jpg" alt="Barnies" class="logo-small">
            <h3 id="table-display" style="margin: 0; color: var(--primary-color);"></h3>
        </div>

        <div class="menu-container">
            <div class="menu-item">
                <img src="spanish.jpg" class="item-img" alt="سبانش لاتيه">
                <div class="item-info">
                    <span class="item-name">سبانش لاتيه حار</span>
                    <span class="item-price">18 ريال</span>
                </div>
                <button class="btn-add" onclick="addToCart('سبانش لاتيه حار', 18)">إضافة +</button>
            </div>

            <div class="menu-item">
                <img src="v60.jpg" class="item-img" alt="V60">
                <div class="item-info">
                    <span class="item-name">V60 كوفي حار</span>
                    <span class="item-price">22 ريال</span>
                </div>
                <button class="btn-add" onclick="addToCart('V60 كوفي حار', 22)">إضافة +</button>
            </div>

            <div class="menu-item">
                <img src="honey_cake.jpg" class="item-img" alt="كيكة عسل">
                <div class="item-info">
                    <span class="item-name">كيكة العسل الفاخرة</span>
                    <span class="item-price">15 ريال</span>
                </div>
                <button class="btn-add" onclick="addToCart('كيكة العسل الفاخرة', 15)">إضافة +</button>
            </div>
        </div>

        <button class="cart-float" onclick="sendOrder()">
            إرسال الطلب ( <span id="cart-count">0</span> أصناف )
        </button>
    </div>

    <script>
        let cart = [];
        let selectedTable = "";

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.rate = 0.95;
            window.speechSynthesis.speak(msg);
        }

        function showTableModal() {
            document.getElementById('table-modal').style.display = 'block';
            speak("أهلاً بك في بارنيز، يسعدنا خدمتك.. من فضلك اختر رقم الطاولة");
        }

        function startMenu() {
            selectedTable = document.getElementById('table-select').value;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('table-modal').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('table-display').innerText = "طاولة: " + selectedTable;
            speak("تفضل المنيو.. يسعدنا تلقي طلباتك");
        }

        function addToCart(name, price) {
            cart.push(name);
            document.getElementById('cart-count').innerText = cart.length;
            // النطق التفصيلي (حار/بارد)
            speak("تم إضافة " + name + " لسلتك.. هل ترغب في إضافة شيء آخر؟");
        }

        function sendOrder() {
            if(cart.length === 0) {
                speak("السلة لا تزال فارغة");
                return;
            }
            const phone = "966579747707";
            let text = `*طلب جديد من بارنيز*\n📍 *طاولة رقم:* ${selectedTable}\n📋 *الطلبات:*\n- ${cart.join('\n- ')}\n✅ *يرجى التجهيز فوراً*`;
            
            speak("شكراً لك.. سيتم تحويل طلبك للواتساب الآن لتجهيزه");
            
            setTimeout(() => {
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
            }, 1200);
        }
    </script>
</body>
</html>
