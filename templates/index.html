<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بارنيز - المنيو الذكي</title>
    <style>
        :root { --primary-color: #006a4d; --accent-color: #c8a27c; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: #333; overflow-x: hidden; }
        
        /* شاشة الترحيب */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-color); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .logo-welcome { width: 180px; border-radius: 25px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 3px solid white; }
        .btn-start { background-color: var(--accent-color); color: white; border: none; padding: 18px 60px; border-radius: 50px; font-size: 24px; cursor: pointer; font-weight: bold; transition: 0.4s; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .btn-start:active { transform: scale(0.95); }
        
        /* اختيار الطاولة */
        #table-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 1001; width: 85%; max-width: 380px; text-align: center; }
        select { width: 100%; padding: 15px; margin: 25px 0; border-radius: 12px; border: 2px solid var(--primary-color); font-size: 20px; color: var(--primary-color); font-weight: bold; }

        /* المنيو الرئيسي */
        .header { background: white; padding: 20px; position: sticky; top: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.08); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo-small { width: 70px; border-radius: 8px; }
        .menu-container { padding: 20px; max-width: 600px; margin: auto; padding-bottom: 120px; }
        .menu-item { background: white; margin-bottom: 20px; border-radius: 20px; overflow: hidden; display: flex; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; transition: 0.3s; }
        .item-img { width: 110px; height: 110px; object-fit: cover; border-left: 1px solid #eee; }
        .item-info { padding: 15px; flex-grow: 1; }
        .item-name { font-weight: bold; font-size: 19px; color: #222; display: block; margin-bottom: 5px; }
        .item-price { color: var(--primary-color); font-weight: 800; font-size: 17px; }
        .btn-add { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; margin-left: 15px; font-weight: bold; transition: 0.3s; }
        .btn-add:active { background: var(--accent-color); }

        /* زر السلة والواتساب */
        .cart-float { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #25d366; color: white; padding: 20px; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 12px 30px rgba(37, 211, 102, 0.4); display: flex; justify-content: center; align-items: center; gap: 10px; z-index: 200; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <img src="logo.jpg" alt="Barnies Logo" class="logo-welcome">
        <h1 style="font-size: 32px; margin-bottom: 10px;">أهلاً بك في بارنيز</h1>
        <p style="font-size: 18px; opacity: 0.9; margin-bottom: 30px;">نكهة القهوة الأصيلة بين يديك</p>
        <button class="btn-start" onclick="showTableModal()">ابدأ طلبك الآن</button>
    </div>

    <div id="table-modal">
        <h2 style="color: var(--primary-color); margin: 0;">تشرفنا بزيارتك</h2>
        <p style="color: #666; margin-top: 10px;">من فضلك اختر رقم طاولتك</p>
        <select id="table-select">
            <option value="1">طاولة 1</option>
            <option value="2">طاولة 2</option>
            <option value="3">طاولة 3</option>
            <option value="4">طاولة 4</option>
            <option value="5">طاولة 5</option>
        </select>
        <button class="btn-start" onclick="startMenu()" style="width: 100%; padding: 15px;">استعراض المنيو</button>
    </div>

    <div id="main-content" style="display: none;">
        <div class="header">
            <img src="logo.jpg" alt="Barnies" class="logo-small">
            <div style="text-align: left;">
                <span id="table-display" style="font-weight: bold; color: var(--primary-color); font-size: 18px;">طاولة: </span>
            </div>
        </div>

        <div class="menu-container">
            <div class="menu-item">
                <img src="spanish.jpg" class="item-img" alt="سبانش لاتيه">
                <div class="item-info">
                    <span class="item-name">سبانش لاتيه حار</span>
                    <span class="item-price">18 ريال</span>
                </div>
                <button class="btn-add" onclick="addToCart('سبانش لاتيه حار', 18)">إضافة</button>
            </div>
            
            <div class="menu-item">
                <img src="v60.jpg" class="item-img" alt="V60">
                <div class="item-info">
                    <span class="item-name">V60 حار</span>
                    <span class="item-price">22 ريال</span>
                </div>
                <button class="btn-add" onclick="addToCart('V60 حار', 22)">إضافة</button>
            </div>

            <div class="menu-item">
                <img src="honey_cake.jpg" class="item-img" alt="كيكة عسل">
                <div class="item-info">
                    <span class="item-name">كيكة العسل</span>
                    <span class="item-price">15 ريال</span>
                </div>
                <button class="btn-add" onclick="addToCart('كيكة العسل', 15)">إضافة</button>
            </div>
        </div>

        <button class="cart-float" onclick="sendOrder()">
            <span>إرسال الطلب</span>
            <span id="cart-count" style="background: white; color: #25d366; padding: 2px 10px; border-radius: 10px; font-size: 16px;">0</span>
        </button>
    </div>

    <script>
        let cart = [];
        let selectedTable = "";

        // وظيفة النطق الاحترافية
        function speak(text) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'ar-SA';
                msg.rate = 0.9;
                msg.pitch = 1.0;
                window.speechSynthesis.speak(msg);
            }
        }

        function showTableModal() {
            document.getElementById('table-modal').style.display = 'block';
            speak("أهلاً بك في بارنيز.. من فضلك اختر رقم الطاولة");
        }

        function startMenu() {
            selectedTable = document.getElementById('table-select').value;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('table-modal').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('table-display').innerText = "طاولة رقم: " + selectedTable;
            speak("تفضل المنيو.. نتمنى لك وقتاً سعيداً");
        }

        function addToCart(name, price) {
            cart.push(name);
            document.getElementById('cart-count').innerText = cart.length;
            // نطق التفعيل باللهجة المطلوبة
            speak("تم إضافة " + name + " لسلتك.. تأمرني بشيء ثاني؟");
        }

        function sendOrder() {
            if(cart.length === 0) {
                speak("السلة فارغة.. اختر مشروبك المفضل أولاً");
                return;
            }
            const phone = "966579747707";
            let text = `*طلب جديد من بارنيز ☕*\n\n📍 *رقم الطاولة:* ${selectedTable}\n\n📋 *قائمة الطلبات:*\n- ${cart.join('\n- ')}\n\n✅ *يرجى التحضير، شكراً لكم!*`;
            
            speak("شكراً لطلبك.. جاري إرسال الطلب عبر الواتساب");
            
            setTimeout(() => {
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
            }, 1200);
        }
    </script>
</body>
</html>
