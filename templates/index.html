<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة حودة والظل وAlpha</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); height: 100vh; display: flex; flex-direction: column; align-items: center; color: white; }
        .header { margin: 20px 0; text-align: center; }
        .container { width: 95%; max-width: 500px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .chat-box { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); }
        .bot-msg { border-right: 4px solid #4facfe; background: rgba(79, 172, 254, 0.1); }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; outline: none; }
        button { background: #4facfe; border: none; padding: 10px 20px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>عالم حودة الخاص</h2>
        <p>الظل 🤖 Alpha ⚡ حودة 💙</p>
    </div>

    <div class="container">
        <div class="chat-box" id="chat">
            <div class="msg bot-msg"><b>الظل:</b> أنا والفا جاهزين يا حودة، اؤمرنا!</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب للظل هنا...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            
            if (text !== "") {
                // إظهار رسالة حودة
                chat.innerHTML += `<div class="msg"><b>أنت:</b> ${text}</div>`;
                input.value = "";
                chat.scrollTop = chat.scrollHeight;

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                    const data = await response.json();
                    
                    // إظهار رد الظل الحقيقي
                    chat.innerHTML += `<div class="msg bot-msg"><b>الظل:</b> ${data.reply}</div>`;
                } catch (e) {
                    chat.innerHTML += `<div class="msg bot-msg"><b>الظل:</b> السيرفر لسه بيصحى يا حودة، ثواني وجرب تاني!</div>`;
                }
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
