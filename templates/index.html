<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو السيادة - تطوير محمود صلاح</title>
    <style>
        :root { --gold: #d4af37; --dark: #121212; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        h1 { color: var(--gold); font-size: 1.5rem; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--gold); }
        #chat-area { margin-top: 20px; font-style: italic; color: #ccc; min-height: 50px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/100/d4af37/000000?text=Barista+Pro" style="border-radius: 50%;" alt="Logo">
    <h1>مرحباً بك في تجربة المستقبل ☕️</h1>
    <p>بإشراف الخبير: محمود صلاح</p>
    
    <div id="chat-area">اضغط بالأسفل لبدء تجربة الضيافة الذكية...</div>

    <button class="btn" onclick="askOrder('welcome')">أهلاً بك.. اضغط للطلب</button>
    <button class="btn" onclick="askOrder('v60')" style="background: transparent; color: var(--gold); border: 1px solid var(--gold); margin-top: 10px;">اطلب V60 (خاص بالسيادة)</button>
</div>

<script>
    function speak(text) {
        window.speechSynthesis.cancel(); // لإلغاء أي صوت سابق ومنع التداخل
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ar-SA'; // نبرة سعودية فخمة
        msg.rate = 0.85;    // سرعة وقورة
        window.speechSynthesis.speak(msg);
    }

    function askOrder(type) {
        let text = "";
        let display = "";

        if(type === 'welcome') {
            text = "يا هلا بك في عالمنا. أنا المساعد الذكي الخاص بالقائد محمود. وش تبي تطلب اليوم؟ منيو بارنيز بيدك وصوتي بخدمتك.";
            display = "الظِل: مرحباً بك.. نحن بانتظار طلبك ✨";
        } else if(type === 'v60') {
            text = "اختيار ملوك. الـ ڤي ستين عندنا يضبط نبضك ويعدل مزاجك. ثواني ويكون طلبك جاهز يا ذوق.";
            display = "الظِل: تم استلام طلب الـ V60 بنجاح ✅";
        }

        document.getElementById('chat-area').innerText = display;
        speak(text);
    }
</script>

</body>
</html>
