<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بورت السيادة - بارنيز كافيه</title>
    <style>
        :root { --gold: #d4af37; --dark: #000; --card-bg: #121212; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .card { width: 95%; max-width: 450px; border: 1px solid var(--gold); border-radius: 25px; padding: 25px; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); margin: auto; background: #0a0a0a; }
        
        #welcome-section { display: block; animation: fadeIn 1s; }
        #menu-section { display: none; text-align: right; animation: fadeIn 0.8s; }

        .btn { background: var(--gold); color: black; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        
        .section-title { color: var(--gold); border-right: 4px solid var(--gold); padding-right: 15px; margin-top: 30px; font-size: 1.3rem; font-weight: bold; }
        .menu-item { background: var(--card-bg); border: 1px solid #222; border-radius: 15px; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .menu-item:active { border-color: var(--gold); background: #1a1a1a; }
        .price { color: var(--gold); font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="welcome-section">
        <div style="font-size: 60px;">☕️</div>
        <h1 style="color: var(--gold);">بارنيز - تجربة المستقبل</h1>
        <p>بإشراف الخبير: محمود صلاح</p>
        <div id="chat-msg" style="margin-top: 20px; font-style: italic; color: var(--gold);">اضغط لبدء الضيافة الذكية...</div>
        <button class="btn" onclick="startExperience()">أهلاً بك.. ادخل للمنيو 🚀</button>
    </div>

    <div id="menu-section">
        <h2 style="color: var(--gold); text-align: center;">منيو بارنيز السيادي</h2>
        
        <div class="section-title">الأكثر طلباً 🔥</div>
        <div class="menu-item" onclick="selectItem('سبانش لاتيه مثلج', 'سبانش لاتيه بارد وراقي.. يبرد على قلبك بهيبة بارنيز.')">
            <div><b>سبانش لاتيه</b><br><small>انتعاش السيادة</small></div>
            <div class="price">22 SR</div>
        </div>

        <div class="section-title">المشروبات المثلجة ❄️</div>
        <div class="menu-item" onclick="selectItem('أيس بيستاشيو لاتيه', 'أيس بيستاشيو يسرسح على قلبك ويعدل مزاجك يا غالي.')">
            <div><b>أيس بيستاشيو</b><br><small>ذوق الملوك</small></div>
            <div class="price">23 SR</div>
        </div>

        <div class="section-title">القهوة المقطرة ☕️</div>
        <div class="menu-item" onclick="selectItem('V60', 'في سكستي مقطرة بذكاء.. تضبط يومك وتعدل مزاجك.')">
            <div><b>V60</b><br><small>إثيوبي / كولومبي</small></div>
            <div class="price">22 SR</div>
        </div>

        <button class="btn" onclick="confirmOrder()" id="order-btn" style="position: sticky; bottom: 10px;">تأكيد الطلب لواتساب السيادة ✅</button>
    </div>
</div>

<script>
    let currentOrder = "";

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ar-SA';
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function startExperience() {
        const welcomeText = "يا هلا بك في بارنيز كافيه. نورت المكان يا طويل العمر. المنيو بيدك وصوتي بخدمتك. تفضل اختر ما يسر خاطرك.";
        speak(welcomeText);
        document.getElementById('welcome-section').style.display = 'none';
        document.getElementById('menu-section').style.display = 'block';
    }

    function selectItem(name, desc) {
        currentOrder = name;
        speak(desc);
        document.getElementById('order-btn').innerText = `تأكيد طلب (${name}) ✅`;
        document.getElementById('order-btn').style.boxShadow = "0 0 30px var(--gold)";
        setTimeout(() => { document.getElementById('order-btn').style.boxShadow = "0 5px 15px rgba(212, 175, 55, 0.4)"; }, 500);
    }

    function confirmOrder() {
        if(!currentOrder) { speak("يا طويل العمر، اختر مشروبك أولاً."); return; }
        const phone = "966579747707";
        const msg = `أهلاً بارنيز، أريد طلب: ${currentOrder}. تم الطلب عبر منصة السيادة للمهندس محمود صلاح. ☕️💎`;
        // التصحيح البرمجي من ألفا والظل لضمان عمل الرابط
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
