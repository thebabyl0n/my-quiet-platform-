<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام Alpha Shadow الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background:#0f172a; color:white; margin:0; display:flex; height:100vh; overflow: hidden; }
        
        /* القسم اليمين: عرض الطلبات والتحصيل */
        .orders-section { width: 35%; background:#1e293b; display:flex; flex-direction:column; border-left: 2px solid #334155; }
        .orders-container { flex:1; overflow-y:auto; padding:10px; }
        
        /* القسم الشمال: المنيو والطلب */
        .menu-section { width: 65%; padding:15px; display:flex; flex-direction:column; }
        .categories { display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; }
        .categories button { background:#334155; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; white-space:nowrap; }
        .items-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:15px; overflow-y:auto; flex:1; }
        
        .item-card { background:#1e293b; padding:15px; border-radius:12px; text-align:center; cursor:pointer; transition: 0.2s; }
        .item-card:hover { background:#334155; }
        
        .order-card { background:#0f172a; border-radius:10px; padding:12px; margin-bottom:15px; border-right: 4px solid #22c55e; }
        .total-banner { background:#16a34a; padding:15px; text-align:center; font-weight:bold; }
        
        .btn { padding:8px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; margin-top:5px; }
        .btn-pay { background:#22c55e; color:white; }
        .btn-print { background:#3b82f6; color:white; }
        
        /* السلة المؤقتة قبل الإرسال */
        .cart-preview { background:#334155; padding:10px; border-radius:8px; margin-bottom:10px; }
    </style>
</head>
<body>

<div class="orders-section">
    <div class="total-banner" id="dayTotal">مبيعات اليوم: 0 ريال</div>
    <h3 style="padding:10px; margin:0;">🧾 طلبات نشطة</h3>
    <div class="orders-container" id="liveOrders">
        </div>
</div>

<div class="menu-section">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🛒 قائمة الأصناف</h2>
        <div id="cartArea" class="cart-preview" style="display:none;">
            <span id="cartCount">0</span> أصناف | <button onclick="sendOrder()" style="background:#22c55e; color:white; border:none; padding:5px 10px; border-radius:5px;">إرسال للتحصيل 🚀</button>
        </div>
    </div>
    
    <div class="categories" id="catList">
        </div>
    <br>
    <div class="items-grid" id="menuGrid">
        </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
    databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allItems = [];
let cart = [];
let currentCashier = localStorage.getItem("cashier") || prompt("اسم الكاشير؟");

// 1. تحميل الأقسام من الداشبورد (sub_categories)
db.ref('sub_categories').on('value', snap => {
    let html = `<button onclick="renderMenu('all')">الكل</button>`;
    snap.forEach(cat => {
        html += `<button onclick="renderMenu('${cat.key}')">${cat.val().name}</button>`;
    });
    document.getElementById('catList').innerHTML = html;
});

// 2. تحميل الأصناف من الداشبورد (menu_items)
db.ref('menu_items').on('value', snap => {
    allItems = [];
    snap.forEach(item => {
        allItems.push({ id: item.key, ...item.val() });
    });
    renderMenu('all');
});

function renderMenu(catId) {
    let filtered = catId === 'all' ? allItems : allItems.filter(i => i.categoryId === catId);
    let html = "";
    filtered.forEach(i => {
        html += `
        <div class="item-card" onclick="addToCart('${i.id}')">
            <strong>${i.ar}</strong><br>
            <span style="color:#22c55e">${i.price} ريال</span>
        </div>`;
    });
    document.getElementById('menuGrid').innerHTML = html;
}

// 3. إدارة السلة والطلب
function addToCart(id) {
    let item = allItems.find(i => i.id === id);
    cart.push(item);
    document.getElementById('cartArea').style.display = 'block';
    document.getElementById('cartCount').innerText = cart.length;
}

function sendOrder() {
    let total = cart.reduce((sum, i) => sum + parseFloat(i.price), 0);
    let orderData = {
        items: cart.map(i => ({ ar: i.ar, p: i.price, qty: 1, dept: i.dept || 'barista' })),
        totalPrice: total,
        cashier: currentCashier,
        status: "pending",
        time: new Date().toISOString(),
        type: "محلي" 
    };
    db.ref('live_orders').push(orderData);
    cart = [];
    document.getElementById('cartArea').style.display = 'none';
    alert("تم إرسال الطلب للقائمة");
}

// 4. عرض الطلبات المفتوحة للتحصيل (المراية)
db.ref('live_orders').on('value', snap => {
    let html = "";
    let dayTotal = 0;
    snap.forEach(order => {
        let o = order.val();
        if(o.status === "paid") {
            dayTotal += parseFloat(o.totalPrice);
            return;
        }
        html += `
        <div class="order-card">
            <div style="display:flex; justify-content:space-between; font-size:12px;">
                <span>👤 ${o.cashier}</span>
                <span>⏱️ ${new Date(o.time).toLocaleTimeString('ar-SA')}</span>
            </div>
            <div style="margin:5px 0;">${o.items.map(i => i.ar).join(' , ')}</div>
            <div style="font-weight:bold; color:#22c55e;">${o.totalPrice} ريال</div>
            <button class="btn btn-pay" onclick="payOrder('${order.key}')">تحصيل ✅</button>
        </div>`;
    });
    document.getElementById('liveOrders').innerHTML = html;
    document.getElementById('dayTotal').innerText = `مبيعات اليوم: ${dayTotal} ريال`;
});

function payOrder(id) {
    db.ref('live_orders/' + id).update({ status: "paid" });
}

</script>
</body>
</html>
