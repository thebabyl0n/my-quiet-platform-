<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كاشير الإمبراطورية | Alpha Shadow</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #22c55e; --blue: #3b82f6; --red: #ef4444; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* العمود الجانبي: الطلبات النشطة والتحصيل */
        .sidebar { width: 350px; background: var(--card); border-left: 2px solid #334155; display: flex; flex-direction: column; }
        .live-orders { flex: 1; overflow-y: auto; padding: 10px; }
        .order-card { background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 10px; border-right: 4px solid var(--green); }
        
        /* المنطقة الرئيسية: المنيو والطلب */
        .main { flex: 1; display: flex; flex-direction: column; padding: 15px; }
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; border-bottom: 1px solid #334155; }
        .cat-btn { background: #334155; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: var(--blue); }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 15px; overflow-y: auto; flex: 1; }
        .item-box { background: var(--card); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; border: 1px solid transparent; }
        .item-box:hover { border-color: var(--blue); }

        /* منطقة الفاتورة المؤقتة (تحت المنيو) */
        .billing-area { background: #1e293b; border-radius: 15px 15px 0 0; padding: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .bill-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .bill-table th { text-align: right; color: #94a3b8; font-size: 12px; }
        .qty-btn { background: #334155; color: white; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-pay { background: var(--green); }
        .btn-send { background: var(--blue); width: 100%; font-size: 18px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding: 15px; background: var(--green); text-align: center;">
        <h4 style="margin:0;">💰 مبيعات اليوم المحصلة</h4>
        <div id="dayTotal" style="font-size: 22px; font-weight: bold;">0 ريال</div>
    </div>
    <div class="live-orders" id="liveOrdersContainer"></div>
</div>

<div class="main">
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <select id="orderType" class="btn" style="background:#334155;">
            <option value="محلي">🪑 محلي</option>
            <option value="سفري">🚗 سفري</option>
        </select>
        <input type="text" id="tableName" placeholder="رقم الطاولة / العميل" style="background:#334155; color:white; border:none; padding:10px; border-radius:8px; flex:1;">
    </div>

    <div class="categories" id="catBar"></div>
    <div class="items-grid" id="menuGrid"></div>

    <div class="billing-area" id="billArea" style="display:none;">
        <table class="bill-table">
            <thead><tr><th>الصنف</th><th>الكمية</th><th>السعر</th></tr></thead>
            <tbody id="billBody"></tbody>
        </table>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size: 20px; font-weight: bold;">الإجمالي: <span id="billTotal" style="color:var(--green)">0</span> ريال</span>
            <button class="btn btn-red" onclick="clearCart()" style="background:var(--red)">مسح 🗑️</button>
        </div>
        <button class="btn btn-send" onclick="sendOrder()">إرسال الطلب وتنفيذ الفاتورة 🚀</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
    databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allItems = [];
let cart = {}; // نستخدم object لتسهيل التحكم في الكميات

// 1. جلب البيانات من الداشبورد
db.ref('sub_categories').on('value', s => {
    let h = `<button class="cat-btn active" onclick="renderMenu('all')">الكل</button>`;
    s.forEach(c => h += `<button class="cat-btn" onclick="renderMenu('${c.key}')">${c.val().name}</button>`);
    document.getElementById('catBar').innerHTML = h;
});

db.ref('menu_items').on('value', s => {
    allItems = [];
    s.forEach(i => allItems.push({ id: i.key, ...i.val() }));
    renderMenu('all');
});

function renderMenu(cid) {
    let f = cid === 'all' ? allItems : allItems.filter(i => i.categoryId === cid);
    let h = f.map(i => `
        <div class="item-box" onclick="addToCart('${i.id}')">
            <strong>${i.ar}</strong><br>
            <span style="color:var(--green)">${i.price} ريال</span>
        </div>`).join('');
    document.getElementById('menuGrid').innerHTML = h;
}

// 2. منطق السلة (+) و (-)
function addToCart(id) {
    let item = allItems.find(i => i.id === id);
    if (cart[id]) { cart[id].qty++; } 
    else { cart[id] = { ar: item.ar, price: parseFloat(item.price), qty: 1, dept: item.dept || 'barista' }; }
    updateBill();
}

function changeQty(id, delta) {
    if (cart[id]) {
        cart[id].qty += delta;
        if (cart[id].qty <= 0) delete cart[id];
        updateBill();
    }
}

function updateBill() {
    let h = ""; let total = 0;
    Object.keys(cart).forEach(id => {
        let i = cart[id];
        total += i.price * i.qty;
        h += `<tr>
            <td>${i.ar}</td>
            <td>
                <button class="qty-btn" onclick="changeQty('${id}', -1)">-</button>
                <span style="margin:0 10px">${i.qty}</span>
                <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
            </td>
            <td>${(i.price * i.qty).toFixed(2)}</td>
        </tr>`;
    });
    document.getElementById('billBody').innerHTML = h;
    document.getElementById('billTotal').innerText = total.toFixed(2);
    document.getElementById('billArea').style.display = total > 0 ? 'block' : 'none';
}

// 3. إرسال الطلب (الربط مع عداد التيك أوي اللي عملناه)
async function sendOrder() {
    let type = document.getElementById('orderType').value;
    let table = document.getElementById('tableName').value;
    let total = parseFloat(document.getElementById('billTotal').innerText);
    
    let orderNum = 0;
    if(type === "سفري") {
        const snap = await db.ref('takeaway/number').transaction(n => (n || 0) + 1);
        orderNum = snap.snapshot.val();
    }

    let orderData = {
        items: Object.values(cart),
        totalPrice: total,
        type: type,
        table: table,
        orderNum: orderNum,
        status: "pending",
        time: new Date().toISOString()
    };

    db.ref('live_orders').push(orderData);
    clearCart();
    alert("تم إرسال الطلب بنجاح!");
}

function clearCart() { cart = {}; updateBill(); }

// 4. عرض الطلبات النشطة للتحصيل (المرآة)
db.ref('live_orders').on('value', s => {
    let h = ""; let dayT = 0;
    s.forEach(child => {
        let o = child.val();
        if(o.status === "paid") { dayT += o.totalPrice; return; }
        h += `
        <div class="order-card">
            <div style="display:flex; justify-content:space-between; font-size:12px;">
                <span>#${o.orderNum || o.table} [${o.type}]</span>
                <span>${new Date(o.time).toLocaleTimeString('ar-SA')}</span>
            </div>
            <div style="margin:8px 0;">${o.items.map(i => `${i.ar} (x${i.qty})`).join('<br>')}</div>
            <div style="font-weight:bold; color:var(--green)">${o.totalPrice} ريال</div>
            <button class="btn btn-pay" style="width:100%; margin-top:10px;" onclick="payOrder('${child.key}')">تحصيل المبلغ ✅</button>
        </div>`;
    });
    document.getElementById('liveOrdersContainer').innerHTML = h;
    document.getElementById('dayTotal').innerText = dayT.toFixed(2) + " ريال";
});

function payOrder(id) {
    if(confirm("تأكيد دفع الحساب؟")) db.ref('live_orders/' + id).update({ status: "paid" });
}
</script>
</body>
</html>
