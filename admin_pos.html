<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 كاشير الطلبات - ألفا</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; margin:0; }
.header { padding:15px; background:#1e293b; text-align:center; font-size:20px; font-weight:bold; }
.totalBox { background:#16a34a; padding:10px; text-align:center; font-size:18px; position: sticky; top: 0; z-index: 100; }
.orders { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:15px; padding:15px; }
.card { background:#1e293b; padding:15px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.3); border-top: 4px solid #334155; }
.badge { background:#334155; padding:3px 8px; border-radius:6px; font-size:12px; margin:2px; display:inline-block; }
.items { margin:10px 0; font-size:15px; line-height: 1.6; }
.dept-title { font-weight: bold; margin-top: 8px; border-bottom: 1px solid #ffffff22; padding-bottom: 2px; }
.price { background:#022c22; padding:8px; border-radius:8px; text-align:center; margin-top:10px; font-weight: bold; font-size: 18px; }
.btn { width:100%; padding:12px; border:none; border-radius:8px; margin-top:8px; font-weight:bold; cursor:pointer; }
.pay { background:#22c55e; color:white; }
.delete { background:#ef4444; color:white; }
</style>
</head>

<body>

<div class="header">💰 كاشير الطلبات</div>
<div class="totalBox" id="totalAll">جاري التحميل...</div>
<div class="orders" id="orders"></div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
 databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com"
};
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.database();

db.ref('live_orders').on('value', snap=>{
    let html="";
    let totalAll = 0;

    snap.forEach(order=>{
        let o = order.val();

        // لو الطلب مدفوع مش هنظهره هنا
        if(o.status === "paid") return;

        totalAll += parseFloat(o.totalPrice || 0);

        // تجهيز الأقسام
        let itemsByDept = { 'barista': [], 'kitchen': [], 'dessert': [] };

        if(o.items) {
            o.items.forEach(i => {
                let dept = (i.dept || 'barista').toLowerCase().trim();
                let line = `• ${i.ar} [${i.qty}]`;
                if(itemsByDept[dept]) { itemsByDept[dept].push(line); }
                else { itemsByDept['barista'].push(line); } // لو القسم مش معروف حطه باريستا
            });
        }

        html += `
        <div class="card">
            <div>
                <span class="badge">👤 ${o.cashier || "بدون اسم"}</span>
                <span class="badge">⏱️ ${o.time ? new Date(o.time).toLocaleTimeString('ar-SA') : '-'}</span>
                <span class="badge" style="background:#3b82f6">${o.type || "عام"}</span>
                <span class="badge" style="background:#8b5cf6">${o.type==="محلي" ? "🪑 "+(o.table||"-") : "🚗 "+(o.orderNum||"-")}</span>
            </div>

            <div class="items">
                ${itemsByDept['barista'].length > 0 ? `<div class="dept-title" style="color:#60a5fa">☕ باريستا:</div><div>${itemsByDept['barista'].join('<br>')}</div>` : ''}
                ${itemsByDept['kitchen'].length > 0 ? `<div class="dept-title" style="color:#f87171">🍔 المطبخ:</div><div>${itemsByDept['kitchen'].join('<br>')}</div>` : ''}
                ${itemsByDept['dessert'].length > 0 ? `<div class="dept-title" style="color:#fbbf24">🍰 الحلا:</div><div>${itemsByDept['dessert'].join('<br>')}</div>` : ''}
            </div>

            <div class="price">💰 ${o.totalPrice} ريال</div>

            <button class="btn pay" onclick="pay('${order.key}')">✅ تحصيل الحساب</button>
            <button class="btn delete" onclick="del('${order.key}')">❌ إلغاء الطلب</button>
        </div>`;
    });

    document.getElementById('orders').innerHTML = html || "<p style='text-align:center;width:100%'>لا توجد طلبات حالية</p>";
    document.getElementById('totalAll').innerText = "💰 إجمالي الكاش المفتوح: " + totalAll + " ريال";
});

function pay(id){
    if(confirm("تأكيد تحصيل الحساب ونقل الطلب للأرشيف؟")){
        db.ref('live_orders/' + id).update({
            status:"paid",
            timePay: new Date().toISOString()
        });
    }
}

function del(id){
    if(confirm("هل أنت متأكد من حذف الطلب نهائياً؟")){
        db.ref('live_orders/' + id).remove();
    }
}
</script>

</body>
</html>
