<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كاشير ألفا - تأسيس الربط</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* قائمة الأقسام الجانبية */
        .sidebar { width: 180px; background: var(--card); border-left: 1px solid #334155; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; text-align: center; font-weight: bold; border-bottom: 1px solid #334155; color: var(--accent); }
        .cat-item { padding: 15px 10px; border-bottom: 1px solid #334155; cursor: pointer; text-align: center; transition: 0.3s; }
        .cat-item:hover { background: #334155; }
        .cat-item.active { background: var(--accent); color: white; }

        /* منطقة عرض الأصناف */
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; cursor: pointer; position: relative; }
        .item-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .item-price { display: block; color: #22c55e; font-weight: bold; margin-top: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">Alpha POS</div>
        <div id="categoriesMenu">
            <div class="cat-item active" onclick="loadAll()">الكل</div>
        </div>
    </div>

    <div class="main">
        <div class="items-grid" id="itemsGrid">
            <p style="text-align: center; width: 100%;">جاري تحميل المنيو من الداشبورد...</p>
        </div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCs_vLcVUudSP3_4QaSQHQB44WGjQK31Ac",
    databaseURL: "https://alphashadow-23689-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allMenuItems = [];

// 1. سحب الأقسام (sub_categories) والتأكد من مطابقتها للأسماء اللي قلتها
db.ref('sub_categories').on('value', snap => {
    let html = `<div class="cat-item active" id="all-cat" onclick="loadAll()">الكل</div>`;
    snap.forEach(child => {
        let cat = child.val();
        // بنعرض الاسم اللي في الداشبورد بس بنبعت الـ ID للفلترة
        html += `<div class="cat-item" onclick="filterByCategory('${child.key}', this)">${cat.name}</div>`;
    });
    document.getElementById('categoriesMenu').innerHTML = html;
});

// 2. سحب الأصناف (menu_items)
db.ref('menu_items').on('value', snap => {
    allMenuItems = [];
    snap.forEach(child => {
        allMenuItems.push({ id: child.key, ...child.val() });
    });
    renderItems(allMenuItems);
});

function renderItems(items) {
    let html = items.map(i => `
        <div class="item-card" onclick="console.log('اخترت: ${i.ar}')">
            <strong>${i.ar}</strong>
            <span class="item-price">${i.price} ريال</span>
            <small style="font-size:10px; color:#64748b;">${i.dept || ''}</small>
        </div>
    `).join('');
    document.getElementById('itemsGrid').innerHTML = html || "<p>لا توجد أصناف حالياً</p>";
}

function filterByCategory(catId, btn) {
    // تغيير شكل الزرار النشط
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');

    // الفلترة بناءً على categoryId المربوط بالقسم
    let filtered = allMenuItems.filter(i => i.categoryId === catId);
    renderItems(filtered);
}

function loadAll() {
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    document.getElementById('all-cat').classList.add('active');
    renderItems(allMenuItems);
}
</script>
</body>
</html>
